<p><i>Psalm 69</i></p>
<p>O God, make haste to deliver me; O Lord, make haste to help me.</p>
<p>Let them be put to shame and confusion who seek my life; let them be turned back and brought to dishonor who desire my hurt.</p>
<p>Let them turn back because of their shame who say, "Aha, Aha!"</p>
<p>May all who seek you rejoice and be glad in you; may those who love your salvation say evermore, "God is great!"</p>
<p>But I am poor and needy; hasten to me, O God! You are my help and my deliverer; O Lord, do not delay.</p>
<p><i>Psalm 142</i></p>
<p>Hear my prayer, O Lord; give ear to my pleas for mercy; in your faithfulness answer me, in your righteousness.</p>
<p>Enter not into judgment with your servant, for no one living is righteous before you.</p>
<p>For the enemy has pursued my soul; he has crushed my life to the ground; he has made me sit in darkness like those long dead.</p>
<p>Therefore my spirit faints within me; my heart within me is appalled.</p>
<p>I remember the days of old; I meditate on all that you have done; I ponder the work of your hands.</p>
<p>I stretch out my hands to you; my soul thirsts for you like a parched land.</p>
<p>Answer me quickly, O Lord; my spirit fails; hide not your face from me, lest I be like those who go down to the pit.</p>
<p>Let me hear in the morning of your steadfast love, for in you I trust; make me know the way I should go, for to you I lift up my soul.</p>
<p>Deliver me from my enemies, O Lord; I have fled to you for refuge.</p>
<p>Teach me to do your will, for you are my God; let your good Spirit lead me on level ground.</p>
<p>For your name's sake, O Lord, preserve my life; in your righteousness bring my soul out of trouble.</p>
<p>And in your steadfast love cut off my enemies, and destroy all the adversaries of my soul, for I am your servant.</p>
<p><b><i>Lesser Doxology</i></b></p>
<p>Glory to God in the highest, and on earth peace, goodwill among men.</p>
<p>We praise you, we bless you, we worship you, we glorify you, we give thanks to you for your great glory.</p>
<p>O Lord, heavenly King, God the Father Almighty; O Lord, only-begotten Son Jesus Christ, and Holy Spirit.</p>
<p>O Lord God, Lamb of God, Son of the Father, who take away the sin of the world, have mercy on us.</p>
<p>You who take away the sins of the world, receive our prayer.</p>
<p>You who sit at the right hand of the Father, have mercy on us.</p>
<p>For you alone are holy; you alone are the Lord; you alone are the Most High, O Jesus Christ, to the glory of God the Father. Amen.</p>
<p>Every night I will bless you and praise your name forever and ever.</p>
<p>O Lord, you have been our refuge from generation to generation.</p>
<p>I said: O Lord, be merciful to me; heal my soul, for I have sinned against you.</p>
<p>O Lord, I have fled to you; teach me to do your will, for you are my God.</p>
<p>For in you is the fountain of life; in your light we shall see light.</p>
<p>Continue your steadfast love to those who know you.</p>
<p>Grant, O Lord, to keep us this night without sin.</p>
<p>Blessed are you, O Lord, God of our fathers, and praised and glorified is your name unto ages. Amen.</p>
<p>Let your mercy, O Lord, be upon us, as we hope in you.</p>
<p>Blessed are you, O Lord; teach me your statutes.</p>
<p>Blessed are you, O Master; make me understand your statutes.</p>
<p>Blessed are you, O Holy One; enlighten me with your statutes.</p>
<p>O Lord, your mercy endures forever; do not forsake the work of your hands.</p>
<p>To you belongs praise; to you belongs song.</p>
<p>To you belongs glory: to the Father, and to the Son, and to the Holy Spirit.</p>
<p>Now and ever, and unto ages of ages. Amen.</p>
<p><b><i>Canon to the Most Holy Theotokos, Tone 6</i></b> <i>(Tuesday evening)</i></p>
<p><i>Ode 1 — Irmos:</i> As Israel walked on dry ground through the deep, seeing Pharaoh the pursuer overwhelmed in the sea, they sang a hymn of victory to God, O Christ, let us sing to you alone.</p>
<p><i>Refrain throughout the Canon:</i> Most holy Theotokos, save us!</p>
<p>I lament over my defiled life and the countless multitude of my boundless sins; what shall I confess to you, O Pure One? I do not understand, but before the end I fall down before you, O Lady, and I cry: Grant me repentance before my end.</p>
<p>Where shall I begin to tell of my evil and terrible falls, I who am full of passion? Woe is me, what will happen to me? But before the end accept my repentance, O Pure One.</p>
<p><i>Glory:</i> I always think of the hour of death and of the dread judgment seat, O most pure one, yet by sinful habits I am deceived. Bestow on me, O Lady, tears of compunction, so that I may wash away my stain before the end.</p>
<p><i>Now and ever:</i> The destroyer of all good, seeing me deprived of divine grace and having strayed and fallen far from God, hastens to devour me; but before the end intercede for me, O Bride of God, and grant me repentance.</p>
<p><i>Ode 3 — Irmos:</i> There is none holy as you, O Lord my God, who have exalted the horn of your faithful and established us upon the rock of your confession, O Good One.</p>
<p>I have defiled my soul with countless sins, O Lady and Theotokos; and where shall I go further, seized with great despair? Grant me the amendment of life, O Sovereign One.</p>
<p>The divine image in me I have defiled by fornication and vainglory, O Virgin; and the likeness I have wrought into wickedness; woe to me, O Pure One, heal me before the end.</p>
<p><i>Glory:</i> There is no other among men born into the world who has committed such abomination as I, darkened in mind; but grant me, O Lady, repentance before the end.</p>
<p><i>Now and ever:</i> I have attained the heights of sin, O most holy Virgin; help me quickly, for heaven and earth cry bitterly over me. Grant me repentance, O most pure one.</p>
<p><i>Ode 4 — Irmos:</i> Christ is my power, God and Lord; the holy Church sings hymns with reverence, crying out from a pure mind: Lord, glory to you.</p>
<p>The angelic orders and the hosts of the heavenly powers tremble before the power of your Son, O Pure One; yet I am in despair, seized with countless sins. Heal me, O Lady, before the end.</p>
<p>All the earth was amazed and was aghast at my terrible, evil, and mindless deeds, and marvels at your great compassion toward me, O Theotokos. Grant me repentance before the end.</p>
<p><i>Glory:</i> I have defiled the temple of my body with sin, and the temple of the Lord into which men enter with trembling, I, the prodigal, enter with impurity. O Lady, grant me repentance before the end.</p>
<p><i>Now and ever:</i> Do not, do not show me, O Lady, as one who has gone out from the house of your Son as unworthy; but wash away my filth and lead me in repentance, so that I may glorify you before the end.</p>
<p><i>Ode 5 — Irmos:</i> With your divine light, O Good One, enlighten the souls of those who seek you with love at dawn, I pray; let them know you, O Word of God, as the true God, who calls all from the darkness of sin.</p>
<p>With your divine radiance, O Good One, heal my soul's passions, which the adversary has sown in me, and deliver me from his snares, O Theotokos, and guide me to repentance before the end.</p>
<p>Adam transgressed the single commandment of your Son, O Virgin, and was expelled; how then shall I weep, I who am a lawbreaker, falling into the abyss of my sins? O Lady, grant me repentance before the end.</p>
<p><i>Glory:</i> I became a murderer from of old, and like Cain, a fratricide, and was cursed by God; what then shall I do now, evil one, having slain my soul by the passions of the flesh? O Lady, grant me repentance before the end.</p>
<p><i>Now and ever:</i> I have rivaled evil Esau in gluttony and excess; I have defiled my soul with drunkenness and sensual pleasure — a life ruined by indulgence. O Lady, grant me repentance before the end.</p>
<p><i>Ode 6 — Irmos:</i> Seeing the sea of life surge with the storm of temptations, I run to your calm harbor and cry out to you: Raise up my life from corruption, O greatly merciful One.</p>
<p>My life is dissolute, my soul is defiled, all my life is wretched, and my body is entirely dirty with sins; therefore I hasten to you, O Most Pure One — grant me repentance and the amendment of life before the end.</p>
<p>The end draws near and I cannot endure; my conscience convicts me, for I have wrought evil deeds, and my life is dissolute and wretched. Grant me, O Good One, repentance before the end.</p>
<p><i>Glory:</i> The burning of my flesh awaits me in truth: the terrible, unquenchable river of fire, and the undying worm. But before the end, intercede for me, O Theotokos, with your Son, that I may gain repentance.</p>
<p><i>Now and ever:</i> Now seized with trembling, O Good One, I fear the evil snares of the enemy; for before the end, the adversary desires to destroy me. But before the end intercede for me, O Bride of God, and grant me repentance.</p>
<p><i>Lord, have mercy. (3 times) Glory, now and ever.</i></p>
<p><i>Sessional hymn, Tone 6:</i></p>
<p>You who are the hope and refuge of men, O Virgin, through you the Savior of all was born without pain; intercede with him for all who worship you in faith, that through you we may be delivered from all sufferings.</p>
<p><i>Ode 7 — Irmos:</i> The angel made the furnace dewy for the holy youths, while the commandment of God burned the Chaldeans; the tyrant was compelled to cry: Blessed are you, O God of our fathers.</p>
<p>The evil one has seventy times seven kindled the flame of my passions and always puts my heart to death with fornication; therefore I hasten to you, O Lady, deliver me, O Pure One, and grant me repentance before the end.</p>
<p>Do not cast me away, defiled as I am with the mud of my sins, O Lady and Good One; for the adversary, seeing me in despair, mocks me and draws me down to the depths. Grant me repentance before the end.</p>
<p><i>Glory:</i> The dreadful judgment seat, O my passionate and insensate soul, brings torments that are endless and terrible; but draw near now to the Mother of the Good One, and beg before the end to obtain repentance.</p>
<p><i>Now and ever:</i> I am darkened, being full of passion, with the multitude of countless sins, and have defiled soul, body, and mind; therefore, O most pure one, intercede for me, that the Judge may grant me repentance before the end.</p>
<p><i>Ode 8 — Irmos:</i> From the flame you poured dew upon the holy ones, and the righteous man's sacrifice you burned with water; for you do all things by will alone, O Christ; we exalt you unto all ages.</p>
<p>You who bore the one God of the Trinity made flesh, and carried him in your arms, O Virgin Mother, quench the blazing fire of my passions, and grant me, the poor one, tears, that I may pass my life well, and glorify you unto all ages.</p>
<p>I tremble at the coming of death, O most pure one, and I now fear the judgment; yet committing sin, I am not at all ashamed; be merciful to me, O Lady, and grant me tears of compunction and repentance, that I may glorify you unto all ages.</p>
<p><i>Glory:</i> Grant me unceasing groaning and pour clouds of tears upon me, that I may wash away my many sins and incurable wounds, and that the great Physician of souls may grant me healing through you; for I glorify you unto all ages.</p>
<p><i>Now and ever:</i> I confess to you, O Lady, the multitude of my sins, for none in all the world has provoked God, your Son and Lord, as I have; but in your love for mankind, intercede for me, that he may grant me repentance before the end, and I will glorify him unto all ages.</p>
<p><i>Ode 9 — Irmos:</i> It is impossible for men to behold God upon whom the angelic orders dare not gaze; but through you, O most pure one, the incarnate Word appeared to us; glorifying him with the heavenly hosts, we call you blessed.</p>
<p>Behold, I come to you, O most pure one, with great fear and love, for your servant knows the power of your prayer, since truly you are the Mother of God; and I trust in your mediation, O Lady, grant me tears before the end.</p>
<p>Accept the ranks of archangels and the multitude of the heavenly hosts of my Creator; the choirs of apostles and prophets, and martyrs, and all the saints; through them, O pure one, intercede for me before the end, that I may gain repentance.</p>
<p><i>Glory and now:</i> Now and when my spirit departs, may I find your help, O pure one; quickly deliver me from the demons who come against me, and from eternal torment, and deem me worthy of the Kingdom of Heaven, O most pure one, and grant me repentance before the end.</p>
<p><i>To you, O Theotokos:</i> I await the merciful judgment of your compassionate Son, O pure one; do not despise me, but make him favorable to me, who stand before him in fear; deem me worthy of your right hand and grant me repentance before the end, that I may glorify you.</p>
<p>It is truly meet to call you blessed, O Theotokos, ever-blessed and most pure and the Mother of our God. More honorable than the cherubim, and more glorious beyond compare than the seraphim; without corruption you gave birth to God the Word; true Theotokos, we magnify you.</p>
<p>Holy God, Holy Mighty, Holy Immortal, have mercy on us. <i>(3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>O Most Holy Trinity, have mercy on us. O Lord, cleanse us of our sins. O Master, pardon our iniquities. O Holy One, visit and heal our infirmities for your name's sake.</p>
<p><i>Lord, have mercy. (3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>Our Father, who art in heaven, hallowed be Thy name; Thy kingdom come; Thy will be done on earth as it is in heaven. Give us this day our daily bread, and forgive us our trespasses as we forgive those who trespass against us; and lead us not into temptation, but deliver us from evil.</p>
<p><i>Priest:</i> For Thine is the kingdom, and the power and the glory, of the Father, and of the Son, and of the Holy Spirit, now and ever, and unto ages of ages.</p>

<p><b><i>Lord of Hosts</i></b></p>
<p><i>Troparion, Tone 6:</i></p>
<p>O Lord of Hosts, be with us, for in times of distress we have no other helper but you. O Lord of Hosts, have mercy on us. <i>(with small bows)</i></p>
<p><i>Verse:</i> Praise God in his sanctuary; praise him in his mighty firmament.</p>
<p><i>After each verse:</i> O Lord of Hosts, be with us...</p>
<p><i>Verse:</i> Praise him for his mighty deeds; praise him according to his excellent greatness.</p>
<p><i>Verse:</i> Praise him with the sound of a trumpet; praise him with lute and harp.</p>
<p><i>Verse:</i> Praise him with timbrel and dance; praise him with strings and pipe.</p>
<p><i>Verse:</i> Praise him with sounding cymbals; praise him with loud clashing cymbals. Let everything that has breath praise the Lord. Alleluia.</p>
<p><i>Glory:</i> O Lord, had we not had your saints praying for us, and your grace taking pity on us, how could we dare, O Lord, to praise you, we who are wholly unworthy? We do not despair, for you have commanded us to approach you with boldness.</p>
<p><i>Now and ever:</i> The multitude of my sins, O Theotokos, I fall before you, O Pure One, pleading for salvation. Visit my ailing soul and intercede before your Son and our God for the forgiveness of the evil deeds I have committed.</p>
<p>O Most Holy Lady Theotokos! As long as I live, do not forsake me; commit me not to human protection; but yourself intercede for me, and have mercy on me. <i>(with a small bow)</i></p>
<p>All my hope I place in you, O Mother of God; keep me under your protection. <i>(with a small bow)</i></p>
<p><i>Lord, have mercy. (40 times)</i></p>
<p><i>Priest:</i> You who at all times and at every hour, both in heaven and on earth, are worshiped and glorified, O Christ God, who are long-suffering, great in mercy and compassion, who love the just and show mercy to sinners, who call all to salvation through the promise of good things to come: O Lord, in this hour receive our supplications, and direct our lives according to your commandments. Sanctify our souls, cleanse our bodies, correct our thoughts, purify our intentions, and deliver us from every grief, evil, and pain. Surround us with your holy angels, so that guided and guarded by their company, we may attain to the unity of the faith and to the knowledge of your unapproachable glory; for you are blessed unto ages of ages. Amen.</p>
<p><i>Choir:</i> Amen.</p>
<p><i>Lord, have mercy. (3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>More honorable than the cherubim, and more glorious beyond compare than the seraphim, who without corruption gave birth to God the Word, the true Theotokos — we magnify you.</p>
<p>In the name of the Lord, bless, O father.</p>
<p><i>Priest:</i> God, have mercy on us and bless us, shine the light of his face upon us, and have mercy on us.</p>
<p><i>Choir:</i> Amen.</p>
<p><b><i>Prayer of Saint Ephrem the Syrian</i></b></p>
<p>O Lord and Master of my life, take from me the spirit of sloth, despondency, lust for power, and idle talk. <i>(prostration)</i></p>
<p>But grant to me, your servant, a spirit of chastity, humility, patience, and love. <i>(prostration)</i></p>
<p>Yes, O Lord and King, grant me to see my own faults and not to judge my brother, for you are blessed unto ages of ages. Amen. <i>(prostration)</i></p>

<p>O Lord and Master of my life, take from me the spirit of sloth, despondency, lust for power, and idle talk. But grant to me, your servant, a spirit of chastity, humility, patience, and love. Yes, O Lord and King, grant me to see my own faults and not to judge my brother, for you are blessed unto ages of ages. Amen. <i>(prostration)</i></p>

<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>

<p><i>Prayer to the Most Holy Theotokos:</i></p>
<p><i>Priest:</i> O immaculate, undefiled, incorruptible, most pure Virgin, Bride of God and Lady: who united God the Word with mankind through your most glorious childbearing, and joined together the fallen nature of our race with the heavenly; who are the only hope of the hopeless, the helper of the oppressed, the ready protection of those who flee to you, the refuge of all Christians: do not abhor me, a sinner and defiled, who with shameful thoughts, words, and deeds have made myself utterly unprofitable, and through indolence have become a slave to the pleasures of life. But as the Mother of the God who loves mankind, have compassion and show mercy to me, who am a sinner and prodigal, and accept my prayer offered from unclean lips; and using your motherly boldness intercede with your Son and our God to grant me, before the end, a turning away from my sins, and amendment of life, and the attainment of heaven — with all the saints unto ages. Amen.</p>
<p><i>Choir:</i> Amen.</p>
<p><i>Prayer to Jesus Christ:</i></p>
<p><i>Priest:</i> And grant us, O Master, as we go to sleep, rest for our bodies and souls, and protect us from the dark sleep of sin and from every dark and nocturnal pleasure. Calm the impulses of the passions, quench the burning arrows of the evil one which are craftily cast at us. Repress the rebellions of the flesh, and put to sleep every earthly and material thought. And grant us, O God, a watchful mind, a sound conscience, a wakeful heart, a light sleep, and freedom from every satanic dream. And raise us up again at the hour of prayer, established in your commandments and holding firm in your memory within us. Grant us to glorify, praise, and thank your goodness throughout the night, that we may offer praise and blessing and thanksgiving to you, the Father, and to your only-begotten Son, and to your all-holy and good and life-giving Spirit, now and ever, and unto ages of ages. Amen.</p>
<p><i>Choir:</i> Amen.</p>
<p><b><i>Dismissal</i></b></p>
<p><i>Choir:</i> Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p><i>Lord, have mercy. (3 times) Bless.</i></p>
<p>O O Most Glorious Ever-Virgin Theotokos! Bear our prayers to your Son and our God, and may he save our souls through you.</p>
<p>Our hope is the Father; our refuge is the Son; our protection is the Holy Spirit; O Holy Trinity, glory to you.</p>
<p><i>Mutual Forgiveness:</i></p>
<p>O most merciful Lord Jesus Christ our God, through the prayers of your most pure Mother, our Lady Theotokos and Ever-Virgin Mary, and of all the saints, lead us, your sinners and unworthy servants, to the peaceful and quiet haven of your most holy will, for you are the true God, who loves mankind, and to you we send up glory: to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p><i>Faithful:</i> Amen.</p>
<p><i>Priest:</i> Bless us, fathers and brothers, and forgive me, a sinner, for whatever I have sinned this day <i>(or: tonight)</i> and throughout all the days of my life, in word, deed, and thought, and in all my senses.</p>
<p><i>Faithful:</i> May God forgive and have mercy on you, reverend father. Bless us and forgive us our sins, reverend father.</p>
<p><i>Priest:</i> May the Lord God forgive your sins in his mercy and have mercy on you.</p>
<p>By the prayers of our holy fathers, O Lord Jesus Christ our God, have mercy on us.</p>
<p><i>Faithful:</i> Amen.</p>`;

<p>Нема здорового нічого на моїм тілі з-за гніву твого;* немає цілого нічого в моїх костях із-за гріху мого.</p>

<p>Зомлів я, розбитий понад міру,* і скиглю від стогону серця мого.</p>

<p>Серце моє розколотилось, сила мене полишила,* і навіть очей моїх світло, – і того вже нема в мене.</p>
<p>Друзі мої та приятелі далекі від моєї рани,* і родичі мої стоять оподаль.</p>
<p>І ті, що на моє життя зазіхають, тенета наставляють,* і ті, що бажають мені нещастя, говорять про погибель, увесь час міркують лукаве.</p>
<p>Я, немов глухий, не чую,* і як німий, що уст своїх не відкриває.</p>
<p>Я став, немов людина, що не чує,* в устах якої одвіту немає.</p>
<p>На тебе бо, о Господи, я уповаю,* ти вислухаєш мене, Господи, мій Боже.</p>
<p>Кажу бо: Нехай не втішаються наді мною, як захитається моя нога,* нехай не несуться проти мене.</p>
<p>Я бо ось-ось уже маю впасти,* і біль мій передо мною завжди.</p>
<p>Я бо провину мою визнаю,* і гріхом моїм журюся.</p>
<p>А ті, що без причини зо мною ворогують, ростуть на силі,* чимало тих, що мене безпідставно ненавидять.</p>
<p>І ті, що злом оддячують за добро,* вони проти мене, бо я про добро дбаю.</p>
<p>Не покидай мене, о Господи,* не віддаляйся від мене, мій Боже.</p>

<p>Боже, ти Бог мій!* Тебе шукаю пильно.</p>

<p>Отак і я у святині тебе виглядаю:* побачити силу твою й твою славу.</p>

<p>Бо ти прийшов мені на допомогу,* і в тіні крил твоїх я ликуватиму.</p>
<p>Душа моя до тебе лине,* мене підтримує твоя правиця.</p>
<p>Ті ж, які чигають на мою душу,* зійдуть у безодні підземні.</p>
<p>Їх віддадуть мечеві на поталу,* вони шакалів здобиччю стануть.</p>
<p>А цар возвеселиться в Бозі, хвалитиметься кожен, хто ним клянеться,* уста бо тих, що неправду кажуть, будуть закриті.</p>
<p>Слава Отцю, і Сину, і Святому Духові, і нині і повсякчас, і на віки віків. Амінь.</p>
<p>Алилуя, алилуя, алилуя, слава Тобі, Боже. <i>(3 р.), без поклонів</i>.	</p>
<p>Господи, помилуй. <i>(3 р.)</i>. Слава, і нині:</p>
<p><b><i>	Псалом 87 (у четвер)	</i></b></p>
<p>Господи, Боже мого спасіння,* я вдень кличу, і вночі перед тобою скаржусь.</p>
<p>Нехай прийде перед твоє обличчя моя молитва!* Прихили своє вухо до мого благання.</p>
<p>Душа бо моя наситилася горем,* і життя моє наблизилося до шеолу.</p>

<p>Поміж мерцями моє ложе, немов убиті, що лежать у могилі,* що їх не згадуєш уже більше, що їх відтято від руки твоєї.</p>

<p>Ось чому, Господи, до тебе я взиваю,* і моя молитва вранці йде тобі назустріч.</p>
<p>Чому, Господи, відкинув ти мою душу,* чому ховаєш своє обличчя від мене?</p>

<p>Увесь час вони оточують мене, мов води,* усі разом мене обступили.</p>

<p><b><i>Псалом 102 (у п'ятницю)</i></b></p>
<p>Благослови, душе моя, Господа,* і все нутро моє − його святе ім'я.</p>
<p>Благослови, душе моя, Господа,* і не забувай усіх добродійств його ніколи.</p>
<p>Він прощає всі твої провини,* зціляє всі твої недуги.</p>
<p>Він визволяє життя твоє від ями,* вінчає тебе ласкою і милосердям.</p>

<p>Господь творить правосуддя,* і суд усім прибитим. Він показав Мойсеєві свої дороги,* синам Ізраїля діла свої.</p>
<p>Милосердний Господь і добрий,* повільний до гніву й вельми милостивий.</p>

<p>І справедливість його над дітьми дітей тих,* що бережуть його союз і про заповіді його пам’ятають, щоб їх виконувати.</p>
<p>Господь на небі утвердив престол свій,* і царство його всім володіє.</p>
<p>Благословіте Господа, всі ангели його,* могутні силою, ви, що виконуєте його слово, – покірні голосові його слова.</p>

<p>Благословіте Господа, усі його твори, по всіх місцях його правління.* Благослови, душе моя, Господа!</p>
<p><b><i>Псалом 142 (у суботу й неділю)</i></b></p>
<p>О Господи, почуй мою молитву,* у твоїй вірності нахили вухо своє до мольби моєї; вислухай мене в твоїй правді.</p>
<p>І не входь у суд із твоїм слугою,* бо ніхто з живих не виправдається перед тобою.</p>
<p>Бо мою душу гонить ворог, життя моє топче в Землю,* він оселює мене в пітьмі, як давно померлих.</p>
<p>Дух мій тривожиться в мені* і серце моє жахається в мені всередині.</p>

<p>Живи мене, о Господи, імени твого ради,* у справедливості твоїй виведи з скорботи мою душу.</p>
<p>І в гніві твоєму знищ моїх супротивників.* І вигуби всіх гнобителів душі моєї, бо я твій слуга.</p>
<p>Слава Отцю, і Сину, і Святому Духові: І нині і повсякчас, і на віки віків. Амінь.</p>
<p>Алилуя, алилуя, алилуя: Слава тобі, Боже! <i>(3 р.)</i></p>
<p><i>Під час рецитування псалмів, священик читає потиху перед св. дверми оці молитви:</i></p>
<details><summary>Утренні молитви</summary><ol><li> Благодаримо Тебе, Господи, Боже наш, що підняв нас із постелі нашої і вклав в уста наші слово хвали, щоб поклонятися і призивати ім'я Твоє святе. Ми благаємо Твоє милосердя, яке Ти завжди виявляв у нашому житті. Пошли поміч свою людям, що стоять перед лицем святої слави Твоєї і дожидають від Тебе багатої милости; і дай нам, що зо страхом і любов'ю завжди Тобі служимо, хвалити несказанну Твою доброту. Бо Тобі належить усяка слава, честь і поклоніння: Отцю, і Сину, і Святому Духові, нині і повсякчас, і на віки віків. Амінь.</li>
<li> Від ночі лине дух наш до Тебе, Боже, бо світлом є повеління Твої на землі. Навчи нас у страсі Твоєму виконувати правду й добро, бо Тебе славимо як правдивого Бога нашого. Прихили вухо своє і вислухай нас, і пом'яни, Господи, тих, що є та що моляться з нами, всіх по імені, і спаси їх силою Твоєю. Благослови людей Твоїх і освяти спадкоємство Твоє: мир світові Твоєму даруй, церквам Твоїм, Священникам, владі, і всім людям. Хай благословиться і прославляється всечесне і величне ім'я Твоє, Отця, і Сина, і Святого Духа, нині і повсякчас, і на віки віків. Амінь.</li>
<li> Від ночі лине дух наш до Тебе, Боже, бо світлом є повеління Твої. Навчи нас, Боже, правди Твоєї, заповідей Твоїх і виправдань Твоїх. Просвіти наші духовні очі, щоб ми не заснули в гріхах на смерть. Віджени всяку мряку від сердець наших, даруй нам сонце правди і охорони життя наше знаменням і печаттю Святого Твого Духа. Направ стопи наші на шлях мирний, дай нам бачити ранішній день у радості, щоб ми Тобі засилали ранішні молитви, бо Твоє є володіння і Твоє є царство і сила, і слава Отця, і Сина, і Святого Духа, нині і повсякчас, і на віки віків. Амінь.</li>
<li> Владико, Боже святий і неосяжний, що казав із темряви світлові засіяти, що заспокоїв нас у нічному сні й підвів до величання і моління Твоєї доброти! Ти, що даєш себе умолити задля свого милосердя, прийми і нині нас, що поклоняємося Тобі й по силі благодаримо Тебе; і даруй нам те, чого просимо задля спасіння. Вчини нас синами світла і дня та спадкоємцями вічних Твоїх благ. Пом'яни, Господи, за багатством ласк Твоїх усіх людей, що є і моляться з нами, і всю братію нашу на землі й на морі, і на всякому місці володіння Твого, що потребують Твоєї любови й помочі. Усім вияви велику Твою милість, щоб спасенні, як душею так і тілом, завжди перебували й відважно славили чудне й благословенне ім'я Твоє, бо Ти Бог милости і ласк, і любови, і Тобі славу возсилаємо: Отцю, і Сину, і Святому Духові, нині і повсякчас, і на віки віків. Амінь.</li>
<li> Скарбнице благ, джерело невисихаюче, Отче святий, чудотворче всесильний і вседержителю! Усі Тобі поклоняємося і Тобі молимося та Твої милості і Твої ласки призиваємо на поміч і на заступництво нашій смиренності. Пом'яни, Господи, слуг Твоїх, прийми від усіх нас ранішні моління, як кадило перед Тобою; ні одного з нас не вчини нездатним, але всіх нас зберігай ласками Твоїми. Пом'яни, Господи, тих, що чувають і співають на славу Твою і єдинородного Твого Сина і Бога нашого, і Святого Твого Духа. Будь їм помічником і заступником; прийми їх молитви на наднебесний і духовний Твій жертовник, бо Ти Бог наш, і Тобі славу возсилаємо: Отцю, і Сину, і Святому Духові, нині і повсякчас, і на віки віків. Амінь.</li>
<li> Благодаримо Тебе, Господи, Боже спасіння нашого, бо Ти все робиш для добра життя нашого, щоб ми завжди на Тебе споглядали, Спасителю й Доброчинцю душ наших. Бо Ти дав спокій нам у час минулої ночі й підвів нас, щоб ми поклонялися величному імені Твоєму. Тому молимо Тебе, Господи: Дай нам ласку й силу, щоб ми стали гідними співати Тобі розумно й молитися безупинно та в страсі і тремтінні над нашим спасінням працювали, при заступництві Христа Твого. Пом'яни, Господи, і тих, що вночі до Тебе кличуть. Вислухай їх і помилуй, і круши під ноги їх невидимих і войовничих ворогів. Бо Ти Цар миру і Спас душ наших, і Тобі славу возсилаємо: Отцю і Сину, і Святому Духові, нині і повсякчас, і на віки віків. Амінь.</li>
<li> Боже й Отче Господа нашого Ісуса Христа! Ти підніс нас з постелі нашої і зібрав на годину молитви. Дай нам ласку відкрити уста наші і прийми наші подяки, що в наших силах, і навчи нас установ Твоїх. Бо молитися як слід не вміємо, якщо Ти, Господи, святим Твоїм Духом не навчиш нас. Тому молимося Тобі: Даруй і прости, якщо ми згрішили аж до теперішньої години словом або ділом, або думкою, добровільно або недобровільно. Бо коли на провини будеш дивитися, Господи, Господи, то хто встоїться, бо в Тебе є прощення. Ти один святий, допоміжник сильний, захисник життя нашого, і Тебе ми завжди оспівуватимемо. Нехай буде сила Царства Твого завжди благословенна і вельми прославлювана: Отця, і Сина, і Святого Духа, нині і повсякчас, і на віки віків. Амінь.</li>
<li> Господи, Боже наш, що сонну неміч забрав від нас і покликав нас візванням святим, щоб і вночі підносити руки наші і прославляти Тебе за справедливі Твої присуди. Прийми благання наші, моління, визнавання, нічні служби і даруй нам, Боже, віру бездоганну, надію впевнену, любов нелицемірну. Благослови наші входи й виходи, вчинки, слова, діла й думки; і дай нам дочекатися початку дня, нам, що хвалять й оспівують, і благословлять добрість Твоєї несказанної сили, щоб було благословенне Твоє пресвяте ім'я і прославлене Твоє царство: Отця, і Сина, і Святого Духа, нині і повсякчас, і на віки віків. Амінь.</li>
<li> Господи, Боже наш! Ти за покаяння дарував людям відпущення, нам же, як образ пізнання і визнання гріхів, показав покаяння і прощення пророка Давида. Тож, Владико, помилуй з великої милости Твоєї нас, що в чимало великих гріхів впали, і по багатстві ласк Твоїх очисти беззаконня наші, бо перед Тобою згрішили ми, Господи, що невідомі й таємні речі серця людського знаєш, і єдиний Ти маєш владу прощати гріхи. Серце ж чисте вчини в нас і Духом владичним утверди нас, і радість спасіння Твого яви нам. Не відкинь нас від лиця Твого, але дозволь, як благий і людинолюбний, аж до останнього нашого віддиху появляти Тобі жертву справедливости й приноси на святих Твоїх жертовниках, милістю і ласками і людинолюб'ям єдинородного Сина Твого, з яким Ти є благословенний з пресвятим, добрим і животворчим Твоїм Духом, нині й повсякчас, і на віки віків. Амінь.</li>
<li> Боже, Боже наш! Ти сотворив розумні й духовні сили Своєю волею. Тебе просимо й Тобі молимося: Прийми наші посильні величання з усіма Твоїми творіннями і збагати щедрими даруваннями Твоєї ласки. Бо перед Тобою згинається всяке коліно: на небі, на землі й під землею, і все, що живе, і все створіння оспівує неосяжну Твою славу, бо Ти Бог правдивий і вельми милостивий. Тебе бо хвалять усі небесні сили, і Тобі славу возсилаємо: Отцю, і Сину, і Святому Духові, нині і повсякчас, і на віки віків. Амінь.</li>
<li> Хвалимо, співаємо, благословимо і благодаримо Тебе, Боже батьків наших, бо Ти забрав тінь нічну і явив нам знову світло денне. Молимо Твою добрість: Милостивий будь для нас грішних і прийми молитву нашу задля великої Твоєї ласкавости, бо ми прибігаємо до Тебе, милостивого і всемогутнього Бога. Ти, що засвітив у серцях наших правдиве сонце справедливости Твоєї! Просвіти розум наш і почування всі зберігай, щоб, як у день, ходили ми пристойно шляхом заповідей Твоїх і дійшли до життя вічного, і стали гідними насолоджуватися недоступним Твоїм світлом. Бо в Тебе є джерело життя, Ти Бог наш і Тобі славу возсилаємо: Отцю, і Сину, і Святому Духові, нині і повсякчас, і на віки віків. Амінь.</li>
</ol></details>
<h3><b><i>Мирна ектенія</i></b></h3>
<p>У мирі Господеві помолімся.</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>За мир з висот і спасіння душ наших Господеві помолімся.</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>За мир усього світу, добрий стан святих Божих церков і з’єднання всіх Господеві помолімся.</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>За святий храм цей і тих, що з вірою, благоговінням і страхом Божим входять до нього, Господеві помолімся.</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>За святішого вселенського архиєрея Лева, папу Римського, і за блаженнішого патріярха нашого Святослава, і за преосвященнішого архиєпископа і митрополита нашого кир <i>ім’я,</i> і за боголюбивого єпископа нашого кир <i>ім’я,</i> чесне пресвітерство, у Христі дияконство, за весь причет і людей Господеві помолімся.</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>За Богом бережений народ наш, за правління і все військо Господеві помолімся.</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>За місто це (<i>або</i> за село це, <i>або</i> за святу обитель цю), і за кожне село, місто, країну, і за тих, що вірою живуть у них, Господеві помолімся.</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>За добре поліття, за врожай плодів земних і часи мирні Господеві помолімся.</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>За тих, що плавають, подорожують, за недужих, страждаючих, полонених – і за спасіння їх Господеві помолімся.</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>Щоб визволитися нам від усякої скорботи, гніву й нужди, Господеві помолімся.</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>Заступи, спаси, помилуй і охорони нас, Боже, Твоєю благодаттю</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>Пресвяту, пречисту, преблагословенну, славну Владичицю нашу Богородицю і приснодіву Марію, з усіма святими пом’янувши, самих себе, і один одного, і все життя наше Христу Богові віддаймо.</p>
<p><i>Вірні:</i> Тобі́, Го́споди.</p>
<p><em>[Благодаримо Тебе, Господи, Боже наш, що підняв нас із постелі нашої і вклав в уста наші слово хвали, щоб поклонятися і призивати ім'я Твоє святе. Ми умоляємо Твоє милосердя, яке Ти завжди виявляв у нашому житті. Пошли поміч свою людям, що стоять перед лицем святої слави Твоєї і дожидають від Тебе багатої милости; і дай нам, що зо страхом і любов'ю завжди Тобі служимо, хвалити несказанну Твою доброту.]</em></p>
<p><i>Священник:</i> Бо Тобі належить усяка слава, честь і поклоніння, Отцю, і Сину, і Святому Духові, нині, і повсякчас, і на віки віків.</p>
<p><i>Вірні:</i> Амінь.</p>
<h2><b><i>Алилуя на глас 6:</i></b></h2>
<p>Алилуя, Алилуя, Алилуя.</p>
<p><i>Стих:</i> <em>З ночі лине дух мій до тебе, Боже, бо світло на землі – повеління твої.</em></p>
<p><i>Стих:</i> <em>Справедливості навчіться ви, що живете на землі.</em></p>
<p><i>Стих:</i> <em>Заздрість охоплює людей ненавчених.</em></p>
<p><i>Стих:</i> <em>Упокори їх, Господи, упокори славних землі.</em></p>
<p><b><i>Троїчні пісні:</i></b></p>
<p><i>(г. 6):</i> Безтілесними устами, безупинними славослов’ями,* шестикрилі співають тобі трисвяту пісню, Боже наш;* тож і ми, що на землі, недостойними устами хвалу тобі вчиняємо:* Свят, свят, свят єси, Боже наш,* силою Хреста Твого, охорони нас.</p>
<p><b>Слава:</b> Херувими стоять перед тобою з острахом,* серафими жахаються з тремтінням* і, невмовкаючим голосом, трисвяту пісню приносять:* З ними і ми грішні співаємо:* Свят, свят, свят єси, Боже наш!* Задля молитов усіх святих Твоїх, помилуй нас.</p>
<p><b>І нині:</b> Славимо Божество в потрійній одності з'єднане, але не змішане,* і ангельську пісню співаємо:* Свят, свят, свят єси, Боже наш!* Богородиці ради, помилуй нас.</p>
<h3><b><i>Після першого стихослов'я</i></b></h3>
<p><i>(г. 6): </i>Хрест твій, Господи, освятився:* ним бо зціляються ті, що нездужають гріхами.* Тому припадаємо перед тобою: помилуй нас!</p>
<p><b>Слава і нині</b>: Бачивши повішеного на дереві мертвого Господа,* якого тілом породила,* Діва плачучи, кликала:* Подивляю твоє, Сину, несказанне довготерпіння!* Як же то беззаконні прибили до хреста, немов злочинця, тебе* – праведного Суддю і єдиного Владику?</p>
<p>Ще і ще в мирі Господеві помолімся.</p>
<p><i>Вірні:</i> Господи, помилуй.</p>
<p> [<em>Від ночі лине дух наш до тебе, Боже, бо світлом є повеління твої. Навчи нас, Боже, правди твоєї, заповідей твоїх і виправдань твоїх. Просвіти наші духовні очі, щоб ми не заснули в гріхах на смерть. Віджени всяку мряку від сердець наших, даруй нам сонце правди і охорони життя наше знаменням і печаттю Святого твого Духа. Направ стопи наші на шлях мирний, дай нам бачити ранішній день у радості, щоб ми тобі засилали ранішні молитви</em>]</p>
<p><i>Священник:</i> Бо Твоя є влада і Твоє є царство, і сила, і слава, Отця, і Сина, і Святого Духа, нині, і повсякчас, і на віки віків.</p>
<p><i>Вірні:</i> Амінь.</p>
<h3><b><i>Після другого стихослов'я</i></b></h3>
<p><i>(г. 3, подібний: Красотою дівицтва):</i> Владико, піднесений на хрест,* ти полум'я переступу згасив;* а добровільно життя віддавши, умертвив і ворога.* Тому благаю тебе:* Умертви пожадання мого тіла й оживи, Милосердний,* моє окаянне серце,* очищуючи від усякої скверни постом, що вигублює пристрасті.</p>
<p><b>Слава і нині: </b>Ганебну смерть і розп'яття* витерпів ти добровільно, Щедрий,* а Родителька твоя, бачивши це, страждала.* Тому, її мольбами,* задля твого милосердя, змилуйся і спаси світ,* єдиний предобрий Людинолюбче Господи,* що взяв на себе гріхи світу.</p>
<p>Ще і ще в мирі Господеві помолімся.</p>
<p><i>Вірні:</i> Господи, помилуй.</p>
<p><em> [Боже й Отче Господа нашого Ісуса Христа! Ти підніс нас з постелі нашої і зібрав на годину молитви. Дай нам ласку відкрити уста наші і прийми наші подяки, що в наших силах, і навчи нас установ твоїх. Бо молитися як слід не вміємо, якщо ти, Господи, святим твоїм Духом не навчиш нас. Тому молимося тобі: Даруй і прости, якщо ми згрішили аж дотеперішньої години словом або ділом, або думкою, добровільно або недобровільно. Бо коли на провини будеш дивитися, Господи, Господи, то хто встоїться, бо в тебе є прощення. Ти один святий, допоміжник сильний, захисник життя нашого, і тебе ми завжди оспівуватимемо.]</em></p>
<p><i>Священник:</i> Бо Ти благий і людинолюбний Бог – і Тобі славу возсилаємо, Отцю, і Сину, і Святому Духові, нині, і повсякчас, і на віки віків.</p>
<p><i>Вірні:</i> Амінь.</p>
<h3><b><i>Після третього стихослов'я</i></b></h3>
<p><i>(г. 2):</i> Радісно звершуючи посну трапезу, кличемо:* Збережи всіх нас, Господи, у мирі,* визволяючи від усякого ворожого підступу.* Сподоби нас, Предобрий, твій чесний хрест з любов'ю цілувати,* бо його ти, єдиний многомилостивий, подаєш вселенній заради своєї милости.</p>
<p><b>Слава і нині: </b>Діва і Мати твоя, Христе,* бачивши тебе на хресті повішеного і мертвого,* гірко плачучи, ридала:* Сину мій, що це за дивне таїнство?* Як це ти, що всім даєш життя вічне,* добровільно вмираєш на хресті ганебною смертю?</p>
<h3><b><i>Псалом 50</i></b></h3>
<p>Помилуй мене, Боже, з великої милости твоєї,* і багатством щедрот твоїх очисти мене з беззаконня мого.</p>
<p>Обмий мене повнотою з беззаконня мого,* і від гріха мого очисти мене.</p>
<p>Бо беззаконня моє я знаю,* і гріх мій є завжди передо мною.</p>
<p>Проти тебе єдиного я згрішив* і перед тобою зло вчинив;</p>
<p>То й правий ти в словах твоїх* і переможеш, коли будеш судити.</p>
<p>Це бо в беззаконнях я зачатий,* і в гріхах породила мене мати моя.</p>
<p>Це бо істину полюбив єси,* невідоме й таємне мудрости своєї явив ти мені.</p>
<p>Окропи мене іссопом, і очищуся,* обмий мене, і стану біліший від снігу.</p>
<p>Дай мені відчути радість і веселість,* зрадіють кості сокрушені.</p>
<p>Відверни лице твоє від гріхів моїх,* і всі беззаконня мої очисти.</p>
<p>Серце чисте створи в мені, Боже,* і духа правого обнови в нутрі моєму.</p>
<p>Не відкинь мене від лиця твого,* і Духа твого Святого не відійми від мене.</p>
<p>Поверни мені радість спасіння твого,* і духом владичним утверди мене.</p>
<p>Вкажу беззаконним дороги твої,* і нечестиві до тебе навернуться.</p>
<p>Визволь мене від вини крови, Боже, Боже спасіння мого,* і язик мій радісно прославить справедливість твою.</p>
<p>Господи, губи мої відкрий,* і уста мої сповістять хвалу твою.</p>
<p>Бо якби ти жертви захотів, дав би я,* та всепалення не миле тобі.</p>
<p>Жертва Богові – дух сокрушений,* серцем сокрушеним і смиренним Бог не погордить.</p>
<p>Ущаслив, Господи, благоволінням твоїм Сіон,* і нехай відбудуються стіни єрусалимські.</p>
<p>Тоді вподобаєш собі жертву правди, приношення і всепалення;* тоді покладуть на вівтар твій тельців.</p>
<h3><b><i>Ектенія:</i></b></h3>
<p>Спаси́, Бо́же, наро́д Твій і благослови́ спадкоє́мство Твоє́, навідай світ Твій ми́лістю і щедро́тами, вознеси́ ріг христия́н правосла́вних і зішли́ на нас бага́ті Твої ми́лості: моли́твами всепречи́стої Влади́чиці на́шої Богоро́диці і Приснодіви Марії, си́лою чесно́го і животворя́щого Хреста́, засту́пництвом чесни́х Небе́сних Сил безплотних, чесно́го, сла́вного проро́ка, Предте́чі і Хрести́теля Йоа́на, святи́х сла́вних і всехва́льних Апо́столів; святи́х отців на́ших і вселе́нських вели́ких учителів і святи́телів Васи́лія Вели́кого, Григо́рія Богосло́ва та Йоа́на Золотоу́стого; Атана́сія і Кири́ла; свято́го отця́ на́шого Микола́я, архиєпи́скопа Мир Лікійських, чудотво́рця; святи́х рівноапо́стольних Кири́ла і Мето́дія, учителів слов’я́нських; свято́го благовірного і рівноапо́стольного вели́кого кня́зя Володи́мира і блаже́нної вели́кої княги́ні Ольги; свято́го священному́ченика Йосафа́та; святи́х сла́вних і добропобідних му́чеників; блаже́нних новому́чеників та ісповідників українських; преподо́бних і богоно́сних отців на́ших Антонія і Теодо́сія Пече́рських та інших преподо́бних і богоно́сних отців на́ших; святи́х і пра́ведних богоотців Йоаки́ма і Анни; і свято́го <i>(ім’я, що його́ є храм цей)</i>, і святого отця нашого Софронія, патріарха Єрусалимського, і всіх cвяти́х: мо́лимо Тебе́, многоми́лостивий Го́споди, ви́слухай нас грішних, що мо́лимось Тобі, і поми́луй нас.</p>
<p><i>Вірні:</i> Господи, помилуй <i>(12 р.).</i></p>
<p><em>[Господи, Боже наш! Ти за покаяння дарував людям відпущення, нам же, як образ пізнання і визнання гріхів, показав покаяння і прощення пророка Давида. Тож, Владико, помилуй з великої милости твоєї нас, що в чимало великих гріхів впали, і по багатстві ласк твоїх очисти беззаконня наші, бо перед тобою згрішили ми, Господи, що невідомі й таємні речі серця людського знаєш, і єдиний ти маєш владу прощати гріхи. Серце ж чисте вчини в нас і Духом владичним утверди нас, і радість спасіння твого яви нам. Не відкинь нас від лиця твого, але дозволь, як Добрий і Людинолюбець, аж до останнього нашого віддиху появляти тобі жертву справедливости й приноси на святих твоїх жертовниках]</em></p>
<p><i>Священник:</i> Благодаттю, і щедротами, і людинолюб’ям єдинородного Сина Твого, з яким Ти благословенний, із пресвятим, і благим, і животворчим твоїм Духом, нині, і повсякчас, і на віки віків.</p>
<p><i>Вірні:</i> Амінь.</p>
<h2><b><i>Канон - Тріодь</i></b></h2>
<i>(Якщо скорочується Канон, перейди до <a href="#magnificat">Пісня Богородиці</a>).</i>
<p><i>Пісня 3</i></p>
<p>Утвердилося серце моє у Господі, піднісся ріг мій у Бозі моїм.</p>
<p>Розкрилися уста мої на ворогів моїх: звеселилась я спасінням Твоїм!</p>
<p>Бо нема святого, як Господь,* і нема праведного, як Бог наш,* і нема святого, крім Тебе.</p>
<p>Не хваліться і не говоріть високого в гордині,* і хай не вийде самохвальство із уст ваших,</p>
<p>бо Бог – відання Господь,* і Бог, що уготовляє почини Свої.</p>
<p>Лук сильних ослаб,* а немічні перепоясалися силою;</p>
<p>сповнені хлібом – зубожіли,* а голодні – заселили землю;</p>
<p>бо неплідна породила сімох,* а багата на дітей – зав’яла.</p>
<p>Господь мертвить і живить,* зводить до аду і виводить;</p>
<p>Господь зубожує і збагачує, принижує і вивищує.* Піднімає з землі вбогого, і з гноїща підносить злидаря,</p>
<p>щоб посадити його з можними народу* і престіл слави дати у спадщину йому.</p>
<p>Дає молитву молільникові* і благословляє літа праведного,</p>
<p>бо не силою могутній муж.* Господь немічним учинить супостата Свого, Господь Свят.</p>
<p>Хай не хвалиться мудрий мудрістю своєю,* і хай не хвалиться сильний силою своєю,* і хай не хвалиться багатий багатством своїм,</p>
<p>але сим хай хвалиться хвалій:* що розуміє і знає Господа,* і чинить суд і правду посеред землі.</p>
<p>Господь зійшов на небеса і загримів,* Він, Праведний, судитиме кінці землі,</p>
<p>і дасть кріпость цареві нашому,* і піднесе ріг христа Свого.</p>
<p><b><i>Тріодь, </i></b><i>глас 3</i></p>
<p><i>Пісня 3 Ірмос:</i> <b>Твердине тих, що на Тебе уповають,* - утверди, Господи, Церкву Твою,* яку Ти придбав* пресвятою своєю кров’ю.</b> </p>
<p><i>Стих:</i> <em>Слава тобі, Боже наш, слава тобі.</em></p>
<p>Розпинаючись разом із Розп’ятим задля нас, умертвімо всі плотські члени в постах, молитвах і моліннях.</p>
<p><i>Стих:</i> <em>Слава тобі, Боже наш, слава тобі.</em></p>
<p>Ти, що терня гріха викорінив хрестом Твоїм, Господи, вирви тернину помислів ума мого. </p>
<p><i>Стих:</i> <em>Слава тобі, Боже наш, слава тобі.</em></p>
<p>Озброївши думки постом, перемагаймо ворожі полчища бісівські, силою хреста укріплені. </p>
<p><b>Слава і нині: </b><i>Богородичний:</i> Воплочене Слово із тебе, Пречиста, пройшло, виправляючи падіння праотців, з милосердя щедрот.</p>
<h3><b><i>Мала єктенія</i></b></h3>
<p>Ще і ще в мирі Господеві помолімся.</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>Заступи, спаси, помилуй і охорони нас, Боже, Твоєю благодаттю</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>Пресвяту, пречисту, преблагословенну, славну Владичицю нашу Богородицю і приснодіву Марію, з усіма святими пом’янувши, самих себе, і один одного, і все життя наше Христу Богові віддаймо.</p>
<p><i>Вірні:</i> Тобі́, Го́споди.</p>
<p><em>[Господи, Боже наш, що сонну неміч забрав від нас і покликав нас візванням святим, щоб і вночі підносити руки наші і прославляти Тебе за справедливі Твої присуди. Прийми благання наші, моління, визнавання, нічні служби і даруй нам, Боже, віру бездоганну, надію впевнену, любов нелицемірну. Благослови наші входи й виходи, вчинки, слова, діла й думки; і дай нам дочекатися початку дня, нам, що хвалять й оспівують, і благословлять добрість Твоєї несказанної сили]</em></p>
<p><i>Священник:</i> Бо Ти Бог наш і Тобі славу возсилаємо: Отцю, і Сину, і Святому Духові, нині, і повсякчас, і на віки віків.</p>
<p><i>Вірні:</i> Амінь.</p>
<p><b><i>Пісня 8</i></b></p>
<p>Благословіте, всі діла Господні, Господа,* </p>
<p><i>Приспів:</i> <em>хваліте і превозносіте Його повіки.</em></p>
<p>Благословіте, ангели Господні, небеса Господні Господа,* </p>
<p>Благословіте води всі, що над небесами, всі сили Господні Господа,* </p>
<p>Благословіте, сонце і місяцю, зорі небесні, Господа,* </p>
<p>Благословіте, усі дощі і роси, і всі вітри, Господа,* </p>
<p>Благословіте, вогонь і спека, холод і гарячизна, Господа,* </p>
<p>Благословіте, роси та іней, крига і холоднеча, Господа,* </p>
<p>Благословіте, льоди й сніги, ночі і дні, Господа,* </p>
<p>Благословіте, світло і пітьма, блискавки й хмари, Господа,* </p>
<p>Благословіте, земля, гори і пагорби, і все, що проростає на них, Господа,*</p>
<p>Благословіте, джерела, моря і ріки,* кити, і все, що кишить у водах, Господа,* </p>
<p>Благословіте, всі птиці небесні, дикі звірі й худоба, Господа,* </p>
<p>Благословіте, сини людські, нехай благословить Ізраїль, Господа,*</p>
<p>Благословіте, священники Господні, раби Господні, Господа,* </p>
<p>Благословіте, духи і душі праведних, преподобні і смиренні серцем, Господа,* </p>
<p>Благословіте, Ананія, Азарія і Мисаїл, Господа,* </p>
<p>Благословіте, апостоли, пророки і мученики, Господа,* </p>
<p>Благословім Отця, і Сина, і Святого Духа, - Господа, </p>
<p>і нині, і повсякчас, і на віки віків. Амінь.</p>
<p><i>Пісня 8 Ірмос:</i> <b>Зібрались у нестерпнім вогні* та шкоди від полум’я не зазнавши,* юнаки – провідники побожності, божественну пісню співали:* Усі створіння Господні, благословіть Господа і прославляйте по всі віки. </b></p>
<p><i>Стих:</i> <em>Слава тобі, Боже наш, слава тобі.</em></p>
<p>Хрестом Ти переміг начала і сили темряви, Світлодавче, коли прийдеш владно судити світ увесь, не об’являй, Слове, таємних діл моїх, щоб прославив я Твоє багате милосердя. </p>
<p><i>Стих:</i> <em>Слава тобі, Боже наш, слава тобі.</em></p>
<p>На суд перед судилищем, Судде, став єси, засуджуючи ворожнечу хрестом Твоїм, довготерпеливий Правосуде; тому від вічного осудження визволь тих, що взивають зі страхом, і превозносять Твоє чоловіколюб’я. </p>
<p><i>Стих:</i> <em>Слава тобі, Боже наш, слава тобі.</em></p>
<p>Вогнем посту загартовані діти благочестиві, здійняте полум’я у давнину, божественною росою погасили воістину; і ми, постивши, печі всіх пристрастей вгасімо, щоб уникнути полум’я геєнни. </p>
<p><b>Благословім Отця і Сина і Святого Духа Господа, нині і повсякчас, і на віки віків. Амінь.</b></p>
<p><i>Богородичний:</i> Божа Мудрість із тебе храм собі вчинивши, воплотилася невимовним сходженням, Діво Несупружна, Ти бо єдина із усіх родів вибрана на оселю Слова нетлінного.</p>
<h3 id="magnificat"><b><i>Пісня Богородиці</i></b></h3><p>Богородицю і Матір Світла піснями звеличаймо.</p>
<p><i>Вірні:</i> Величає душа моя Господа,* і дух мій радіє в Бозі, Спасі моїм.</p>
<p>Чеснішу від херувимів,* і незрівнянно славнішу від серафимів,* що без зотління Бога Слово породила,* сущу Богородицю, тебе величаємо. <i>(Після кожного стиха)</i>.</p>
<p>Бо він зглянувся на покору слугині своєї,* ось бо віднині ублажатимуть мене всі роди.</p>
<p>Велике бо вчинив мені Всемогутній, і святе ім'я його.* Милосердя його з роду в рід на тих, які бояться його.</p>
<p>Він виявив потугу рамени свого,* розвіяв гордих у задумах їхніх сердець.</p>
<p>Могутніх скинув з престолів, підняв угору смиренних;* наситив благами голодних, багатих же відіслав з порожніми руками.</p>
<p>Він пригорнув Ізраїля, слугу свого, згадавши своє милосердя,* як обіцяв був батькам нашим – Авраамові і його потомству повіки.</p>
<p><b><i>Пісня 9</i></b></p>
<p><i>Ірмос (г. 3):</i> <b>В законній тіні і прообразі бачимо, вірні, образ:* кожний чоловічої статі, що розкриває лоно - святий Богові.* Тому й первородне Слово, Сина Отця вічного,* первородного з непорочної Матері, величаємо.</b></p>
<p><i>Стих:</i> <em>Слава тобі, Боже наш, слава тобі.</em></p>
<p>Змій, піднесений Мойсеєм на дереві,* був твоїм прообразом, Ісусе,* бо й ти добровільно дав себе піднести на хрест,* і прогнав ядовиту злобу лукавого, привернувши до себе всі народи, Людинолюбче.</p>
<p><i>Стих:</i> <em>Слава тобі, Боже наш, слава тобі.</em></p>
<p>Очисти мене вогнем остраху перед тобою, Христе,* і запали в моїй душі твою божественну любов.* Огороди мене твоїм хрестом;* прадавній бо спокусник обдурив і затемнив мій розум.</p>
<p><i>Стих:</i> <em>Слава тобі, Боже наш, слава тобі.</em></p>
<p>Чинімо піст, браття, супроти безсоромних помислів та злих учинків.* Серця очистьмо і на крилах божественних чеснот піднесімось до небес,* відвернувшись від злоби плазуючих землею похотей,* щоб, просвічені, змогли ми побачити велику Пасху.</p>
<p><b>Слава і нині: </b>Народжений від тебе, Діво, був багатим природою своєю, та зодягнувся він у нашу вбогість.* Невидимий, якого оспівують небесні сили,* став нам видимим і обновив своєю добротою наш понівечений образ.</p>
<p><b><i>Достойно</i></b></p>
<p><i>(г. 6): </i>Досто́йно є воі́стину* велича́ти блаже́нною тебе́, Богоро́дицю,* присноблаже́нну і пренепоро́чну,* і Ма́тір Бо́га на́шого.* Чесні́шу від херуви́мів* і незрівня́нно славні́шу від серафи́мів,* що без зотлі́ння Бо́га Сло́во породи́ла,* су́щу Богоро́дицю, тебе́ велича́ємо.</p>
<p>Ще і ще в мирі Господеві помолімся.</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>Заступи, спаси, помилуй і охорони нас, Боже, Твоєю благодаттю</p>
<p><i>Вірні:</i> Го́споди, поми́луй.</p>
<p>Пресвяту, пречисту, преблагословенну, славну Владичицю нашу Богородицю і приснодіву Марію, з усіма святими пом’янувши, самих себе, і один одного, і все життя наше Христу Богові віддаймо.</p>
<p><i>Вірні:</i> Тобі́, Го́споди.</p>
<p><em>[Боже, Боже наш! Ти сотворив розумні й духовні сили Своєю волею. Тебе просимо й Тобі молимося: Прийми наші посильні величання з усіма Твоїми творіннями і збагати щедрими даруваннями Твоєї ласки. Бо перед Тобою згинається всяке коліно: на небі, на землі й під землею, і все, що живе, і все створіння оспівує неосяжну Твою славу, бо Ти Бог правдивий і вельми милостивий.]</em></p>
<p><i>Священник:</i> Бо Тебе хвалять усі сили небесні і Тобі славу возсилаємо: Отцю, і Сину, і Святому Духові, нині і повсякчас, і на віки віків.</p>
<p><i>Вірні:</i> Амінь.</p>
<h3><b><i>Світильний</i></b><i>:</i></h3>
<p><i>(г. 6):</i> Господи, зішли душам нашим споконвічне Твоє світло,* силою Хреста Твого, і спаси мене.</p>
<p><b>Слава:</b> Господи, зішли душам нашим споконвічне Твоє світло,* задля молитов усіх святих Твоїх, і спаси мене.</p>
<p><b>І нині:</b> Господи, зішли душам нашим споконвічне Твоє світло,* задля молитов Богородиці, і спаси мене.</p>
<h2><b><i>Хвалитні</i></b></h2>
<p><b><i>Псалом 148</i></b></p>
<p>Хваліте Господа з неба,* хваліте його на висотах.</p>
<p>Хваліте його, всі ангели його,* хваліте його, всі воїнства небесні.</p>
<p>Хваліте його, ви − сонце й місяцю,* хваліте його, всі ясні зорі.</p>
<p>Хваліте його, ви – небеса небес* і води, що над небесами.</p>
<p>Нехай вони ім'я Господнє хвалять,* бо він повелів, і створились.</p>
<p>Поставив їх на віки віків* і дав закон, що не перейде.</p>
<p>Хваліте Господа з землі,* кити і всі морські безодні;</p>
<p>Вогонь і град, сніг і туман,* і буйний вітер, який виконує його слово;</p>
<p>Гори й усі пагорби,* садовина й усі кедри;</p>
<p>Звір дикий і скот усілякий,* гад і птах крилатий;</p>
<p>Царі землі й усі народи,* князі й усі земні судді;</p>
<p>Хлопці й дівчата,* старі разом з юнацтвом.</p>
<p>Нехай ім'я Господнє хвалять, високе бо ім'я його єдине.* Велич його понад землю й небо.</p>
<p>Він підняв ріг народу свого.* Хвала всім його святим, синам Ізраїля, народові, що йому близький.</p>
<p><b><i>Псалом 149</i></b></p>
<p>Співайте Господеві нову пісню,* а хвалу йому на зборі праведників.</p>
<p>Нехай Ізраїль своїм Творцем радіє,* нехай своїм царем сини Сіону веселяться.</p>
<p>Нехай хвалять ім'я його танком,* при бубні й при гарфі нехай йому співають.</p>
<p>Господь бо ласкавий до народу свого,* оздоблює перемогою покірних.</p>
<p>Нехай торжествують праведні у славі,* на своїх ложах нехай ликують.</p>
<p>Нехай хвала Божа буде на устах у них,* і двосічний меч у руці в них.</p>
<p>Щоб між народами вчинити відплату,* між племенами – покарання.</p>
<p>Щоб їхніх царів закути в кайдани,* а їхніх вельмож – у залізні окови.</p>
<p>Щоб суд написаний над ними вчинити.* Це слава всіх його преподобних.</p>
<p><b><i>Псалом 150</i></b></p>
<p>Хваліте Бога у святині його,* хваліте його у твердині сили його.</p>
<p>Хваліте його за його подвиги великі,* хваліте його в його величі безмежній.</p>
<p>Хваліте його звуком рогу,* хваліте його на гарфі й на гуслах.</p>
<p>Хваліте його на бубні й танком,* хваліте його на струнах і сопілці.</p>
<p>Хваліте його на дзвінких цимбалах, хваліте його на гучних цимбалах.* Усе, що живе, нехай хвалить Господа.</p>
<h3><b><i>Мале славослов'я</i></b></h3>
<p><em>[Хвалимо, співаємо, благословимо і дякуємо тобі, Боже батьків наших, бо ти забрав тінь нічну і явив нам знову світло денне. Молимо твою добрість: Милостивий будь для нас грішних і прийми молитву нашу задля великої твоєї ласкавости, бо ми прибігаємо до тебе, милостивого і всемогутнього Бога. Ти, що засвітив у серцях наших правдиве сонце справедливости твоєї! Просвіти розум наш і почування всі зберігай, щоб, як у день, ходили ми пристойно шляхом заповідей твоїх і дійшли до життя вічного, і стали гідними насолоджуватися недоступним твоїм світлом.]</em></p>
<p><i>Священник:</i> Тобі належить слава, Господи Боже наш, і тобі славу віддаємо: Отцю, і Сину, і Святому Духові, нині і повсякчас, і на віки віків.</p>
<p><i>Вірні:</i> Амінь. </p>
<p><i>Священник:</i> Слава тобі, що Світло нам показав!</p>
<p><i>Вірні:</i> Слава во вишніх Богу, і на землі мир,* в людях благовоління.</p>
<p>Хвалимо тебе, благословимо тебе, кланяємось тобі,* славимо тебе, дякуємо тобі заради великої твоєї слави.</p>
<p>Господи, царю небесний, Боже, Отче вседержителю,* Господи, Сину єдинородний, Ісусе Христе, і Святий Душе.</p>
<p>Господи, Боже, Агнче Божий, Сину Отця,* що береш гріх світу, помилуй нас.</p>
<p>Ти, що береш гріхи світу,* прийми нашу молитву. </p>
<p>Ти, що сидиш по правиці Отця,* помилуй нас.</p>
<p>Ти бо один лише святий, ти єдиний Господь, Ісус Христос,* на славу Бога Отця. Амінь.</p>
<p>Щодня буду тебе благословити* і хвалити ім'я твоє на віки віків.</p>
<p>Господи, ти був нам пристановищем* по всі роди.</p>
<p>Молюсь: Господи, змилуйся надо мною,* вилікуй мою душу, бо гріх мій − перед тобою.</p>
<p>Господи, до тебе я прибігаю,* навчи мене творити твою волю, бо ти Бог мій.</p>
<p>Бо в тебе є джерело життя,* у твоїм світлі побачимо світло.</p>
<p>Добавляй ласку тим,* що визнають тебе.</p>
<p>Сподоби, Господи, сьогодні* без гріха зберегтися нам.</p>
<p>Благословенний ти, Господи, Боже Отців наших,* і хвальне, і прославлене ім'я твоє навіки. Амінь.</p>
<p>Нехай буде, Господи, милість твоя на нас,* бо ми надіємось на тебе.</p>
<p>Благословенний ти, Господи,* навчи мене установ твоїх.</p>
<p>Благословенний ти, Владико,* врозуми мене установами твоїми.</p>
<p>Благословенний ти, Святий,* просвіти мене установами твоїми.</p>
<p>Господи, милість твоя повіки,* не покидай діло рук твоїх.</p>
<p>Тобі належить хвала,* тобі належить пісня.</p>
<p>Тобі належить слава:* Отцю, і Сину, і Святому Духові:</p>
<p>Нині і повсякчас,* і на віки віків. Амінь.</p>
<h3><b><i>Прохальна єктенія:</i></b></h3>
<p>Сповнім ранішню молитву нашу Господеві.</p>
<p><i>Вірні:</i> Господи, помилуй.</p>
<p>Заступи, спаси, помилуй і охорони нас, Боже, Твоєю благодаттю</p>
<p><i>Вірні:</i> Господи, помилуй.</p>
<p>Дня всього досконалого, святого, мирного і безгрішного у Господа просім.</p>
<p><i>Вірні:</i> Пода́й, Го́споди.</p>
<p>Ангела миру, вірного наставника, охоронця душ і тіл наших у Господа просім.</p>
<p><i>Вірні:</i> Пода́й, Го́споди.</p>
<p>Прощення й відпущення гріхів, і прогрішень наших у Господа просім.</p>
<p><i>Вірні:</i> Пода́й, Го́споди.</p>
<p>Доброго й пожиточного для душ наших і миру для світу у Господа просім.</p>
<p><i>Вірні:</i> Пода́й, Го́споди.</p>
<p>Останок життя нашого в мирі й покаянні завершити у Господа просім.</p>
<p><i>Вірні:</i> Пода́й, Го́споди.</p>
<p>Християнської кончини життя нашого – безболізної, бездоганної, мирної – і оправдання на страшному суді Христовому просім.</p>
<p><i>Вірні:</i> Пода́й, Го́споди.</p>
<p>Пресвяту, пречисту, преблагословенну, славну Владичицю нашу Богородицю і приснодіву Марію, з усіма святими пом’янувши, самих себе, і один одного, і все життя наше Христу Богові віддаймо.</p>
<p><i>Вірні:</i> Тобі́, Го́споди.</p>
<p><em>[Владико, Боже святий і неосяжний, що казав із темряви світлові засіяти, що заспокоїв нас у нічному сні й підвів до величання і моління твоєї доброти! Ти, що даєш себе умолити задля свого милосердя, прийми і нині нас, що поклоняємося тобі й по силі дякуємо тобі; і даруй нам те, чого просимо задля спасіння. Вчини нас синами світла і дня та спадкоємцями вічних твоїх дібр. Пом'яни, Господи, за багатством ласк твоїх усіх людей, що є і моляться з нами, і всю братію нашу на землі й на морі, і на всякому місці володіння твого, що потребують твоєї любови й помочі. Усім вияви велику твою милість, щоб спасенні, як душею так і тілом, завжди перебували й відважно славили чудне й благословенне ім'я твоє.]</em></p>
<p><i>Священник:</i> Бо Ти – Бог милости, ласк і людинолюбности, і Тобі славу віддаємо, Отцю, і Сину, і Святому Духові, нині, і повсякчас, і на віки віків.</p>
<p><i>Вірні:</i> Амінь.</p>
<p><i>Священник:</i> Мир всім.</p>
<p><i>Вірні:</i> І духові твоєму.</p>
<p>Голови ваші перед Господом схиліть.</p>
<p><i>Вірні:</i> Тобі, Господи.</p>
<p><i>Священник читає</i>: Господи святий, ти на висоті живеш і всевидючим оком твоїм споглядаєш на всяке створіння! Перед тобою схилили ми голови, душі й тіла, і молимося до тебе, Святий святих: Простягни руку твою невидиму від святого житла твого і благослови всіх нас; а якщо ми де в чому згрішили добровільно чи недобровільно, як добрий і людинолюбний Бог, прости і даруй нам земні й небесні добра твої:</p>
<p><i>Священник:</i> Бо до Тебе належить милувати і спасати нас, Боже наш, і Тобі славу віддаємо, Отцю, і Сину, і Святому Духові, нині, і повсякчас, і на віки віків.</p>
<p><i>Вірні:</i> Амінь.</p>
<h2><b><i>Стихири на стиховні</i></b></h2>
<p><i>(г. 2):</i> Господи, хоч я сотворіння земнородне,* але бувши твоєю подобою,* насмілююся називати тебе, Сотворителя, моїм Отцем.* Живучи, як блудний син,* через гріх втратив я ласку синівства* і, забувши твої дари, прогайнував багатство.* Але ти, щоб мене не відректися,* дозволив своєму єдинородному Синові* хрест і смерть тілесну за мене перетерпіти.* Тож ущаслив мене, прийнявши наново до себе,* як свою власність, Людинолюбче.</p>
<p><i>Стих: </i><em>Насити нас уранці милістю твоєю, Господи, щоб ми раділи й веселились по всі дні наші. Звесели нас мірою днів, за яких ти засмутив нас, мірою літ, що в них ми зазнали горя.* Нехай виявиться твоїм слугам твоє діло, і слава твоя – їхнім дітям.</em></p>
<p>Хоча синівська гідність доброго Отця на мені була,* та я, нерозумний, того не збагнув* і сам позбавив себе слави,* грішно розтратив багатство благодаті.* Не маючи достатньо божественної поживи,* я підлещувався бридкому чужинцеві,* а він послав мене на власне поле, згубне для душі;* і в рабстві пристрастей й облуди життя моє минало,* на пасовиську зі скотом, та без насичення.* Однак, вертаюся і кличу до тебе,* милосердного й щедрого Отця:* Згрішив я проти неба і перед тобою,* - благаю, спаси мене.</p>
<p><i>Стих: </i><em>І ласка Господа, Бога нашого, нехай буде над нами,* і стверди діло рук наших; стверди його – діло рук наших. </em></p>
<p>Безліч святих твоїх, Христе,* молиться за нас,* тож помилуй і спаси нас, як чоловіколюбець.</p>
<p><b>Слава і нині: </b>Ти, Пречиста, перетерпівши неймовірні болі* при розп'ятті твого Сина й Бога,* у сльозах стогнала й голосила:* Горе мені, найсолодша Дитино!* Чому ж то ти, піддаючись несправедливим стражданням,* спасти Адамових нащадків хочеш?* Ми ж з вірою до тебе молимось, Пречиста Діво:* Випроси для пас милосердя у свого Сина.</p>
<p><i>Після стиховні читаємо:</i></p>
<p>Добре воно – прославляти Господа, і співати імені твоєму, Всевишній. <i>(2 р.)</i></p>

<p><i>Refrain:</i> More honourable than the cherubim…</p>

<h3><b>After Ode 9</b></h3>
<p><i>Small Litany</i></p>

<h2><b>Exapostilarion (Hymn of Light)</b></h2>
<p><i>The hymn of light from the Triodion or Octoechos is read here.</i></p>

<h2><b>Psalms of Praise</b></h2>

<h3><b>Psalm 148</b></h3>
<p>Praise the Lord from the heavens; praise Him in the heights.</p>
<p>Praise Him, all His angels; praise Him, all His hosts.</p>
<p>Praise Him, sun and moon; praise Him, all you shining stars.</p>
<p>Praise Him, you highest heavens, and you waters above the heavens.</p>
<p>Let them praise the name of the Lord, for He commanded and they were created.</p>
<p>He established them for ever and ever; He gave a decree which shall not pass away.</p>
<p>Praise the Lord from the earth, you great sea creatures and all ocean depths,</p>
<p>fire and hail, snow and clouds, stormy winds that do His bidding,</p>
<p>mountains and all hills, fruit trees and all cedars,</p>
<p>wild animals and all cattle, small creatures and flying birds,</p>
<p>kings of the earth and all nations, princes and all rulers of the earth,</p>
<p>young men and maidens, old men and children.</p>
<p>Let them praise the name of the Lord, for His name alone is exalted; His glory is above earth and heaven.</p>
<p>He has raised up a horn for His people, praise for all His saints, for the children of Israel, a people near to Him.</p>

<h3><b>Psalm 149</b></h3>
<p>Sing to the Lord a new song, His praise in the assembly of the faithful.</p>
<p>Let Israel rejoice in their Maker; let the children of Sion be joyful in their King.</p>
<p>Let them praise His name with dancing, making melody to Him with timbrel and harp.</p>
<p>For the Lord takes pleasure in His people; He adorns the humble with salvation.</p>
<p>Let the faithful exult in glory; let them sing for joy on their beds.</p>
<p>Let the high praises of God be in their mouths, and a two-edged sword in their hands,</p>
<p>to execute vengeance on the nations and punishments on the peoples,</p>
<p>to bind their kings with chains and their nobles with fetters of iron,</p>
<p>to execute on them the judgment decreed. This is glory for all His faithful. </p>

<h3><b>Psalm 150</b></h3>
<p>Praise God in His sanctuary; praise Him in His mighty firmament.</p>
<p>Praise Him for His mighty deeds; praise Him according to His exceeding greatness.</p>
<p>Praise Him with the sound of the trumpet; praise Him with lute and harp.</p>
<p>Praise Him with timbrel and dance; praise Him with strings and pipe.</p>
<p>Praise Him with resounding cymbals; praise Him with loud clashing cymbals.</p>
<p>Let everything that has breath praise the Lord!</p>

<p>Glory be to the Father and to the Son and to the Holy Spirit, now and for ever and ever. Amen.</p>

<h2><b>The Lesser Doxology</b></h2>
<p>Glory to God in the highest, and on earth peace, good will among men.</p>
<p>We praise You, we bless You, we worship You, we glorify You, we give thanks to You for Your great glory.</p>
<p>O Lord, heavenly King, God the Father Almighty; O Lord, the only-begotten Son, Jesus Christ, and the Holy Spirit.</p>
<p>O Lord God, Lamb of God, Son of the Father, who take away the sin of the world, have mercy on us, You who take away the sins of the world.</p>
<p>Receive our prayer, You who sit at the right hand of the Father, and have mercy on us.</p>
<p>For You alone are holy, You alone are the Lord, Jesus Christ, to the glory of God the Father. Amen.</p>
<p>Every day I will bless You, and I will praise Your name for ever, and to the ages of ages.</p>
<p>Deign, O Lord, to keep us this day without sin.</p>
<p>Blessed are You, O Lord God of our fathers, and praised and glorified is Your name for ever. Amen.</p>
<p>Let Your mercy, O Lord, be upon us, as we have set our hope in You.</p>
<p>Blessed are You, O Lord; teach me Your commandments. <i>(3×)</i></p>
<p>Lord, You have been our refuge from generation to generation. I said: Lord, have mercy on me; heal my soul, for I have sinned against You.</p>
<p>Lord, I have fled to You; teach me to do Your will, for You are my God.</p>
<p>For with You is the fountain of life; in Your light we shall see light.</p>
<p>Continue Your mercy to those who know You.</p>

<h2><b>Litany of Supplication</b></h2>
<p><i>Deacon:</i> Let us complete our morning prayer to the Lord.</p>
<p><i>All:</i> Lord, have mercy.</p>
<p><i>Deacon:</i> Help and save, have mercy, and protect us, O God, by Your grace.</p>
<p><i>All:</i> Lord, have mercy.</p>
<p><i>Deacon:</i> That this whole day may be perfect, holy, peaceful, and sinless, let us ask the Lord.</p>
<p><i>All:</i> Grant this, O Lord.</p>
<p><i>Deacon:</i> For an angel of peace, a faithful guide, a guardian of our souls and bodies, let us ask the Lord.</p>
<p><i>All:</i> Grant this, O Lord.</p>
<p><i>Deacon:</i> For the forgiveness and remission of our sins and offenses, let us ask the Lord.</p>
<p><i>All:</i> Grant this, O Lord.</p>
<p><i>Deacon:</i> For all that is good and beneficial for our souls and for peace for the world, let us ask the Lord.</p>
<p><i>All:</i> Grant this, O Lord.</p>
<p><i>Deacon:</i> That we may spend the rest of our lives in peace and repentance, let us ask the Lord.</p>
<p><i>All:</i> Grant this, O Lord.</p>
<p><i>Deacon:</i> For a Christian end to our lives, one that is painless, unashamed, and peaceful; and for a good defence at the awesome tribunal of Christ, let us ask.</p>
<p><i>All:</i> Grant this, O Lord.</p>
<p><i>Deacon:</i> Remembering our most holy and immaculate, most blessed and glorious Lady, the Mother of God and ever-virgin Mary, together with all the saints, let us commend ourselves and one another, and our whole life, to Christ our God.</p>
<p><i>All:</i> To You, O Lord.</p>
<p><i>Priest:</i> For You, O God, are gracious and You love mankind, and we glorify You, Father, Son, and Holy Spirit, now and for ever and ever.</p>
<p><i>All:</i> Amen.</p>
<p><i>Priest:</i> Peace to all of you.</p>
<p><i>All:</i> And with your spirit.</p>
<p><i>Deacon:</i> Bow your heads to the Lord.</p>
<p><i>All:</i> To You, O Lord.</p>

<h2><b>Aposticha</b></h2>
<p><i>The aposticha stichera from the Triodion are sung here, with their psalm verses. These change daily.</i></p>
<p><i>Glory… Now…</i></p>
<p><i>Theotokion</i></p>

<p>It is truly meet to bless you, O Mother of God, ever-blessed and most pure, and the Mother of our God. More honourable than the cherubim and by far more glorious than the seraphim; ever a virgin, you gave birth to God the Word, O true Mother of God, we magnify you.</p>

<h2><b>Trisagion Prayers</b></h2>
<p>Holy God, Holy and Mighty, Holy and Immortal, have mercy on us. <i>(3×)</i></p>
<p>Glory be to the Father and to the Son and to the Holy Spirit, now and for ever and ever. Amen.</p>
<p>Trinity most holy, have mercy on us. Cleanse us of our sins, O Lord; pardon our transgressions, O Master; look upon our weaknesses and heal them, O Holy One; for the sake of Your Name.</p>
<p>Lord, have mercy. <i>(3×)</i></p>
<p>Glory be to the Father and to the Son and to the Holy Spirit, now and for ever and ever. Amen.</p>
<p>Our Father, Who art in heaven, hallowed by Thy Name. Thy Kingdom come. Thy will be done on earth as it is in heaven. Give us this day our daily bread, and forgive us our trespasses as we forgive those who trespass against us. And lead us not into temptation but deliver us from evil.</p>
<p><i>Priest:</i> For the kingdom, the power, and the glory are Yours, Father, Son, and Holy Spirit, now and for ever and ever.</p>
<p><i>All:</i> Amen.</p>

<h2><b>Troparion</b></h2>
<p><i>The appointed troparion is sung. During Great Lent weekdays:</i></p>
<p>Standing in the temple of Your glory, O Mother of God, we think ourselves to stand in heaven. O Gate of Heaven, open to us the door of Your mercy.</p>

<p><i>All:</i> Lord, have mercy. <i>(40×)</i></p>
<p><i>All:</i> Master, bless!</p>
<p><i>Priest:</i> Blessed is Christ our God, always, now and for ever and ever.</p>
<p><i>All:</i> Amen. O God, make firm the holy orthodox faith, now and for ever and ever.</p>

<h2><b>Prayer of St. Ephrem</b></h2>
<p>O Lord and Master of my life! A spirit of idleness, despondency, ambition, and idle talk give me not. <i>(Prostration)</i></p>
<p>But a spirit of chastity, humble-mindedness, patience, and love bestow upon me, Your servant. <i>(Prostration)</i></p>
<p>Yes, O Lord and King, grant me to see my own faults and not to condemn my brother, for You are blessed for ever and ever. Amen. <i>(Prostration)</i></p>
<p>O God, cleanse me, a sinner. <i>(12 small bows)</i></p>
<p><i>Then the entire prayer is repeated once more, followed by one great prostration.</i></p>
`;

// ── Calendar strip ─────────────────────────────────────────────
function buildCalStrip(selDate) {
  const mon = selDate.getMonth();
  const year = 2026;
  const daysInMon = new Date(year, mon+1, 0).getDate();
  const monthName = S.lang==='uk' ? MONTHS_UK[mon] : MONTHS_EN[mon];
  const wdLabels = S.lang==='uk' ? WD_UK : WD_EN;
  const fs = S.fontSize;

  let days = '';
  for (let day=1; day<=daysInMon; day++) {
    const dd = new Date(year, mon, day);
    const key = dateKey(dd);
    const meta = calMeta[key]||{};
    const wd = wdLabels[dd.getDay()];
    const sel = (dd.getDate()===selDate.getDate() && dd.getMonth()===selDate.getMonth());
    const isToday = (dd.getDate()===TODAY.getDate() && dd.getMonth()===TODAY.getMonth());
    const rank = meta.rank||'-';
    const cls = ['cal-day',
      sel?'selected':'',
      rank==='#'?'feast':'',
      isToday&&!sel?'today':''
    ].filter(Boolean).join(' ');

    let dotCls = 'dot-none';
    if (rank==='#') dotCls='dot-feast';
    else if (rank==='@'||rank==='+') dotCls='dot-major';
    else if (meta.fast&&meta.fast.match(/0[1-6]p/)) dotCls='dot-lent';

    days += `<button class="${cls}" onclick="selectDay(${mon},${day})"
      aria-label="${fmtDate(dd, S.lang)}">
      <span class="cal-day-wd" style="font-size:${fs*0.55}px">${wd}</span>
      <span class="cal-day-n"  style="font-size:${fs*1.05}px">${day}</span>
      <span class="cal-day-dot ${dotCls}"></span>
    </button>`;
  }

  // Month navigation arrows
  const prevMon = mon > 0 ? `<button class="hd-arrow" onclick="stripMonth(${mon-1})" style="color:var(--gold);background:none;border:none;cursor:pointer;font-size:1.2em">‹</button>` : '<span style="width:24px"></span>';
  const nextMon = mon < 11 ? `<button class="hd-arrow" onclick="stripMonth(${mon+1})" style="color:var(--gold);background:none;border:none;cursor:pointer;font-size:1.2em">›</button>` : '<span style="width:24px"></span>';

  return `<div class="cal-strip-wrap">
    <div class="cal-strip-header">
      ${prevMon}
      <button onclick="toggleCalView()" class="cal-month-label" style="background:none;border:none;cursor:pointer;color:var(--mt);font-family:inherit;font-size:${fs*0.78}px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em">
        ${monthName} 2026 ▾
      </button>
      ${nextMon}
    </div>
    <div style="display:flex;align-items:center;gap:2px">
      <button onclick="scrollStrip(-1)" style="background:none;border:none;cursor:pointer;color:var(--gold);font-size:1.4em;padding:4px 2px;flex-shrink:0">◀</button>
      <div class="cal-strip" id="calStrip" style="flex:1">${days}</div>
      <button onclick="scrollStrip(1)" style="background:none;border:none;cursor:pointer;color:var(--gold);font-size:1.4em;padding:4px 2px;flex-shrink:0">▶</button>
    </div>
  </div>`;
}

// ── Full Calendar view ─────────────────────────────────────────
function buildCalFull() {
  const mon  = S.calMonth;
  const year = 2026;
  const daysInMon = new Date(year, mon+1, 0).getDate();
  const firstWd = new Date(year, mon, 1).getDay(); // 0=Sun
  const monthName = S.lang==='uk' ? MONTHS_UK[mon] : MONTHS_EN[mon];
  const wdLabels = S.lang==='uk' ? WD_UK : WD_EN;
  const fs = S.fontSize;

  const wdHeaders = wdLabels.map(w =>
    `<div class="cal-wd-label" style="font-size:${fs*0.6}px">${w}</div>`
  ).join('');

  // Empty cells before first day
  let cells = '';
  for (let i=0; i<firstWd; i++)
    cells += `<div class="cal-cell empty"></div>`;

  for (let day=1; day<=daysInMon; day++) {
    const dd = new Date(year, mon, day);
    const key = dateKey(dd);
    const meta = calMeta[key]||{};
    const rank = meta.rank||'-';
    const isSelected = S.date.getMonth()===mon && S.date.getDate()===day;
    const isToday = TODAY.getMonth()===mon && TODAY.getDate()===day;
    const inRange = hasData(dd);

    let cls = 'cal-cell';
    if (isSelected) cls += ' selected';
    if (isToday && !isSelected) cls += ' today';
    if (rank==='#') cls += ' great-feast';
    else if (rank==='@'||rank==='+') cls += ' feast-day';
    if (meta.fast&&meta.fast.match(/0[1-6]p/)) cls += ' lenten';
    if (!inRange) cls += ' out-of-range';

    const dot = (rank==='#'||rank==='@'||rank==='+') ? '<span class="cd-dot"></span>' : '';
    const onclick = inRange ? `onclick="selectDay(${mon},${day})"` : '';

    cells += `<button class="${cls}" ${onclick} style="font-size:${fs}px">
      <span class="cd-n">${day}</span>${dot}
    </button>`;
  }

  const prevBtn = mon > 0
    ? `<button class="cal-month-nav" onclick="S.calMonth=${mon-1};render()">‹</button>`
    : `<button class="cal-month-nav" disabled style="opacity:0.3">‹</button>`;
  const nextBtn = mon < 11
    ? `<button class="cal-month-nav" onclick="S.calMonth=${mon+1};render()">›</button>`
    : `<button class="cal-month-nav" disabled style="opacity:0.3">›</button>`;

  return `<div class="cal-full">
    <div class="svc-view-header">
      <button class="back-btn" onclick="S.view='home';render()">← ${S.lang==='uk'?'Назад':'Back'}</button>
      <div style="font-size:${fs*0.78}px;color:var(--mt)">
        ${S.lang==='uk'?'Лише Вечірня Jan–Берез':'Vespers available Jan–Mar'}
      </div>
    </div>
    <div class="cal-full-header">
      ${prevBtn}
      <span class="cal-full-month" style="font-size:${fs*1.05}px">${monthName} 2026</span>
      ${nextBtn}
    </div>
    <div class="cal-grid">
      ${wdHeaders}${cells}
    </div>
    <div style="padding:16px 4px 0;font-size:${fs*0.68}px;color:var(--mt);text-align:center;line-height:1.7">
      <span style="display:inline-block;width:10px;height:10px;border:1px solid var(--feast-ring);border-radius:2px;margin-right:4px;vertical-align:middle"></span>${S.lang==='uk'?'Велике свято':'Great Feast'} &nbsp;
      <span style="display:inline-block;width:6px;height:6px;background:var(--lent-dot);border-radius:50%;margin-right:4px;vertical-align:middle"></span>${S.lang==='uk'?'Великий Піст':'Great Lent'}
    </div>
  </div>`;
}
