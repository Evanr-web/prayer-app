<p>My eye wastes away because of grief; it grows weak because of all my foes.</p>
<p>Depart from me, all you workers of evil, for the Lord has heard the sound of my weeping.</p>
<p>The Lord has heard my supplication; the Lord accepts my prayer.</p>
<p>All my enemies shall be ashamed and greatly troubled; they shall turn back and be put to shame in a moment.</p>
<p><i>Psalm 12</i></p>
<p>How long, O Lord? Will you forget me forever? How long will you hide your face from me?</p>
<p>How long must I take counsel in my soul and have sorrow in my heart all the day? How long shall my enemy be exalted over me?</p>
<p>Consider and answer me, O Lord my God; light up my eyes, lest I sleep the sleep of death.</p>
<p>Lest my enemy say, "I have prevailed over him," lest my foes rejoice because I am shaken.</p>
<p>But I have trusted in your steadfast love; my heart shall rejoice in your salvation.</p>
<p>I will sing to the Lord, because he has dealt bountifully with me.</p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p><i>Alleluia, alleluia, alleluia; glory to You, O God. (3 times)</i></p>
<p><i>Lord, have mercy. (3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p><i>Psalm 24</i></p>
<p>To you, O Lord, I lift up my soul. O my God, in you I trust.</p>
<p>Let me not be put to shame; let not my enemies exult over me.</p>
<p>Indeed, none who wait for you shall be put to shame; let those be ashamed who are treacherous without cause.</p>
<p>Make me to know your ways, O Lord; teach me your paths.</p>
<p>Lead me in your truth and teach me, for you are the God of my salvation; for you I wait all the day long.</p>
<p>Remember your mercy, O Lord, and your steadfast love, for they have been from of old.</p>
<p>Remember not the sins of my youth or my transgressions; according to your steadfast love remember me, for the sake of your goodness, O Lord.</p>
<p>Good and upright is the Lord; therefore he instructs sinners in the way.</p>
<p>He leads the humble in what is right, and teaches the humble his way.</p>
<p>All the paths of the Lord are steadfast love and faithfulness, for those who keep his covenant and his testimonies.</p>
<p>For your name's sake, O Lord, pardon my guilt, for it is great.</p>
<p>Who is the man who fears the Lord? Him will he instruct in the way that he should choose.</p>
<p>His soul shall abide in well-being, and his offspring shall inherit the land.</p>
<p>The friendship of the Lord is for those who fear him, and he makes known to them his covenant.</p>
<p>My eyes are ever toward the Lord, for he will pluck my feet out of the net.</p>
<p>Turn to me and be gracious to me, for I am lonely and afflicted.</p>
<p>The troubles of my heart are enlarged; bring me out of my distresses.</p>
<p>Consider my affliction and my trouble, and forgive all my sins.</p>
<p>Consider how many are my foes, and with what violent hatred they hate me.</p>
<p>Oh, guard my soul, and deliver me; let me not be put to shame, for I take refuge in you.</p>
<p>May integrity and uprightness preserve me, for I wait for you.</p>
<p>Redeem Israel, O God, out of all his troubles.</p>
<p><i>Psalm 30</i></p>
<p>In you, O Lord, do I take refuge; let me never be put to shame; in your righteousness deliver me.</p>
<p>Incline your ear to me; rescue me speedily; be a rock of refuge for me, a strong fortress to save me.</p>
<p>For you are my rock and my fortress; and for your name's sake you lead me and guide me.</p>
<p>You take me out of the net they have hidden for me, for you are my refuge.</p>
<p>Into your hand I commit my spirit; you have redeemed me, O Lord, faithful God.</p>
<p>You hate those who pay regard to worthless idols, but I trust in the Lord.</p>
<p>I will rejoice and be glad in your steadfast love, because you have seen my affliction; you have known the distress of my soul.</p>
<p>You have not delivered me into the hand of the enemy; you have set my feet in a broad place.</p>
<p>Be gracious to me, O Lord, for I am in distress; my eye is wasted from grief; my soul and my body also.</p>
<p>For my life is spent with sorrow, and my years with sighing; my strength fails because of my iniquity, and my bones waste away.</p>
<p>Because of all my adversaries I have become a reproach, especially to my neighbors, and an object of dread to my acquaintances; those who see me in the street flee from me.</p>
<p>I have been forgotten like one who is dead; I have become like a broken vessel.</p>
<p>For I hear the whispering of many — terror on every side — as they scheme together against me, as they plot to take my life.</p>
<p>But I trust in you, O Lord; I say, "You are my God."</p>
<p>My times are in your hand; rescue me from the hand of my enemies and from my persecutors.</p>
<p>Make your face shine on your servant; save me in your steadfast love!</p>
<p>O Lord, let me not be put to shame, for I call upon you; let the wicked be put to shame; let them go silently to the grave.</p>
<p>Let the lying lips be mute, which speak insolently against the righteous in pride and contempt.</p>
<p>How abundant is your goodness, which you have stored up for those who fear you and worked for those who take refuge in you, in the sight of the children of mankind.</p>
<p>In the cover of your presence you hide them from the plots of men; you store them in your shelter from the strife of tongues.</p>
<p>Blessed be the Lord, for he has wondrously shown his steadfast love to me when I was in a besieged city.</p>
<p>I had said in my alarm, "I am cut off from your sight." But you heard the voice of my pleas for mercy when I cried to you for help.</p>
<p>Love the Lord, all you his saints! The Lord preserves the faithful but abundantly repays the one who acts in pride.</p>
<p>Be strong, and let your heart take courage, all you who wait for the Lord!</p>
<p><i>Psalm 90</i></p>
<p>He who dwells in the shelter of the Most High will abide in the shadow of the Almighty.</p>
<p>I will say to the Lord, "My refuge and my fortress, my God, in whom I trust."</p>
<p>For he will deliver you from the snare of the fowler and from the deadly pestilence.</p>
<p>He will cover you with his pinions, and under his wings you will find refuge; his faithfulness is a shield and buckler.</p>
<p>You will not fear the terror of the night, nor the arrow that flies by day.</p>
<p>Nor the pestilence that stalks in darkness, nor the destruction that wastes at noonday.</p>
<p>A thousand may fall at your side, ten thousand at your right hand, but it will not come near you.</p>
<p>You will only look with your eyes and see the recompense of the wicked.</p>
<p>Because you have made the Lord your dwelling place — the Most High, who is my refuge —</p>
<p>No evil shall be allowed to befall you, no plague come near your tent.</p>
<p>For he will command his angels concerning you to guard you in all your ways.</p>
<p>On their hands they will bear you up, lest you strike your foot against a stone.</p>
<p>You will tread on the lion and the adder; the young lion and the serpent you will trample underfoot.</p>
<p>"Because he holds fast to me in love, I will deliver him; I will protect him, because he knows my name.</p>
<p>When he calls to me, I will answer him; I will be with him in trouble; I will rescue him and honor him.</p>
<p>With long life I will satisfy him and show him my salvation."</p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p><i>Alleluia, alleluia, alleluia; glory to You, O God. (3 times)</i></p>
<p><i>Lord, have mercy. (3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p><b><i>God Is With Us</i></b></p>
<p><i>Choir 1:</i> God is with us; understand, O nations, and submit, for God is with us.</p>
<p><i>Choir 2:</i> God is with us; understand, O nations, and submit, for God is with us.</p>
<p><i>The choirs alternate the verses:</i></p>
<p>Hear, all you to the ends of the earth: <i>For God is with us.</i></p>
<p>You mighty ones, submit: <i>For God is with us.</i></p>
<p>Though you make plans, they shall be brought to nothing: <i>For God is with us.</i></p>
<p>Though you speak a word, it shall not stand: <i>For God is with us.</i></p>
<p>We do not fear your fear, neither are we troubled: <i>For God is with us.</i></p>
<p>The Lord of hosts — him shall you hallow; he shall be your fear: <i>For God is with us.</i></p>
<p>And if I trust in him, he shall be for my sanctification: <i>For God is with us.</i></p>
<p>And I will hope in him: <i>For God is with us.</i></p>
<p>Behold, I and the children whom God has given me: <i>For God is with us.</i></p>
<p>The people who walked in darkness have seen a great light: <i>For God is with us.</i></p>
<p>Those who dwell in the land of the shadow of death, upon them a light has dawned: <i>For God is with us.</i></p>
<p>For unto us a child is born: <i>For God is with us.</i></p>
<p>And the government shall be upon his shoulder: <i>For God is with us.</i></p>
<p>And his name shall be called: <i>For God is with us.</i></p>
<p>Wonderful Counselor: <i>For God is with us.</i></p>
<p>Mighty God, Eternal Father, Prince of Peace: <i>For God is with us.</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit: <i>For God is with us.</i></p>
<p>Now and ever, and unto ages of ages. Amen: <i>For God is with us.</i></p>
<p>God is with us, understand, O nations, and submit: <b>For God is with us.</b></p>
<p><i>Evening Troparia:</i></p>
<p>Having passed the day, I give thanks to you, O Lord, and I ask that the evening and the night be sinless; grant this to me, O Savior, and save me.</p>
<p><i>Glory:</i> Having passed the day, I glorify you, O Master, and I ask that the evening and the night be without temptation; grant this to me, O Savior, and save me.</p>
<p><i>Now and ever:</i> Having passed the day, I sing praise to you, O Holy One, and I ask that the evening and the night be without failure; grant this to me, O Savior, and save me.</p>
<p>The bodiless nature of the cherubim praises you with unceasing song; the six-winged seraphim glorify you with never-silent voices, crying out: Holy, holy, holy Lord of Sabaoth; heaven and earth are full of your glory.</p>
<p>O Most Holy Virgin, Mother of God, the witnesses and ministers of the Word, the assemblies of prophets and martyrs, who possess immortal life: intercede for our salvation.</p>
<p><b><i>Nicene Creed</i></b></p>
<p>I believe in one God, the Father Almighty, maker of heaven and earth, and of all things visible and invisible.</p>
<p>And in one Lord Jesus Christ, the only-begotten Son of God, begotten of the Father before all ages.</p>
<p>Light from Light, true God from true God, begotten, not made, one in essence with the Father, through whom all things were made.</p>
<p>For us and for our salvation he came down from heaven and was incarnate by the Holy Spirit and the Virgin Mary, and became man.</p>
<p>He was crucified under Pontius Pilate, suffered, and was buried.</p>
<p>He rose on the third day in accordance with the Scriptures.</p>
<p>He ascended into heaven and is seated at the right hand of the Father.</p>
<p>He will come again in glory to judge the living and the dead, and his kingdom will have no end.</p>
<p>And in the Holy Spirit, the Lord, the giver of life, who proceeds from the Father, who together with the Father and the Son is worshiped and glorified, who spoke through the prophets.</p>
<p>In one, holy, catholic, and apostolic Church.</p>
<p>I confess one baptism for the forgiveness of sins.</p>
<p>I look for the resurrection of the dead and the life of the age to come. Amen.</p>
<p><b><i>Intercessory Litany</i></b> <i>(with bows)</i></p>
<p>O Most Holy Lady Theotokos, pray to God for us sinners. <i>(3 times)</i></p>
<p>All the heavenly hosts of the holy angels and archangels, pray to God for us sinners. <i>(twice)</i></p>
<p>Holy John, Prophet, Forerunner, and Baptizer of our Lord Jesus Christ, pray to God for us sinners. <i>(twice)</i></p>
<p>The holy glorious Apostles, Prophets, Martyrs, and all the saints, pray to God for us sinners. <i>(twice)</i></p>
<p>Our venerable and God-bearing fathers Anthony and Theodosius, and the other miracle-workers of the Caves, pray to God for us sinners. <i>(twice)</i></p>
<p><i>Here is added a verse to the patron saint of the church.</i></p>
<p>O unconquered, unvanquished, and divine power of the precious and life-giving Cross, do not forsake us sinners. <i>(twice)</i></p>
<p>O God, be merciful to us sinners. <i>(twice)</i></p>
<p>O God, cleanse us of our sins and have mercy on us. <i>(twice)</i></p>
<p>Holy God, Holy Mighty, Holy Immortal, have mercy on us. <i>(3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>O Most Holy Trinity, have mercy on us. O Lord, cleanse us of our sins. O Master, pardon our iniquities. O Holy One, visit and heal our infirmities for your name's sake.</p>
<p><i>Lord, have mercy. (3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>Our Father, who art in heaven, hallowed be Thy name; Thy kingdom come; Thy will be done on earth as it is in heaven. Give us this day our daily bread, and forgive us our trespasses as we forgive those who trespass against us; and lead us not into temptation, but deliver us from evil.</p>
<p><i>Priest:</i> For Thine is the kingdom, and the power and the glory, of the Father, and of the Son, and of the Holy Spirit, now and ever, and unto ages of ages.</p>
<p><i>Choir:</i> Amen.</p>
<p><i>Troparia, Tone 8:</i></p>
<p>You know the sleepless malice of my invisible enemies, O Lord; and you know also the weakness of my wretched body. Into your hands, O Creator, I commit my spirit; keep it under your wings until the day of judgment, so that through your help I may be found worthy of the blessed life of those who love you.</p>
<p><i>Verse:</i> Look upon me and hear me, O Lord my God.</p>
<p>How awesome is your judgment, O Lord, in the presence of the angels, when the books are opened and actions are examined; then the fire burns fiercely, all things quake before your glory. How will I, a sinner, stand at that hour? Who will intercede for me? But before the end, have mercy on me, O Lord, according to your great mercy.</p>
<p><i>Glory:</i> Give me tears, O God, as you once gave to the sinful woman, and grant that I may wash your feet, which freed me from the path of error. I shall bring you as myrrh a repentant life; through which, O Word, accept my compunction, and save me.</p>
<p><i>Now and ever:</i> Having placed all my hope in you, O Theotokos, I shall be saved. Being protected by your intercession, O Most Pure, I shall not be afraid. I shall crush the armies of the enemies and destroy all who oppress me, who dare to do battle against me; through your mediation I shall gain victory. Therefore I will ever praise you, O sovereign Lady.</p>
<p><i>Lord, have mercy. (40 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>More honorable than the cherubim, and more glorious beyond compare than the seraphim, who without corruption gave birth to God the Word, the true Theotokos — we magnify you.</p>
<p>In the name of the Lord, bless, O father.</p>
<p><i>Priest:</i> By the prayers of our holy fathers, O Lord Jesus Christ our God, have mercy on us.</p>
<p><i>Choir:</i> Amen.</p>
<p><i>Prayer of Saint Basil the Great:</i></p>
<p><i>Priest:</i> O Lord, Lord, who have delivered us from every shaft of night, and granted us the light of day, accept our evening prayer and turn to yourself our hearts from every temptation; grant that our acts and thoughts be pleasing to you; lead our life peacefully according to your commandments. Grant us peaceful sleep and free from all fantasy of the devil. Save us, O Lord, from vain worry and from every earthly passion, and grant us, when we lie down to sleep, the renewal of soul and body. O Lord of all, spare us who are present in your holy temple, who bow before you; rescue, guard, and keep us from every evil word and deed, from every passion of body and soul, and deem us worthy, O God, that in every hour, we may praise and glorify and bless your most honorable and magnificent name, of the Father and of the Son and of the Holy Spirit, now and ever and unto ages of ages.</p>
<p><i>Choir:</i> Amen.</p>
<p><b>(Part II)</b></p>
<p>Come, let us worship God, our King.</p>
<p>Come, let us worship and fall down before Christ our King and God.</p>
<p>Come, let us worship and fall down before Christ himself, our King and our God.</p>
<p><i>Psalm 50</i></p>
<p>Have mercy on me, O God, according to your steadfast love; according to your abundant mercy blot out my transgressions.</p>
<p>Wash me thoroughly from my iniquity, and cleanse me from my sin.</p>
<p>For I know my transgressions, and my sin is ever before me.</p>
<p>Against you, you only, have I sinned and done what is evil in your sight, so that you may be justified in your words and blameless in your judgment.</p>
<p>Behold, I was brought forth in iniquity, and in sin did my mother conceive me.</p>
<p>Behold, you delight in truth in the inward being, and you teach me wisdom in the secret heart.</p>
<p>Purge me with hyssop, and I shall be clean; wash me, and I shall be whiter than snow.</p>
<p>Let me hear joy and gladness; let the bones that you have broken rejoice.</p>
<p>Hide your face from my sins, and blot out all my iniquities.</p>
<p>Create in me a clean heart, O God, and renew a right spirit within me.</p>
<p>Cast me not away from your presence, and take not your Holy Spirit from me.</p>
<p>Restore to me the joy of your salvation, and uphold me with a willing spirit.</p>
<p>Then I will teach transgressors your ways, and sinners will return to you.</p>
<p>Deliver me from bloodguiltiness, O God, O God of my salvation, and my tongue will sing aloud of your righteousness.</p>
<p>O Lord, open my lips, and my mouth will declare your praise.</p>
<p>For you will not delight in sacrifice, or I would give it; you will not be pleased with a burnt offering.</p>
<p>The sacrifices of God are a broken spirit; a broken and contrite heart, O God, you will not despise.</p>
<p>Do good to Zion in your good pleasure; build up the walls of Jerusalem.</p>
<p>Then will you delight in right sacrifices, in burnt offerings and whole burnt offerings; then bulls will be offered on your altar.</p>
<p><i>Psalm 101</i></p>
<p>Hear my prayer, O Lord; let my cry come to you.</p>
<p>Do not hide your face from me in the day of my distress; incline your ear to me; answer me speedily in the day when I call.</p>
<p>For my days pass away like smoke, and my bones burn like a furnace.</p>
<p>My heart is struck down like grass and has withered; I forget to eat my bread.</p>
<p>Because of my loud groaning my bones cling to my flesh.</p>
<p>I am like a desert owl, like an owl of the waste places.</p>
<p>I lie awake; I am like a lonely sparrow on the housetop.</p>
<p>All the day my enemies taunt me; those who deride me use my name for a curse.</p>
<p>For I eat ashes like bread and mingle tears with my drink.</p>
<p>Because of your indignation and anger; for you have taken me up and thrown me down.</p>
<p>My days are like an evening shadow; I wither away like grass.</p>
<p>But you, O Lord, are enthroned forever; you are remembered throughout all generations.</p>
<p>You will arise and have pity on Zion; it is the time to favor her; the appointed time has come.</p>
<p>For your servants hold her stones dear and have pity on her dust.</p>
<p>Nations will fear the name of the Lord, and all the kings of the earth will fear your glory.</p>
<p>For the Lord builds up Zion; he appears in his glory.</p>
<p>He regards the prayer of the destitute and does not despise their prayer.</p>
<p>Let this be recorded for a generation to come, so that a people yet to be created may praise the Lord.</p>
<p>That he looked down from his holy height; from heaven the Lord looked at the earth.</p>
<p>To hear the groans of the prisoners, to set free those who were doomed to die.</p>
<p>That they may declare in Zion the name of the Lord, and in Jerusalem his praise.</p>
<p>When peoples gather together, and kingdoms, to worship the Lord.</p>
<p>He has broken my strength in midcourse; he has shortened my days.</p>
<p>"O my God," I say, "take me not away in the midst of my days — you whose years endure throughout all generations!"</p>
<p>Of old you laid the foundation of the earth, and the heavens are the work of your hands.</p>
<p>They will perish, but you will remain; they will all wear out like a garment. You will change them like a robe, and they will pass away.</p>
<p>But you are the same, and your years have no end.</p>
<p>The children of your servants shall dwell secure; their offspring shall be established before you.</p>
<p><i>Prayer of Manasseh, King of Judah</i></p>
<p><i>Priest:</i> O Lord Almighty, God of our fathers Abraham, Isaac, and Jacob, and of their righteous posterity: you who made heaven and earth with all their adornment; who bound the sea by your word of command, who shut up the abyss and sealed it with your terrible and glorious name; of whom all things are afraid, and tremble before your power, for the magnificence of your glory is unbearable, and the wrath of your threatening against sinners is unendurable; but the mercy of your promise is immeasurable and unsearchable. For you are the Lord Most High, compassionate, long-suffering, very merciful, and you repent for the evils of men. You, Lord, according to the abundance of your goodness, promised repentance and forgiveness to those who have sinned against you, and in the multitude of your mercies, you appointed repentance for sinners as the way of salvation. You, therefore, O Lord, God of the righteous, did not appoint repentance for the righteous: Abraham, Isaac, and Jacob, who did not sin against you; but you appointed repentance for me, a sinner. For my sins are more in number than the sand of the sea; my transgressions are multiplied, O Lord, multiplied, and I am not worthy to behold and see the height of heaven for the multitude of my iniquities. I am weighed down with many a fetter of iron, so that I cannot lift up my head; and I have no relief, for I have provoked your anger and done evil before you: I did not do your will; I did not observe your commandments; I set up abominations and multiplied offences. And now I bow the knees of my heart, beseeching your goodness: I have sinned, O Lord, I have sinned, and I know my transgressions. I beseech you, forgive me, O Lord, forgive me, and destroy me not with my iniquities. Be not angry with me forever, storing up evil for me; neither condemn me into the lower parts of the earth. For you are the God of those who repent, and in me you will show all your goodness; for you will save me who am unworthy, according to your great mercy, and I will praise you always through all the days of my life. For all the hosts of heaven sing your praise, and yours is the glory, forever and ever. Amen.</p>
<p><i>Choir:</i> Amen.</p>
<p>Holy God, Holy Mighty, Holy Immortal, have mercy on us. <i>(3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>O Most Holy Trinity, have mercy on us. O Lord, cleanse us of our sins. O Master, pardon our iniquities. O Holy One, visit and heal our infirmities for your name's sake.</p>
<p><i>Lord, have mercy. (3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>Our Father, who art in heaven, hallowed be Thy name; Thy kingdom come; Thy will be done on earth as it is in heaven. Give us this day our daily bread, and forgive us our trespasses as we forgive those who trespass against us; and lead us not into temptation, but deliver us from evil.</p>
<p><i>Priest:</i> For Thine is the kingdom, and the power and the glory, of the Father, and of the Son, and of the Holy Spirit, now and ever, and unto ages of ages.</p>
<p><i>Choir:</i> Amen.</p>
<p><i>Troparia, Tone 6:</i></p>
<p>Have mercy on us, O Lord, have mercy on us, for we sinners, having no defense, offer to you as Master this prayer: have mercy on us.</p>
<p><i>Glory:</i> O Lord, have mercy on us, for in you we have put our trust; be not very angry with us, nor remember our iniquities, but look upon us now as you are merciful, and deliver us from our enemies; for you are our God and we are your people; all we are the work of your hands, and we call upon your name.</p>
<p><i>Now and ever:</i> Open to us the doors of mercy, O blessed Theotokos; for we who hope in you shall not perish, but through you shall be delivered from all adversities, for you are the salvation of the Christian race.</p>
<p><i>Lord, have mercy. (40 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>More honorable than the cherubim, and more glorious beyond compare than the seraphim, who without corruption gave birth to God the Word, the true Theotokos — we magnify you.</p>
<p>In the name of the Lord, bless, O father.</p>
<p><i>Priest:</i> By the prayers of our holy fathers, O Lord Jesus Christ our God, have mercy on us.</p>
<p><i>Choir:</i> Amen.</p>
<p><i>Prayer of Saint Basil the Great:</i></p>
<p><i>Priest:</i> O Master, God, Father Almighty, Lord, only-begotten Son, Jesus Christ, and Holy Spirit: one Godhead, one Power. Have mercy on me, a sinner, and by the judgments which you know, save me, your unworthy servant. For you are blessed unto ages of ages. Amen.</p>
<p><i>Choir:</i> Amen.</p>

<p>Come, let us worship God, our King.</p>
<p>Come, let us worship and fall down before Christ our King and God.</p>
<p>Come, let us worship and fall down before Christ himself, our King and our God.</p>
<p><i>Psalm 69</i></p>
<p>O God, make haste to deliver me; O Lord, make haste to help me.</p>
<p>Let them be put to shame and confusion who seek my life; let them be turned back and brought to dishonor who desire my hurt.</p>
<p>Let them turn back because of their shame who say, "Aha, Aha!"</p>
<p>May all who seek you rejoice and be glad in you; may those who love your salvation say evermore, "God is great!"</p>
<p>But I am poor and needy; hasten to me, O God! You are my help and my deliverer; O Lord, do not delay.</p>
<p><i>Psalm 142</i></p>
<p>Hear my prayer, O Lord; give ear to my pleas for mercy; in your faithfulness answer me, in your righteousness.</p>
<p>Enter not into judgment with your servant, for no one living is righteous before you.</p>
<p>For the enemy has pursued my soul; he has crushed my life to the ground; he has made me sit in darkness like those long dead.</p>
<p>Therefore my spirit faints within me; my heart within me is appalled.</p>
<p>I remember the days of old; I meditate on all that you have done; I ponder the work of your hands.</p>
<p>I stretch out my hands to you; my soul thirsts for you like a parched land.</p>
<p>Answer me quickly, O Lord; my spirit fails; hide not your face from me, lest I be like those who go down to the pit.</p>
<p>Let me hear in the morning of your steadfast love, for in you I trust; make me know the way I should go, for to you I lift up my soul.</p>
<p>Deliver me from my enemies, O Lord; I have fled to you for refuge.</p>
<p>Teach me to do your will, for you are my God; let your good Spirit lead me on level ground.</p>
<p>For your name's sake, O Lord, preserve my life; in your righteousness bring my soul out of trouble.</p>
<p>And in your steadfast love cut off my enemies, and destroy all the adversaries of my soul, for I am your servant.</p>
<p><b><i>Lesser Doxology</i></b></p>
<p>Glory to God in the highest, and on earth peace, goodwill among men.</p>
<p>We praise you, we bless you, we worship you, we glorify you, we give thanks to you for your great glory.</p>
<p>O Lord, heavenly King, God the Father Almighty; O Lord, only-begotten Son Jesus Christ, and Holy Spirit.</p>
<p>O Lord God, Lamb of God, Son of the Father, who take away the sin of the world, have mercy on us.</p>
<p>You who take away the sins of the world, receive our prayer.</p>
<p>You who sit at the right hand of the Father, have mercy on us.</p>
<p>For you alone are holy; you alone are the Lord; you alone are the Most High, O Jesus Christ, to the glory of God the Father. Amen.</p>
<p>Every night I will bless you and praise your name forever and ever.</p>
<p>O Lord, you have been our refuge from generation to generation.</p>
<p>I said: O Lord, be merciful to me; heal my soul, for I have sinned against you.</p>
<p>O Lord, I have fled to you; teach me to do your will, for you are my God.</p>
<p>For in you is the fountain of life; in your light we shall see light.</p>
<p>Continue your steadfast love to those who know you.</p>
<p>Grant, O Lord, to keep us this night without sin.</p>
<p>Blessed are you, O Lord, God of our fathers, and praised and glorified is your name unto ages. Amen.</p>
<p>Let your mercy, O Lord, be upon us, as we hope in you.</p>
<p>Blessed are you, O Lord; teach me your statutes.</p>
<p>Blessed are you, O Master; make me understand your statutes.</p>
<p>Blessed are you, O Holy One; enlighten me with your statutes.</p>
<p>O Lord, your mercy endures forever; do not forsake the work of your hands.</p>
<p>To you belongs praise; to you belongs song.</p>
<p>To you belongs glory: to the Father, and to the Son, and to the Holy Spirit.</p>
<p>Now and ever, and unto ages of ages. Amen.</p>
<p><b><i>Canon to the Most Holy Theotokos, Tone 6</i></b> <i>(Tuesday evening)</i></p>
<p><i>Ode 1 — Irmos:</i> As Israel walked on dry ground through the deep, seeing Pharaoh the pursuer overwhelmed in the sea, they sang a hymn of victory to God, O Christ, let us sing to you alone.</p>
<p><i>Refrain throughout the Canon:</i> Most holy Theotokos, save us!</p>
<p>I lament over my defiled life and the countless multitude of my boundless sins; what shall I confess to you, O Pure One? I do not understand, but before the end I fall down before you, O Lady, and I cry: Grant me repentance before my end.</p>
<p>Where shall I begin to tell of my evil and terrible falls, I who am full of passion? Woe is me, what will happen to me? But before the end accept my repentance, O Pure One.</p>
<p><i>Glory:</i> I always think of the hour of death and of the dread judgment seat, O most pure one, yet by sinful habits I am deceived. Bestow on me, O Lady, tears of compunction, so that I may wash away my stain before the end.</p>
<p><i>Now and ever:</i> The destroyer of all good, seeing me deprived of divine grace and having strayed and fallen far from God, hastens to devour me; but before the end intercede for me, O Bride of God, and grant me repentance.</p>
<p><i>Ode 3 — Irmos:</i> There is none holy as you, O Lord my God, who have exalted the horn of your faithful and established us upon the rock of your confession, O Good One.</p>
<p>I have defiled my soul with countless sins, O Lady and Theotokos; and where shall I go further, seized with great despair? Grant me the amendment of life, O Sovereign One.</p>
<p>The divine image in me I have defiled by fornication and vainglory, O Virgin; and the likeness I have wrought into wickedness; woe to me, O Pure One, heal me before the end.</p>
<p><i>Glory:</i> There is no other among men born into the world who has committed such abomination as I, darkened in mind; but grant me, O Lady, repentance before the end.</p>
<p><i>Now and ever:</i> I have attained the heights of sin, O most holy Virgin; help me quickly, for heaven and earth cry bitterly over me. Grant me repentance, O most pure one.</p>
<p><i>Ode 4 — Irmos:</i> Christ is my power, God and Lord; the holy Church sings hymns with reverence, crying out from a pure mind: Lord, glory to you.</p>
<p>The angelic orders and the hosts of the heavenly powers tremble before the power of your Son, O Pure One; yet I am in despair, seized with countless sins. Heal me, O Lady, before the end.</p>
<p>All the earth was amazed and was aghast at my terrible, evil, and mindless deeds, and marvels at your great compassion toward me, O Theotokos. Grant me repentance before the end.</p>
<p><i>Glory:</i> I have defiled the temple of my body with sin, and the temple of the Lord into which men enter with trembling, I, the prodigal, enter with impurity. O Lady, grant me repentance before the end.</p>
<p><i>Now and ever:</i> Do not, do not show me, O Lady, as one who has gone out from the house of your Son as unworthy; but wash away my filth and lead me in repentance, so that I may glorify you before the end.</p>
<p><i>Ode 5 — Irmos:</i> With your divine light, O Good One, enlighten the souls of those who seek you with love at dawn, I pray; let them know you, O Word of God, as the true God, who calls all from the darkness of sin.</p>
<p>With your divine radiance, O Good One, heal my soul's passions, which the adversary has sown in me, and deliver me from his snares, O Theotokos, and guide me to repentance before the end.</p>
<p>Adam transgressed the single commandment of your Son, O Virgin, and was expelled; how then shall I weep, I who am a lawbreaker, falling into the abyss of my sins? O Lady, grant me repentance before the end.</p>
<p><i>Glory:</i> I became a murderer from of old, and like Cain, a fratricide, and was cursed by God; what then shall I do now, evil one, having slain my soul by the passions of the flesh? O Lady, grant me repentance before the end.</p>
<p><i>Now and ever:</i> I have rivaled evil Esau in gluttony and excess; I have defiled my soul with drunkenness and sensual pleasure — a life ruined by indulgence. O Lady, grant me repentance before the end.</p>
<p><i>Ode 6 — Irmos:</i> Seeing the sea of life surge with the storm of temptations, I run to your calm harbor and cry out to you: Raise up my life from corruption, O greatly merciful One.</p>
<p>My life is dissolute, my soul is defiled, all my life is wretched, and my body is entirely dirty with sins; therefore I hasten to you, O Most Pure One — grant me repentance and the amendment of life before the end.</p>
<p>The end draws near and I cannot endure; my conscience convicts me, for I have wrought evil deeds, and my life is dissolute and wretched. Grant me, O Good One, repentance before the end.</p>
<p><i>Glory:</i> The burning of my flesh awaits me in truth: the terrible, unquenchable river of fire, and the undying worm. But before the end, intercede for me, O Theotokos, with your Son, that I may gain repentance.</p>
<p><i>Now and ever:</i> Now seized with trembling, O Good One, I fear the evil snares of the enemy; for before the end, the adversary desires to destroy me. But before the end intercede for me, O Bride of God, and grant me repentance.</p>
<p><i>Lord, have mercy. (3 times) Glory, now and ever.</i></p>
<p><i>Sessional hymn, Tone 6:</i></p>
<p>You who are the hope and refuge of men, O Virgin, through you the Savior of all was born without pain; intercede with him for all who worship you in faith, that through you we may be delivered from all sufferings.</p>
<p><i>Ode 7 — Irmos:</i> The angel made the furnace dewy for the holy youths, while the commandment of God burned the Chaldeans; the tyrant was compelled to cry: Blessed are you, O God of our fathers.</p>
<p>The evil one has seventy times seven kindled the flame of my passions and always puts my heart to death with fornication; therefore I hasten to you, O Lady, deliver me, O Pure One, and grant me repentance before the end.</p>
<p>Do not cast me away, defiled as I am with the mud of my sins, O Lady and Good One; for the adversary, seeing me in despair, mocks me and draws me down to the depths. Grant me repentance before the end.</p>
<p><i>Glory:</i> The dreadful judgment seat, O my passionate and insensate soul, brings torments that are endless and terrible; but draw near now to the Mother of the Good One, and beg before the end to obtain repentance.</p>
<p><i>Now and ever:</i> I am darkened, being full of passion, with the multitude of countless sins, and have defiled soul, body, and mind; therefore, O most pure one, intercede for me, that the Judge may grant me repentance before the end.</p>
<p><i>Ode 8 — Irmos:</i> From the flame you poured dew upon the holy ones, and the righteous man's sacrifice you burned with water; for you do all things by will alone, O Christ; we exalt you unto all ages.</p>
<p>You who bore the one God of the Trinity made flesh, and carried him in your arms, O Virgin Mother, quench the blazing fire of my passions, and grant me, the poor one, tears, that I may pass my life well, and glorify you unto all ages.</p>
<p>I tremble at the coming of death, O most pure one, and I now fear the judgment; yet committing sin, I am not at all ashamed; be merciful to me, O Lady, and grant me tears of compunction and repentance, that I may glorify you unto all ages.</p>
<p><i>Glory:</i> Grant me unceasing groaning and pour clouds of tears upon me, that I may wash away my many sins and incurable wounds, and that the great Physician of souls may grant me healing through you; for I glorify you unto all ages.</p>
<p><i>Now and ever:</i> I confess to you, O Lady, the multitude of my sins, for none in all the world has provoked God, your Son and Lord, as I have; but in your love for mankind, intercede for me, that he may grant me repentance before the end, and I will glorify him unto all ages.</p>
<p><i>Ode 9 — Irmos:</i> It is impossible for men to behold God upon whom the angelic orders dare not gaze; but through you, O most pure one, the incarnate Word appeared to us; glorifying him with the heavenly hosts, we call you blessed.</p>
<p>Behold, I come to you, O most pure one, with great fear and love, for your servant knows the power of your prayer, since truly you are the Mother of God; and I trust in your mediation, O Lady, grant me tears before the end.</p>
<p>Accept the ranks of archangels and the multitude of the heavenly hosts of my Creator; the choirs of apostles and prophets, and martyrs, and all the saints; through them, O pure one, intercede for me before the end, that I may gain repentance.</p>
<p><i>Glory and now:</i> Now and when my spirit departs, may I find your help, O pure one; quickly deliver me from the demons who come against me, and from eternal torment, and deem me worthy of the Kingdom of Heaven, O most pure one, and grant me repentance before the end.</p>
<p><i>To you, O Theotokos:</i> I await the merciful judgment of your compassionate Son, O pure one; do not despise me, but make him favorable to me, who stand before him in fear; deem me worthy of your right hand and grant me repentance before the end, that I may glorify you.</p>
<p>It is truly meet to call you blessed, O Theotokos, ever-blessed and most pure and the Mother of our God. More honorable than the cherubim, and more glorious beyond compare than the seraphim; without corruption you gave birth to God the Word; true Theotokos, we magnify you.</p>
<p>Holy God, Holy Mighty, Holy Immortal, have mercy on us. <i>(3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>O Most Holy Trinity, have mercy on us. O Lord, cleanse us of our sins. O Master, pardon our iniquities. O Holy One, visit and heal our infirmities for your name's sake.</p>
<p><i>Lord, have mercy. (3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>Our Father, who art in heaven, hallowed be Thy name; Thy kingdom come; Thy will be done on earth as it is in heaven. Give us this day our daily bread, and forgive us our trespasses as we forgive those who trespass against us; and lead us not into temptation, but deliver us from evil.</p>
<p><i>Priest:</i> For Thine is the kingdom, and the power and the glory, of the Father, and of the Son, and of the Holy Spirit, now and ever, and unto ages of ages.</p>
<p><i>Choir:</i> Amen.</p>
<p><b><i>Lord of Hosts</i></b></p>
<p><i>Troparion, Tone 6:</i></p>
<p>O Lord of Hosts, be with us, for in times of distress we have no other helper but you. O Lord of Hosts, have mercy on us. <i>(with small bows)</i></p>
<p><i>Verse:</i> Praise God in his sanctuary; praise him in his mighty firmament.</p>
<p><i>After each verse:</i> O Lord of Hosts, be with us...</p>
<p><i>Verse:</i> Praise him for his mighty deeds; praise him according to his excellent greatness.</p>
<p><i>Verse:</i> Praise him with the sound of a trumpet; praise him with lute and harp.</p>
<p><i>Verse:</i> Praise him with timbrel and dance; praise him with strings and pipe.</p>
<p><i>Verse:</i> Praise him with sounding cymbals; praise him with loud clashing cymbals. Let everything that has breath praise the Lord. Alleluia.</p>
<p><i>Glory:</i> O Lord, had we not had your saints praying for us, and your grace taking pity on us, how could we dare, O Lord, to praise you, we who are wholly unworthy? We do not despair, for you have commanded us to approach you with boldness.</p>
<p><i>Now and ever:</i> The multitude of my sins, O Theotokos, I fall before you, O Pure One, pleading for salvation. Visit my ailing soul and intercede before your Son and our God for the forgiveness of the evil deeds I have committed.</p>
<p>O Most Holy Lady Theotokos! As long as I live, do not forsake me; commit me not to human protection; but yourself intercede for me, and have mercy on me. <i>(with a small bow)</i></p>
<p>All my hope I place in you, O Mother of God; keep me under your protection. <i>(with a small bow)</i></p>
<p><i>Lord, have mercy. (40 times)</i></p>
<p><i>Priest:</i> You who at all times and at every hour, both in heaven and on earth, are worshiped and glorified, O Christ God, who are long-suffering, great in mercy and compassion, who love the just and show mercy to sinners, who call all to salvation through the promise of good things to come: O Lord, in this hour receive our supplications, and direct our lives according to your commandments. Sanctify our souls, cleanse our bodies, correct our thoughts, purify our intentions, and deliver us from every grief, evil, and pain. Surround us with your holy angels, so that guided and guarded by their company, we may attain to the unity of the faith and to the knowledge of your unapproachable glory; for you are blessed unto ages of ages. Amen.</p>
<p><i>Choir:</i> Amen.</p>
<p><i>Lord, have mercy. (3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>More honorable than the cherubim, and more glorious beyond compare than the seraphim, who without corruption gave birth to God the Word, the true Theotokos — we magnify you.</p>
<p>In the name of the Lord, bless, O father.</p>
<p><i>Priest:</i> God, have mercy on us and bless us, shine the light of his face upon us, and have mercy on us.</p>
<p><i>Choir:</i> Amen.</p>
<p><b><i>Prayer of Saint Ephrem the Syrian</i></b></p>
<p>O Lord and Master of my life, take from me the spirit of sloth, despondency, lust for power, and idle talk. <i>(prostration)</i></p>
<p>But grant to me, your servant, a spirit of chastity, humility, patience, and love. <i>(prostration)</i></p>
<p>Yes, O Lord and King, grant me to see my own faults and not to judge my brother, for you are blessed unto ages of ages. Amen. <i>(prostration)</i></p>
<p><i>Twelve small bows, each with the prayer:</i></p>
<p>O God, be merciful to me, a sinner!</p>
<p>O God, cleanse my sins and have mercy on me!</p>
<p>Without number have I sinned, O Lord; forgive me!</p>
<p><i>Then the Prayer of Saint Ephrem once more:</i></p>
<p>O Lord and Master of my life, take from me the spirit of sloth, despondency, lust for power, and idle talk. But grant to me, your servant, a spirit of chastity, humility, patience, and love. Yes, O Lord and King, grant me to see my own faults and not to judge my brother, for you are blessed unto ages of ages. Amen. <i>(prostration)</i></p>
<p>Holy God, Holy Mighty, Holy Immortal, have mercy on us. <i>(3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>O Most Holy Trinity, have mercy on us. O Lord, cleanse us of our sins. O Master, pardon our iniquities. O Holy One, visit and heal our infirmities for your name's sake.</p>
<p><i>Lord, have mercy. (3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>Our Father, who art in heaven, hallowed be Thy name; Thy kingdom come; Thy will be done on earth as it is in heaven. Give us this day our daily bread, and forgive us our trespasses as we forgive those who trespass against us; and lead us not into temptation, but deliver us from evil.</p>
<p><i>Priest:</i> For Thine is the kingdom, and the power and the glory, of the Father, and of the Son, and of the Holy Spirit, now and ever, and unto ages of ages.</p>
<p><i>Choir:</i> Amen.</p>
<p><i>Lord, have mercy. (12 times)</i></p>
<p><i>Prayer to the Most Holy Theotokos:</i></p>
<p><i>Priest:</i> O immaculate, undefiled, incorruptible, most pure Virgin, Bride of God and Lady: who united God the Word with mankind through your most glorious childbearing, and joined together the fallen nature of our race with the heavenly; who are the only hope of the hopeless, the helper of the oppressed, the ready protection of those who flee to you, the refuge of all Christians: do not abhor me, a sinner and defiled, who with shameful thoughts, words, and deeds have made myself utterly unprofitable, and through indolence have become a slave to the pleasures of life. But as the Mother of the God who loves mankind, have compassion and show mercy to me, who am a sinner and prodigal, and accept my prayer offered from unclean lips; and using your motherly boldness intercede with your Son and our God to grant me, before the end, a turning away from my sins, and amendment of life, and the attainment of heaven — with all the saints unto ages. Amen.</p>
<p><i>Choir:</i> Amen.</p>
<p><i>Prayer to Jesus Christ:</i></p>
<p><i>Priest:</i> And grant us, O Master, as we go to sleep, rest for our bodies and souls, and protect us from the dark sleep of sin and from every dark and nocturnal pleasure. Calm the impulses of the passions, quench the burning arrows of the evil one which are craftily cast at us. Repress the rebellions of the flesh, and put to sleep every earthly and material thought. And grant us, O God, a watchful mind, a sound conscience, a wakeful heart, a light sleep, and freedom from every satanic dream. And raise us up again at the hour of prayer, established in your commandments and holding firm in your memory within us. Grant us to glorify, praise, and thank your goodness throughout the night, that we may offer praise and blessing and thanksgiving to you, the Father, and to your only-begotten Son, and to your all-holy and good and life-giving Spirit, now and ever, and unto ages of ages. Amen.</p>
<p><i>Choir:</i> Amen.</p>
<p><b><i>Dismissal</i></b></p>
<p><i>Choir:</i> Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p><i>Lord, have mercy. (3 times) Bless.</i></p>
<p>O O Most Glorious Ever-Virgin Theotokos! Bear our prayers to your Son and our God, and may he save our souls through you.</p>
<p>Our hope is the Father; our refuge is the Son; our protection is the Holy Spirit; O Holy Trinity, glory to you.</p>
<p><i>Mutual Forgiveness:</i></p>
<p>O most merciful Lord Jesus Christ our God, through the prayers of your most pure Mother, our Lady Theotokos and Ever-Virgin Mary, and of all the saints, lead us, your sinners and unworthy servants, to the peaceful and quiet haven of your most holy will, for you are the true God, who loves mankind, and to you we send up glory: to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p><i>Faithful:</i> Amen.</p>
<p><i>Priest:</i> Bless us, fathers and brothers, and forgive me, a sinner, for whatever I have sinned this day <i>(or: tonight)</i> and throughout all the days of my life, in word, deed, and thought, and in all my senses.</p>
<p><i>Faithful:</i> May God forgive and have mercy on you, reverend father. Bless us and forgive us our sins, reverend father.</p>
<p><i>Priest:</i> May the Lord God forgive your sins in his mercy and have mercy on you.</p>
<p>By the prayers of our holy fathers, O Lord Jesus Christ our God, have mercy on us.</p>
<p><i>Faithful:</i> Amen.</p>`;

function buildComplineView() {
  const lang = S.lang;
  const serviceHtml = lang === 'uk' ? UK_COMPLINE_HTML : EN_COMPLINE_HTML;
  const title = lang === 'uk' ? "Велике Повечір'я" : 'Great Compline';
  const sub   = lang === 'uk' ? 'Great Compline · After supper' : "Повечір'я · Після вечері";
  const note  = lang === 'uk'
    ? '<p style="font-size:0.8em;color:var(--mt);text-align:center;margin:8px 0 0">Канон змінюється за днем тижня · цей: вівторок, глас 6</p>'
    : '<p style="font-size:0.8em;color:var(--mt);text-align:center;margin:8px 0 0">Canon varies by weekday · shown: Tuesday, Tone 6</p>';

  return `<div class="svc-wrap">
    <div class="svc-header">
      <button class="back-btn" onclick="S.view='home';render()">← Back</button>
      <div>
        <div class="svc-title">${title}</div>
        <div class="svc-sub">${sub}</div>
      </div>
    </div>
    ${note}
    <div class="compline-body">${serviceHtml}</div>
  </div>`;
}

function buildHome() {
  const d = S.date;
  const m = getMeta(d);
  const saint = getSaint(d, S.lang);
  const badges = getPeriodBadges(d, S.lang);
  const isFeast = m.rank==='#'||m.rank==='@';
  const period = getLitPeriod(m.fast, S.lang);
  const fs = S.fontSize;

  const badgesHtml = badges.map(b =>
    `<span class="badge ${b.cls}" style="font-size:${fs*0.68}px">${b.text}</span>`
  ).join('');

  const calHtml = buildCalStrip(d);

  const services = [
    {id:'vespers', en:'Vespers', uk:'Вечірня', icon:'☾', time:'Sunset (~5–6 PM)', ok:true},
    {id:'compline',en:'Great Compline',uk:"Повечір'я",icon:'✦',time:'After supper',ok:true},
    {id:'midnight',en:'Midnight Office',uk:'Опівнічна',icon:'·',time:'Midnight',ok:false},
    {id:'matins',  en:'Matins',  uk:'Утреня',icon:'☉',time:'Dawn (~6 AM)',ok:false},
    {id:'hours',   en:'The Hours',uk:'Часи',icon:'⏱',time:'1st, 3rd, 6th, 9th',ok:false},
    {id:'presanctified',en:'Presanctified Liturgy',uk:'Літургія ПД',icon:'☩',time:'Wed & Fri of Lent',ok:false},
  ];

  const svcsHtml = services.map(s => {
    const name = S.lang==='uk' ? s.uk : s.en;
    const sub  = S.lang==='uk' ? `${s.en} · ${s.time}` : `${s.uk} · ${s.time}`;
    const arr  = s.ok ? `<span class="svc-arr">›</span>`
                      : `<span class="svc-soon">${S.lang==='uk'?'Скоро':'Coming soon'}</span>`;
    const onclick = s.ok ? `onclick="openService('${s.id}')"` : '';
    return `<button class="svc-btn${s.ok?'':' disabled'}" ${onclick}>
      <span class="svc-icon">${s.icon}</span>
      <div>
        <div class="svc-name" style="font-size:${fs*0.95}px">${name}</div>
        <div class="svc-ukr"  style="font-size:${fs*0.72}px">${sub}</div>
      </div>
      ${arr}
    </button>`;
  }).join('');

  const crossStyle = isFeast ? 'color:var(--red)' : 'color:var(--gold)';

  return `
  <div class="day-card">
    <div class="day-card-cross" style="${crossStyle}">☦</div>
    <div class="day-card-saint${isFeast?' feast':''}" style="font-size:${fs*0.95}px">${saint||'—'}</div>
    <div class="day-card-badges">${badgesHtml}</div>
    ${period ? `<div style="font-size:${fs*0.72}px;color:var(--mt);margin-top:2px">${period}</div>` : ''}
  </div>
  ${calHtml}
  <div class="section-label" style="font-size:${fs*0.68}px">${S.lang==='uk'?'Богослужіння':'Divine Services'}</div>
  <div class="svc-list">${svcsHtml}</div>`;
}

// ── Calendar strip ─────────────────────────────────────────────
function buildCalStrip(selDate) {
  const mon = selDate.getMonth();
  const year = 2026;
  const daysInMon = new Date(year, mon+1, 0).getDate();
  const monthName = S.lang==='uk' ? MONTHS_UK[mon] : MONTHS_EN[mon];
  const wdLabels = S.lang==='uk' ? WD_UK : WD_EN;
  const fs = S.fontSize;

  let days = '';
  for (let day=1; day<=daysInMon; day++) {
    const dd = new Date(year, mon, day);
    const key = dateKey(dd);
    const meta = calMeta[key]||{};
    const wd = wdLabels[dd.getDay()];
    const sel = (dd.getDate()===selDate.getDate() && dd.getMonth()===selDate.getMonth());
    const isToday = (dd.getDate()===TODAY.getDate() && dd.getMonth()===TODAY.getMonth());
    const rank = meta.rank||'-';
    const cls = ['cal-day',
      sel?'selected':'',
      rank==='#'?'feast':'',
      isToday&&!sel?'today':''
    ].filter(Boolean).join(' ');

    let dotCls = 'dot-none';
    if (rank==='#') dotCls='dot-feast';
    else if (rank==='@'||rank==='+') dotCls='dot-major';
    else if (meta.fast&&meta.fast.match(/0[1-6]p/)) dotCls='dot-lent';

    days += `<button class="${cls}" onclick="selectDay(${mon},${day})"
      aria-label="${fmtDate(dd, S.lang)}">
      <span class="cal-day-wd" style="font-size:${fs*0.55}px">${wd}</span>
      <span class="cal-day-n"  style="font-size:${fs*1.05}px">${day}</span>
      <span class="cal-day-dot ${dotCls}"></span>
    </button>`;
  }

  // Month navigation arrows
  const prevMon = mon > 0 ? `<button class="hd-arrow" onclick="stripMonth(${mon-1})" style="color:var(--gold);background:none;border:none;cursor:pointer;font-size:1.2em">‹</button>` : '<span style="width:24px"></span>';
  const nextMon = mon < 11 ? `<button class="hd-arrow" onclick="stripMonth(${mon+1})" style="color:var(--gold);background:none;border:none;cursor:pointer;font-size:1.2em">›</button>` : '<span style="width:24px"></span>';

  return `<div class="cal-strip-wrap">
    <div class="cal-strip-header">
      ${prevMon}
      <button onclick="toggleCalView()" class="cal-month-label" style="background:none;border:none;cursor:pointer;color:var(--mt);font-family:inherit;font-size:${fs*0.78}px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em">
        ${monthName} 2026 ▾
      </button>
      ${nextMon}
    </div>
    <div class="cal-strip" id="calStrip">${days}</div>
  </div>`;
}

// ── Full Calendar view ─────────────────────────────────────────
function buildCalFull() {
  const mon  = S.calMonth;
  const year = 2026;
  const daysInMon = new Date(year, mon+1, 0).getDate();
  const firstWd = new Date(year, mon, 1).getDay(); // 0=Sun
  const monthName = S.lang==='uk' ? MONTHS_UK[mon] : MONTHS_EN[mon];
  const wdLabels = S.lang==='uk' ? WD_UK : WD_EN;
  const fs = S.fontSize;

  const wdHeaders = wdLabels.map(w =>
    `<div class="cal-wd-label" style="font-size:${fs*0.6}px">${w}</div>`
  ).join('');

  // Empty cells before first day
  let cells = '';
  for (let i=0; i<firstWd; i++)
    cells += `<div class="cal-cell empty"></div>`;

  for (let day=1; day<=daysInMon; day++) {
    const dd = new Date(year, mon, day);
    const key = dateKey(dd);
    const meta = calMeta[key]||{};
    const rank = meta.rank||'-';
    const isSelected = S.date.getMonth()===mon && S.date.getDate()===day;
    const isToday = TODAY.getMonth()===mon && TODAY.getDate()===day;
    const inRange = hasData(dd);

    let cls = 'cal-cell';
    if (isSelected) cls += ' selected';
    if (isToday && !isSelected) cls += ' today';
    if (rank==='#') cls += ' great-feast';
    else if (rank==='@'||rank==='+') cls += ' feast-day';
    if (meta.fast&&meta.fast.match(/0[1-6]p/)) cls += ' lenten';
    if (!inRange) cls += ' out-of-range';

    const dot = (rank==='#'||rank==='@'||rank==='+') ? '<span class="cd-dot"></span>' : '';
    const onclick = inRange ? `onclick="selectDay(${mon},${day})"` : '';

    cells += `<button class="${cls}" ${onclick} style="font-size:${fs}px">
      <span class="cd-n">${day}</span>${dot}
    </button>`;
  }

  const prevBtn = mon > 0
    ? `<button class="cal-month-nav" onclick="S.calMonth=${mon-1};render()">‹</button>`
    : `<button class="cal-month-nav" disabled style="opacity:0.3">‹</button>`;
  const nextBtn = mon < 11
    ? `<button class="cal-month-nav" onclick="S.calMonth=${mon+1};render()">›</button>`
    : `<button class="cal-month-nav" disabled style="opacity:0.3">›</button>`;

  return `<div class="cal-full">
    <div class="svc-view-header">
      <button class="back-btn" onclick="S.view='home';render()">← ${S.lang==='uk'?'Назад':'Back'}</button>
      <div style="font-size:${fs*0.78}px;color:var(--mt)">
        ${S.lang==='uk'?'Лише Вечірня Jan–Берез':'Vespers available Jan–Mar'}
      </div>
    </div>
    <div class="cal-full-header">
      ${prevBtn}
      <span class="cal-full-month" style="font-size:${fs*1.05}px">${monthName} 2026</span>
      ${nextBtn}
    </div>
    <div class="cal-grid">
      ${wdHeaders}${cells}
    </div>
    <div style="padding:16px 4px 0;font-size:${fs*0.68}px;color:var(--mt);text-align:center;line-height:1.7">
      <span style="display:inline-block;width:10px;height:10px;border:1px solid var(--feast-ring);border-radius:2px;margin-right:4px;vertical-align:middle"></span>${S.lang==='uk'?'Велике свято':'Great Feast'} &nbsp;
      <span style="display:inline-block;width:6px;height:6px;background:var(--lent-dot);border-radius:50%;margin-right:4px;vertical-align:middle"></span>${S.lang==='uk'?'Великий Піст':'Great Lent'}
    </div>
  </div>`;
}

// ── Vespers view ───────────────────────────────────────────────
async function buildVespersView(main) {
  const d = S.date;
  const key = dateKey(d);
  const m = getMeta(d);
  const fs = S.fontSize;
  const leng = S.lang;

  const dateLabel = fmtDate(d, leng);
  const toneLabel = m.tone ? (leng==='uk'?`Глас ${m.tone}`:`Tone ${m.tone}`) : '';
  const periodLabel = getLitPeriod(m.fast, leng);
  const saintLabel = getSaint(d, leng);
  const subLine = [periodLabel, toneLabel].filter(Boolean).join(' — ');

  const headerHtml = `
  <div class="svc-view-header">
    <button class="back-btn" onclick="S.view='home';render()">← ${leng==='uk'?'Назад':'Back'}</button>
    <button class="print-btn" onclick="window.print()">⊞ ${leng==='uk'?'Друк':'Print'}</button>
  </div>`;

  const dayHeaderHtml = `
  <div class="svc-day-header">
    <div class="svc-day-date" style="font-size:${fs*0.78}px">${dateLabel}</div>
    ${subLine ? `<div class="svc-day-tone" style="font-size:${fs*0.82}px">${subLine}</div>` : ''}
    ${saintLabel ? `<div class="svc-day-saint" style="font-size:${fs*0.85}px">${saintLabel}</div>` : ''}
  </div>`;

  // English mode — load EN moveable data first
  if (leng === 'en') {
    if (!S.moveableEN && !S.moveableLoading) {
      main.innerHTML = headerHtml +
        `<div class="svc-content"><div>${dayHeaderHtml}<div class="loading-spinner"></div><p style="text-align:center;color:var(--mt);font-size:${fs*0.85}px">Loading prayer text...</p></div></div>`;
      const ok = await loadMoveableEN();
      if (ok || !S.moveableLoading) buildVespersView(main);
      return;
    }
    if (S.moveableLoading) {
      main.innerHTML = headerHtml +
        `<div class="svc-content"><div>${dayHeaderHtml}<div class="loading-spinner"></div></div></div>`;
      return;
    }
    const blocks = buildEnVespers(d);
    const content = blocks.map(renderBlock).join('');
    main.innerHTML = headerHtml + `<div class="svc-content"><div>${dayHeaderHtml}${content}</div></div>`;
    return;
  }

  // Ukrainian mode — need moveable data
  if (!S.moveableUK && !S.moveableLoading) {
    main.innerHTML = headerHtml +
      `<div class="svc-content"><div>${dayHeaderHtml}<div class="loading-spinner"></div><p style="text-align:center;color:var(--mt);font-size:${fs*0.85}px">Завантаження тексту…<br>Loading Ukrainian text…</p></div></div>`;
    const ok = await loadMoveableUK();
    if (ok) buildVespersView(main);
    else {
      main.innerHTML = headerHtml +
        `<div class="svc-content"><div>${dayHeaderHtml}
        <div class="blk-moveable-placeholder">
          <strong>Ukrainian text unavailable</strong><br>
          Place <code>data/vespers-moveable-uk.json</code> alongside <code>index.html</code>.
        </div></div></div>`;
    }
    return;
  }

  if (S.moveableLoading) {
    main.innerHTML = headerHtml +
      `<div class="svc-content"><div>${dayHeaderHtml}<div class="loading-spinner"></div></div></div>`;
    return;
  }

  // We have moveable data
  const moveableHtml = S.moveableUK ? (S.moveableUK[key]||'') : '';
  if (!moveableHtml) {
    main.innerHTML = headerHtml +
      `<div class="svc-content"><div>${dayHeaderHtml}
      <div class="blk-moveable-placeholder">
        Ukrainian Vespers text for ${dateLabel} is not yet available.<br>
        ${S.lang==='uk'?'Текст відсутній для цієї дати.':'Data available for January–March 2026.'}
      </div></div></div>`;
    return;
  }

  // Combine fixed opening + moveable
  const ukContent = `<div class="uk-vespers" style="font-size:${fs}px">`
    + UK_FIXED_OPENING_HTML
    + moveableHtml
    + `</div>`;

  main.innerHTML = headerHtml + `<div class="svc-content">${dayHeaderHtml}${ukContent}</div>`;
}

// ═══════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════

function toggleDark() {
  S.dark = !S.dark;
  document.documentElement.toggleAttribute('data-dark', S.dark);
  render();
}

function toggleLang() {
  S.lang = S.lang==='en' ? 'uk' : 'en';
  render();
}

function adjFont(delta) {
  S.fontSize = Math.max(14, Math.min(26, S.fontSize + delta*2));
  render();
}

function shiftDay(delta) {
  const nd = new Date(S.date);
  nd.setDate(nd.getDate() + delta);
  if (nd.getFullYear() === 2026) {
    S.date = nd;
    S.calMonth = nd.getMonth();
    render();
    // Scroll the day into view in the strip
    setTimeout(() => {
      const strip = document.getElementById('calStrip');
      if (strip) {
        const sel = strip.querySelector('.selected');
        if (sel) sel.scrollIntoView({inline:'center', behavior:'smooth'});
      }
    }, 50);
  }
}

function selectDay(mon, day) {
  S.date = new Date(2026, mon, day);
  S.calMonth = mon;
  S.view = 'home';
  render();
  setTimeout(() => {
    const strip = document.getElementById('calStrip');
    if (strip) {
      const sel = strip.querySelector('.selected');
      if (sel) sel.scrollIntoView({inline:'center', behavior:'smooth'});
    }
  }, 50);
}

function stripMonth(mon) {
  S.date = new Date(2026, mon, 1);
  S.calMonth = mon;
  render();
}

function toggleCalView() {
  S.calMonth = S.date.getMonth();
  S.view = S.view==='cal' ? 'home' : 'cal';
  render();
}

function openService(id) {
  if (id === 'vespers') {
    S.view = 'vespers';
    render();
    window.scrollTo(0, 0);
  } else if (id === 'compline') {
    S.view = 'compline';
    render();
    window.scrollTo(0, 0);
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

// Restore preferences
try {
  const prefs = JSON.parse(localStorage.getItem('potc-prefs')||'{}');
  if (prefs.dark)     { S.dark = true; document.documentElement.setAttribute('data-dark',''); }
  if (prefs.lang)     S.lang = prefs.lang;
  if (prefs.fontSize) S.fontSize = prefs.fontSize;
} catch(e) {}

// Save prefs on change
function savePrefs() {
  try { localStorage.setItem('potc-prefs', JSON.stringify({dark:S.dark, lang:S.lang, fontSize:S.fontSize})); } catch(e) {}
}
const _toggleDark = toggleDark;
const _toggleLang = toggleLang;
const _adjFont    = adjFont;

window.toggleDark = () => { _toggleDark(); savePrefs(); };
window.toggleLang = () => { _toggleLang(); savePrefs(); };
window.adjFont    = (d) => { _adjFont(d); savePrefs(); };

// Initial render + data load
render();
loadCalData();

// Scroll selected day into view after first render
setTimeout(() => {
  const strip = document.getElementById('calStrip');
  if (strip) {
    const sel = strip.querySelector('.selected');
    if (sel) sel.scrollIntoView({inline:'center', behavior:'instant'});
  }
}, 100);

</script>
