<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prayer of the Church">
<meta name="theme-color" content="#1a3c6e">
<title>Prayer of the Church</title>
<link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Prayer">
  <meta name="msapplication-TileColor" content="#1a3c6e">
  <meta name="msapplication-TileImage" content="icons/icon-144.png">
<style>
/* ══════════════════════════════════════════
   BYZANTINE CSS VARIABLES & RESET
══════════════════════════════════════════ */
:root {
  --bg:       #f4efe4;
  --bg2:      #ede7d7;
  --card:     #fffdf5;
  --tx:       #1e1812;
  --mt:       #7a6a50;
  --gold:     #a07418;
  --gold2:    #c8991a;
  --blue:     #1a3c6e;
  --red:      #7a0c0c;
  --rubric:   #8b2a10;
  --border:   #d4c8a0;
  --border2:  #c4b888;
  --hd-from:  #0e2444;
  --hd-to:    #1a3c6e;
  --hd-text:  #e8dfc8;
  --hd-sub:   #a09278;
  --btn-bg:   rgba(255,255,255,0.08);
  --shadow:   0 2px 12px rgba(30,24,18,0.12);
  --feast-ring: #b08820;
  --lent-dot: #5a7a3a;
  --fast-dot: #888;
}
[data-dark] {
  --bg:       #0d0c09;
  --bg2:      #141208;
  --card:     #18160f;
  --tx:       #ddd0b8;
  --mt:       #8a7d68;
  --gold:     #c8a44e;
  --gold2:    #e0bb60;
  --blue:     #7a9ec4;
  --red:      #e07060;
  --rubric:   #d4785a;
  --border:   #2a2518;
  --border2:  #3a3220;
  --hd-from:  #0a0908;
  --hd-to:    #14110c;
  --hd-text:  #e0d4c0;
  --hd-sub:   #7a6a58;
  --btn-bg:   rgba(255,255,255,0.06);
  --shadow:   0 2px 16px rgba(0,0,0,0.4);
  --feast-ring:#c8a44e;
  --lent-dot: #7aa050;
  --fast-dot: #666;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
body {
  font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
  background: var(--bg);
  color: var(--tx);
  min-height: 100dvh;
  line-height: 1.6;
  overscroll-behavior: contain;
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
#header {
  position: sticky; top: 0; z-index: 200;
  background: linear-gradient(180deg, var(--hd-from), var(--hd-to));
  border-bottom: 2.5px solid var(--gold);
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
  user-select: none;
}
.hd-row1 {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px 4px;
  gap: 8px;
}
.hd-title {
  flex: 1; text-align: center;
  font-size: 0.92em; font-weight: 700; letter-spacing: 0.05em;
  color: var(--hd-text); line-height: 1.2;
}
.hd-sub-line {
  font-size: 0.58em; color: var(--hd-sub);
  font-weight: 400; letter-spacing: 0.02em;
  margin-top: 1px; display: block;
}
.hd-ctrl { display: flex; gap: 3px; align-items: center; flex-shrink: 0; }
.hd-btn {
  background: var(--btn-bg); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 5px; color: var(--hd-text); cursor: pointer;
  font-family: inherit; padding: 4px 8px; font-size: 0.7em; font-weight: 600;
  transition: background 0.15s;
}
.hd-btn:active { background: rgba(255,255,255,0.15); }
.hd-btn.icon { padding: 4px 7px; font-size: 0.85em; border: none; background: none; }

/* Date nav row */
.hd-row2 {
  display: flex; align-items: center; justify-content: center;
  padding: 0 12px 8px; gap: 6px;
}
.hd-arrow {
  background: none; border: none; color: var(--gold);
  font-size: 1.4em; cursor: pointer; padding: 0 6px;
  line-height: 1; opacity: 0.85; transition: opacity 0.15s;
}
.hd-arrow:active { opacity: 0.5; }
.hd-date-btn {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(200,164,78,0.3);
  border-radius: 8px; color: var(--hd-text);
  font-family: inherit; cursor: pointer;
  padding: 4px 14px; text-align: center;
  min-width: 190px;
}
.hd-date-main { font-size: 0.9em; font-weight: 700; letter-spacing: 0.02em; }
.hd-date-sub  { font-size: 0.6em; color: var(--gold); margin-top: 1px; }

/* ══════════════════════════════════════════
   CONTENT AREA
══════════════════════════════════════════ */
#main { max-width: 540px; margin: 0 auto; }

/* ══════════════════════════════════════════
   HOME VIEW
══════════════════════════════════════════ */
.day-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; margin: 12px 10px 6px;
  padding: 16px 16px 12px;
  box-shadow: var(--shadow);
  text-align: center;
}
.day-card-cross { font-size: 2.2em; margin-bottom: 4px; line-height: 1; }
.day-card-saint {
  font-size: 0.95em; font-weight: 700; color: var(--tx);
  line-height: 1.35; margin-bottom: 8px;
  max-height: 3.5em; overflow: hidden;
}
.day-card-saint.feast { color: var(--red); }
.day-card-badges {
  display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 6px;
}
.badge {
  display: inline-block; padding: 2px 10px; border-radius: 20px;
  font-size: 0.68em; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase;
}
.badge-tone { background: var(--blue); color: #fff; opacity: 0.85; cursor: pointer; }
.badge-tone:hover { opacity: 1; }

/* ── Tone Reference Page ── */
.tones-grid { display: flex; flex-direction: column; gap: 16px; padding: 12px 0; }
.tone-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; box-shadow: var(--shadow); cursor: pointer;
  transition: border-color 0.2s;
}
.tone-card:hover, .tone-card.active { border-color: var(--gold); }
.tone-card-header { display: flex; align-items: center; justify-content: space-between; }
.tone-card-num {
  font-size: 1.4em; font-weight: 700; color: var(--gold);
  min-width: 2.2em; text-align: center;
  border: 2px solid var(--gold); border-radius: 50%; width: 2.2em; height: 2.2em;
  display: flex; align-items: center; justify-content: center;
}
.tone-card-title { flex: 1; margin-left: 12px; }
.tone-card-name { font-weight: 700; color: var(--tx); }
.tone-card-char { font-size: 0.82em; color: var(--mt); font-style: italic; margin-top: 2px; }
.tone-card-arrow { color: var(--gold); font-size: 1.2em; transition: transform 0.2s; }
.tone-card.active .tone-card-arrow { transform: rotate(90deg); }
.tone-card-body { display: none; margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
.tone-card.active .tone-card-body { display: block; }
.tone-card-desc { font-size: 0.9em; color: var(--tx); line-height: 1.6; margin-bottom: 12px; }
.tone-sheet-music {
  background: #fff; border: 1px solid var(--border); border-radius: 8px;
  padding: 12px; text-align: center; margin-bottom: 12px;
}
[data-dark] .tone-sheet-music { background: #1a1810; }
.tone-audio-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg2); border-radius: 8px; padding: 10px 14px;
}
.tone-play-btn {
  background: var(--blue); color: #fff; border: none; border-radius: 50%;
  width: 38px; height: 38px; font-size: 1.1em; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.tone-play-btn:disabled { opacity: 0.4; cursor: default; }
.tone-play-btn.playing { background: var(--gold); animation: pulse-play 1s ease infinite; }
@keyframes pulse-play { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
.tone-audio-label { font-size: 0.82em; color: var(--mt); }
.tone-sample { font-size: 0.88em; color: var(--tx); font-style: italic; line-height: 1.5; margin-top: 10px; padding: 10px; background: var(--bg2); border-radius: 6px; border-left: 3px solid var(--gold); }

/* Tone badge today highlight */
.tone-today-banner {
  background: linear-gradient(135deg, var(--hd-from), var(--hd-to));
  color: var(--hd-text); border-radius: 10px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
}
.tone-today-num { font-size: 1.8em; font-weight: 700; color: var(--gold2); }
.tone-today-label { font-size: 0.85em; opacity: 0.8; }
.tone-today-name { font-weight: 700; font-size: 1.05em; }

/* Inline tone modal (for service pages) */
.tone-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000;
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn 0.15s ease;
}
.tone-modal {
  background: var(--card); border-radius: 16px 16px 0 0; padding: 20px 16px 28px;
  max-width: 480px; width: 100%; max-height: 70vh; overflow-y: auto;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.2);
  animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.tone-modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 14px; }
.tone-modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: var(--mt); font-size: 1.4em; cursor: pointer; }
.badge-fast { background: var(--lent-dot); color: #fff; opacity: 0.85; }
.badge-period { background: var(--gold); color: #fff; opacity: 0.9; }
.badge-feast { background: var(--red); color: #fff; opacity: 0.9; }
.badge-plain { background: var(--border); color: var(--mt); }

/* Calendar strip */
.cal-strip-wrap {
  padding: 2px 10px 8px;
}
.cal-strip-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 4px 4px;
}
.cal-month-label {
  font-size: 0.78em; font-weight: 700; color: var(--mt);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.cal-strip {
  display: flex; gap: 5px; overflow-x: auto;
  padding: 4px 0 8px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.cal-strip::-webkit-scrollbar { display: none; }
.cal-day {
  flex-shrink: 0; width: 42px; min-height: 54px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 1.5px solid var(--border);
  border-radius: 10px; cursor: pointer;
  background: var(--card);
  transition: all 0.12s;
  padding: 4px 0;
  position: relative;
}
.cal-day:active { opacity: 0.7; }
.cal-day.selected {
  border-color: var(--gold); background: var(--gold);
}
.cal-day.feast {
  border-color: var(--feast-ring);
}
.cal-day.today {
  border-style: dashed;
}
.cal-day-wd { font-size: 0.55em; color: var(--mt); text-transform: uppercase; letter-spacing: 0.04em; }
.cal-day-n  { font-size: 1.05em; font-weight: 700; color: var(--tx); line-height: 1.2; }
.cal-day.selected .cal-day-wd,
.cal-day.selected .cal-day-n { color: #fff; }
.cal-day-dot {
  width: 5px; height: 5px; border-radius: 50%;
  margin-top: 2px;
}
.dot-feast  { background: var(--feast-ring); }
.dot-major  { background: var(--gold); }
.dot-lent   { background: var(--lent-dot); }
.dot-none   { background: transparent; }

/* Services list */
.section-label {
  font-size: 0.68em; font-weight: 700; color: var(--mt);
  text-transform: uppercase; letter-spacing: 0.1em;
  padding: 4px 14px 4px;
}
.svc-list { padding: 0 10px 20px; }
.svc-btn {
  display: flex; align-items: center; gap: 12px;
  width: 100%; padding: 12px 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 6px;
  cursor: pointer; font-family: inherit;
  text-align: left; transition: all 0.12s;
}
.svc-btn:not(.disabled):active { background: var(--bg2); }
.svc-btn.disabled { opacity: 0.42; cursor: default; }
.svc-icon { font-size: 1.5em; width: 32px; text-align: center; flex-shrink: 0; }
.svc-name { font-size: 0.95em; font-weight: 700; color: var(--tx); }
.svc-ukr  { font-size: 0.72em; color: var(--mt); }
.svc-arr  { margin-left: auto; color: var(--gold); font-size: 1.2em; font-weight: 300; }
.svc-soon { margin-left: auto; font-size: 0.62em; color: var(--mt); font-style: italic; }

/* ══════════════════════════════════════════
   CALENDAR FULL VIEW
══════════════════════════════════════════ */
.cal-full { padding: 8px 10px 20px; }
.cal-full-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 4px 10px;
}
.cal-month-nav {
  background: none; border: none; color: var(--gold); cursor: pointer;
  font-size: 1.4em; padding: 0 8px; line-height: 1;
}
.cal-full-month {
  font-size: 1.05em; font-weight: 700; color: var(--tx);
  letter-spacing: 0.02em;
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-wd-label {
  text-align: center; font-size: 0.6em; color: var(--mt);
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
  padding: 4px 0;
}
.cal-cell {
  aspect-ratio: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 8px; cursor: pointer; font-size: 0.9em;
  border: 1px solid transparent;
  position: relative; transition: all 0.1s;
}
.cal-cell:active { opacity: 0.6; }
.cal-cell.empty { cursor: default; }
.cal-cell.selected { background: var(--gold); color: #fff; border-color: var(--gold); }
.cal-cell.today { border-color: var(--gold); border-style: dashed; }
.cal-cell.great-feast { border-color: var(--feast-ring); }
.cal-cell .cd-n { font-weight: 600; font-size: 0.95em; }
.cal-cell .cd-dot {
  width: 4px; height: 4px; border-radius: 50%;
  position: absolute; bottom: 3px;
}
.cal-cell.great-feast .cd-dot { background: var(--feast-ring); }
.cal-cell.feast-day .cd-dot { background: var(--gold); }
.cal-cell.lenten .cd-n { color: var(--lent-dot); }
.cal-cell.selected .cd-n { color: #fff; }
.cal-cell.out-of-range { opacity: 0.3; cursor: default; }

/* ══════════════════════════════════════════
   VESPERS VIEW
══════════════════════════════════════════ */
.svc-view-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px 6px;
}
.back-btn {
  background: none; border: none; color: var(--gold);
  font-family: inherit; font-size: 0.88em; cursor: pointer; padding: 6px 4px;
}
.print-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 6px; color: var(--mt);
  font-family: inherit; font-size: 0.72em; cursor: pointer;
  padding: 4px 10px;
}
.svc-content {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; margin: 0 10px 24px;
  padding: 18px 16px 28px;
  box-shadow: var(--shadow);
}
.svc-day-header {
  text-align: center; margin-bottom: 16px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
}
.svc-day-date { font-size: 0.78em; color: var(--mt); margin-bottom: 2px; }
.svc-day-tone { font-size: 0.82em; color: var(--gold); font-weight: 600; cursor: pointer; }
.svc-day-tone:hover { text-decoration: underline; }
.svc-day-saint { font-size: 0.85em; color: var(--red); font-weight: 700; margin-top: 3px; line-height: 1.3; }

/* English service blocks */
.blk-title { text-align: center; font-size: 1.5em; font-weight: 800;
  color: var(--red); letter-spacing: 0.06em; margin: 20px 0 2px; }
.blk-subtitle { text-align: center; font-size: 0.82em; color: var(--mt);
  margin: 0 0 16px; font-style: italic; }
.blk-sec { font-size: 1em; font-weight: 700; color: var(--gold);
  border-bottom: 1px solid; border-color: var(--gold);
  padding-bottom: 4px; margin: 22px 0 10px; opacity: 0.9; }
.blk-rubric { font-size: 0.88em; color: var(--rubric); font-style: italic;
  margin: 5px 0; line-height: 1.6; }
.blk-p { font-size: 1em; color: var(--tx); margin: 7px 0;
  line-height: 1.78; text-align: justify; }
.blk-resp { font-size: 1em; font-weight: 700; color: var(--blue);
  margin: 5px 0; line-height: 1.6; }
.blk-lit { margin: 6px 0; }
.blk-lit-p { font-size: 1em; color: var(--tx); margin: 2px 0; line-height: 1.6; }
.blk-lit-r { font-size: 1em; font-weight: 700; color: var(--blue);
  margin: 2px 0 9px; line-height: 1.5; }
.blk-end { text-align: center; font-size: 2.4em; color: var(--red);
  margin: 28px 0 12px; }
.blk-moveable-placeholder {
  background: var(--bg2); border: 1px dashed var(--border2);
  border-radius: 8px; padding: 12px 14px; margin: 10px 0;
  font-size: 0.82em; color: var(--mt); font-style: italic;
  text-align: center; line-height: 1.5;
}

/* Compline body rendering (both languages) */
.compline-body { padding: 8px 0 24px; font-size: 1em; line-height: 1.72; }
.compline-body h2 { color: var(--red); text-align: center; font-size: 1.3em; font-weight: 800;
  margin: 28px 0 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px; letter-spacing: 0.04em; }
.compline-body p { margin: 5px 0; }
.compline-body p i { color: var(--rubric); font-style: italic; }
.compline-body p b { color: var(--blue); }
.compline-body p b i, .compline-body p i b { color: var(--gold); font-style: italic; }

/* Ukrainian HTML rendering */
.uk-vespers { font-size: 1em; line-height: 1.78; }
.uk-vespers h1 {
  text-align: center; font-size: 1.4em; font-weight: 800;
  color: var(--red); letter-spacing: 0.06em;
  margin: 20px 0 6px;
}
.uk-vespers h2 {
  font-size: 1em; font-weight: 700; color: var(--gold);
  border-bottom: 1px solid var(--gold);
  padding-bottom: 4px; margin: 22px 0 10px; opacity: 0.9;
}
.uk-vespers h3 {
  font-size: 1em; font-weight: 700; color: var(--gold);
  margin: 20px 0 8px; opacity: 0.85;
}
.uk-vespers p {
  margin: 7px 0; text-align: justify; color: var(--tx);
}
.uk-vespers p i, .uk-vespers p em {
  color: var(--rubric); font-style: italic;
}
.uk-vespers p b, .uk-vespers p strong {
  color: var(--blue); font-weight: 700;
}
.uk-vespers p b i, .uk-vespers p i b,
.uk-vespers p strong i, .uk-vespers p i strong {
  color: var(--gold); font-weight: 700; font-style: italic;
}

/* Language toggle notice */
.lang-notice {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; margin: 12px 0;
  font-size: 0.8em; color: var(--mt); text-align: center;
}

/* Loading state */
.loading-spinner {
  text-align: center; padding: 40px 20px;
  font-size: 0.9em; color: var(--mt);
}
.loading-spinner::before {
  content: '☦'; font-size: 2em; display: block;
  margin-bottom: 10px; color: var(--gold);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 1; }
}

/* ══════════════════════════════════════════
   PRINT STYLES
══════════════════════════════════════════ */
@media print {
  #header, .svc-view-header, .back-btn, .print-btn { display: none !important; }
  body { background: #fff !important; color: #000 !important; }
  .svc-content { border: none; box-shadow: none; }
  .blk-rubric { color: #a00 !important; }
  .blk-resp, .blk-lit-r { color: #00008b !important; }
  .blk-sec { color: #000 !important; border-bottom: 1px solid #000; }
  .blk-title { color: #a00 !important; }
}

/* ══════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════ */
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
</style>
</head>
<body>

<!-- APP ROOT -->
<div id="header">
  <div class="hd-row1">
    <div class="hd-ctrl">
      <button class="hd-btn" id="btnLang" onclick="toggleLang()">UA</button>
    </div>
    <div class="hd-title">

function fmtDate(d, lang) {
  const m = lang==='uk' ? MONTHS_UK[d.getMonth()] : MONTHS_EN[d.getMonth()];

  return lang==='uk'

function getLitPeriod(fast, lang) {
  const uk = lang==='uk';
  if (!fast) return '';
  if (fast === '00m') return uk ? "М'ясопусний тиждень" : 'Meatfare Week';
  if (fast === '00s') return uk ? 'Сиропусний тиждень' : 'Cheesefare Week';
  const lentM = fast.match(/^0(\d)p$/);
  if (lentM) {
    const wk = parseInt(lentM[1]);
    const names_en = ['','First','Second','Third','Fourth','Fifth','Sixth'];
    const names_uk = ['','Перший','Другий','Третій','Четвертий',"П'ятий",'Шостий'];
    return uk ? `${names_uk[wk]||wk} тиждень Великого Посту`
               : `${names_en[wk]||wk} Week of Great Lent`;
  }
  const easterM = fast.match(/^0(\d)e$/);
  if (easterM) return uk ? 'Пасхальний час' : 'Paschal Season';
  if (fast === '***') return '';
  const lentFast = fast.match(/^(\d+)d$/);
  if (lentFast) {
    const wk = parseInt(lentFast[1]);
    return uk ? `${wk}-й тиждень після П'ятидесятниці`
               : `${wk}th Week after Pentecost`;
  }
  return '';
}

function getFastLabel(fast, lang) {
  const uk = lang==='uk';
  if (!fast) return '';
  if (fast==='30d') return uk ? "М'ясо та молоко дозволені" : 'Meat & dairy permitted';
  if (fast==='31d') return uk ? "М'ясо дозволено" : 'Meat permitted';

  if (fast==='37d') return uk ? 'Вино дозволено' : 'Wine permitted';
  if (fast==='38d') return uk ? 'Суворий піст' : 'Strict fast';
  if (fast==='***') return '';
  if (fast==='00m') return uk ? 'Тиждень без посту' : 'Fast-free week';
  if (fast==='00s') return uk ? 'Молочна їжа дозволена' : 'Dairy permitted';
  if (fast.match(/^0\dp$/)) return uk ? 'Великий Піст' : 'Great Lent fast';
  if (fast.match(/^0\de$/)) return uk ? 'Пасхальний час' : 'Paschal season';
  return '';
}

function getRankLabel(rank, lang) {
  const uk = lang==='uk';
  if (rank==='#') return uk ? 'Велике свято' : 'Great Feast';
  if (rank==='@') return uk ? 'Свято' : 'Feast';
  if (rank==='+') return uk ? 'Святкування' : 'Commemoration';
  if (rank==='&') return uk ? 'Поліелей' : 'Polyeleos';
  return '';
}

function getToneLabel(tone, lang) {
  if (!tone) return '';
  return lang==='uk' ? `Глас ${tone}` : `Tone ${tone}`;
}

function isLenten(fast) {
  return fast && fast.match(/^0[1-6]p$/) !== null;
}

function hasData(d) {
  return d.getFullYear()===2026 && d.getMonth()<=2;

const saintsCache = {};

// ── Data Loading ──────────────────────────────────────────────
async function loadCalData() {
  try {
    const r = await fetch('./data/calendar2026.json');
    if (!r.ok) throw new Error('not found');
    S.calData = await r.json();
    // populate saintsCache
    Object.entries(S.calData).forEach(([k,v]) => { saintsCache[k] = v.saint || ''; });
    render();
  } catch(e) {
    // Use calMeta as fallback (no saints, but tone/fast/rank available)
    console.warn('calendar2026.json not found — using embedded metadata');
    S.calData = {};
    render();
  }
}

async function loadMoveableUK() {
  if (S.moveableUK) return true;
  if (S.moveableLoading) return false;
  S.moveableLoading = true;
  render();
  try {
    const r = await fetch('./data/vespers-moveable-uk.json');
    if (!r.ok) throw new Error('not found');
    S.moveableUK = await r.json();
    S.moveableLoading = false;
    return true;
  } catch(e) {
    S.moveableLoading = false;
    return false;
  }
}

// ── getMeta(date) — returns combined metadata for a date ──────
function getMeta(d) {
  const key = dateKey(d);
  const base = calMeta[key] || { fast:'30d', rank:'-', tone:0 };
  const cal  = S.calData ? (S.calData[key]||{}) : {};
  return {
    fast:  base.fast,
    rank:  base.rank,
    tone:  cal.tone || base.tone || 0,
    saint: cal.saint || saintsCache[key] || '',
    wd:    cal.wd || d.getDay(),  // note: getDay()=0-6 Sun-Sat; cal wd=1-7 Mon-Sun
  };
}

function getSaint(d, lang) {
  const key = dateKey(d);
  if (lang==='en') return EN_SAINTS[key] || (saintsCache[key] || '');
  return saintsCache[key] || '';
}

// ── Liturgical Period Labels ──────────────────────────────────
function getPeriodBadges(d, lang) {
  const { fast, rank, tone, saint } = getMeta(d);
  const badges = [];
  const period = getLitPeriod(fast, lang);
  const fastLabel = getFastLabel(fast, lang);
  const rankLabel = getRankLabel(rank, lang);
  const toneLabel = getToneLabel(tone, lang);

  if (rankLabel) badges.push({ cls:'badge-feast', text: rankLabel });
  if (toneLabel) badges.push({ cls:'badge-tone',  text: toneLabel, tone: tone });
  if (period)    badges.push({ cls:'badge-period', text: period });
  else if (fastLabel) badges.push({ cls:'badge-fast', text: fastLabel });

  return badges;
}

// VESPERS RENDERER
// ═══════════════════════════════════════════════════════════════

function buildEnVespers(d) {
  const key = dateKey(d);
  const meta = getMeta(d);
  const lenten = isLenten(meta.fast);
  const isSun = d.getDay() === 0;

  let wkLabel = getLitPeriod(meta.fast, 'en');
  let toneLabel = meta.tone ? `Tone ${meta.tone}` : '';
  let subline = [wkLabel, toneLabel].filter(Boolean).join(' — ');

  const enDay = S.moveableEN ? (S.moveableEN[key] || null) : null;

  // Annunciation (Mar 26) — special combined Vespers + Liturgy service
  if (key === '0326' && enDay && enDay.annunciationService) {
    return enDay.annunciationService;
  }

  const blocks = [];
  blocks.push({t:'title', x:'VESPERS'});
  blocks.push({t:'sub',   x: subline || fmtDate(d,'en')});

  // Opening (fixed, same every day)
  blocks.push(...EN_FIXED_OPENING);

  // Blessed is the Man (Sundays/feasts only)
  if (enDay && enDay.hasBlessedMan) {
    blocks.push(...EN_BLESSED_MAN);
    blocks.push(...EN_SMALL_LITANY);
  }

  // MOVEABLE: Stichera (Psalm 140 + stichera — always present)
  if (key === '0311') {
    blocks.push(...EN_311_MOVEABLE.stichera);
  } else if (enDay && enDay.stichera) {
    blocks.push(...enDay.stichera);
  } else {
    blocks.push({t:'moveable', section:'stichera', tone: meta.tone, date: fmtDate(d,'en')});
  }

  // Entrance (Sundays/feasts) — includes O Gladsome Light
  if (enDay && enDay.hasEntrance) {
    blocks.push(...EN_ENTRANCE);
    // O Gladsome Light is sung as part of the entrance
    blocks.push(...EN_FIXED_GLADSOME);
  } else {
    // Weekdays: O Gladsome Light without entrance
    blocks.push(...EN_FIXED_GLADSOME);
  }

  // MOVEABLE: Prokeimenon
  if (key === '0311') {
    blocks.push(...EN_311_MOVEABLE.prokeimenon);
  } else if (enDay && enDay.prokeimenon) {
    blocks.push(...enDay.prokeimenon);
  } else {
    blocks.push({t:'moveable', section:'prokeimenon', tone: meta.tone, date: fmtDate(d,'en')});
  }

  // MOVEABLE: OT Readings
  if (key === '0311') {
    blocks.push(...EN_311_MOVEABLE.readings);
  } else if (enDay && enDay.readings) {
    blocks.push(...enDay.readings);
  }

  // Fervent Litany (some days)
  if (enDay && enDay.hasFerventLitany) {
    blocks.push(...EN_FERVENT_LITANY);
  }

  // Vouchsafe + Litany of Supplication (fixed)
  blocks.push(...EN_FIXED_VOUCHSAFE);

  // Litia (Great Feasts only)
  if (enDay && enDay.hasLitia) {
    if (enDay.litiaStichera) {
      blocks.push(...enDay.litiaStichera);
    }
    blocks.push(...EN_LITIA_PRAYERS);
  }

  // MOVEABLE: Aposticha
  if (key === '0311') {
    blocks.push(...EN_311_MOVEABLE.aposticha);
  } else if (enDay && enDay.aposticha) {
    blocks.push(...enDay.aposticha);
  } else {
    blocks.push({t:'moveable', section:'aposticha', tone: meta.tone, date: fmtDate(d,'en')});
  }

  // Prayer of Simeon + Trisagion (fixed)
  blocks.push(...EN_FIXED_SIMEON);

  // MOVEABLE: Troparia
  if (key === '0311') {
    blocks.push(...EN_311_MOVEABLE.troparia);
  } else if (enDay && enDay.troparia) {
    blocks.push(...enDay.troparia);
  } else {
    blocks.push({t:'moveable', section:'troparia', tone: meta.tone, date: fmtDate(d,'en')});
  }

  // Blessing of Loaves (Great Feasts after Litia)
  if (enDay && enDay.hasBlessingOfLoaves) {
    blocks.push(...EN_BLESSING_LOAVES);
  }

  // Prayer of St. Ephrem (Lenten weekdays — includes Psalm 33)
  const needsEphrem = enDay ? enDay.hasEphrem : (lenten && !isSun);
  if (needsEphrem) {
    blocks.push(...EN_FIXED_EPHREM);
  }

  // Psalm 33 standalone (Great Feasts after Blessing of Loaves — only when Ephrem not already added, since EN_FIXED_EPHREM includes Psalm 33)
  if (enDay && enDay.hasPsalm33 && !needsEphrem) {
    blocks.push(...EN_PSALM_33);
  }

  // Dismissal
  if (enDay && enDay.dismissalType === 'great') {
    blocks.push(...EN_GREAT_DISMISSAL);
  } else if (enDay && enDay.dismissalType === 'middle') {
    blocks.push(...EN_MIDDLE_DISMISSAL);
  }

  // After Vespers
  if (enDay && enDay.afterVespers && enDay.afterVespers.length > 0) {
    blocks.push(...enDay.afterVespers);
  }

  blocks.push({t:'end', x:'☦'});
  return blocks;
}

// ── Render a single English block ────────────────────────────
function renderBlock(b) {
  const fs = S.fontSize;
  switch(b.t) {
    case 'title':
      return `<h1 class="blk-title" style="font-size:${fs*1.5}px">${b.x}</h1>`;
    case 'sub':
      return `<p class="blk-subtitle" style="font-size:${fs*0.82}px">${b.x}</p>`;
    case 'sec':
      return `<h2 class="blk-sec" style="font-size:${fs}px">${b.x}</h2>`;
    case 'r':
      return `<p class="blk-rubric" style="font-size:${fs*0.88}px">${b.x}</p>`;
    case 'p':
      return `<p class="blk-p" style="font-size:${fs}px">${b.x.replace(/\n/g,'<br>')}</p>`;
    case 'resp':
      return `<p class="blk-resp" style="font-size:${fs}px">${b.x}</p>`;
    case 'lit': {
      const rows = b.x.map(([p,r]) =>
        `<p class="blk-lit-p" style="font-size:${fs}px">${p}</p>`+
        `<p class="blk-lit-r" style="font-size:${fs}px">${r}</p>`
      ).join('');
      return `<div class="blk-lit">${rows}</div>`;
    }
    case 'end':
      return `<p class="blk-end" style="font-size:${fs*2}px">${b.x}</p>`;
    case 'moveable': {
      const labels = {
        'stichera':    'Stichera on "Lord I Have Cried"',
        'prokeimenon': 'Prokeimenon',
        'prokeimenon-text': 'Prokeimenon',
        'ot-readings': 'Old Testament Readings',
        'aposticha':   'Aposticha Stichera',
        'troparia':    'Troparia & Dismissal',
      };
      const label = labels[b.section] || b.section;
      const labelStr = b.label ? ` (${b.label})` : (b.tone ? ` — Tone ${b.tone}` : '');
      return `<div class="blk-moveable-placeholder" style="font-size:${fs*0.82}px">
        <strong>${label}${labelStr}</strong><br>
        Full English text for this section is in preparation.<br>
        Switch to <em>UA</em> to read the complete Ukrainian text.
      </div>`;
    }
    default: return '';
  }
}

function render() {

  const toneStr = m.tone ? (S.lang==='uk' ? `Глас ${m.tone}` : `Tone ${m.tone}`) : '';

  $('hd-date-sub').textContent = [periodStr, toneStr].filter(Boolean).join(' · ') || '';
  $('btnLang').textContent = S.lang==='en' ? 'UA' : 'EN';
  $('btnDark').textContent = S.dark ? '☀' : '☾';

  const main = $('main');
  main.style.fontSize = S.fontSize + 'px';

  if (S.view==='home')    main.innerHTML = buildHome();
  else if (S.view==='cal') main.innerHTML = buildCalFull();
  else if (S.view==='vespers') buildVespersView(main);
  else if (S.view==='compline') { main.innerHTML = buildComplineView(); }
  else if (S.view==='matins') { main.innerHTML = buildMatinsView(); }
  else if (S.view==='tones') { main.innerHTML = buildTonesView(); }
}

<p>Вірую в єдиного Бога Отця, вседержителя, творця неба і землі, і всього видимого і невидимого.</p>
<p>І в єдиного Господа Ісуса Христа, Сина Божого, єдинородного, від Отця родженого перед усіма віками.</p>
<p>Світло від світла, Бога істинного від Бога істинного, родженого, несотвореного, єдиносущного з Отцем, що через нього все постало.</p>
<p>Він задля нас людей і нашого ради спасіння зійшов із небес, і воплотився з Духа Святого і Марії Діви, і став людиною.</p>
<p>І був розп’ятий за нас, за Понтія Пилата, і страждав, і був похований.</p>
<p>І воскрес у третій день, згідно з Писанням.</p>
<p>І вознісся на небо, і сидить праворуч Отця.</p>
<p>І вдруге прийде зі славою судити живих і мертвих, а його царству не буде кінця.</p>
<p>І в Духа Святого, Господа животворчого, що від Отця [і Сина] ісходить, що з Отцем і Сином рівнопоклоняємий і рівнославимий, що говорив через пророків.</p>
<p>В єдину, святу, соборну й апостольську Церкву.</p>
<p>Ісповідую одне хрещення на відпущення гріхів.</p>
<p>Очікую воскресіння мертвих, і життя майбутнього віку. Амінь.</p>
<p><i>Молебні стихи (з малими поклонами)</i></p>
<p>Пресвята Владичице Богородице, моли Бога за нас, грíшних <i>(3 р.).</i></p>
<p>Усí небесні сили святих Ангелів і Архангелів, молíте Бога за нас, грішних<i> (2 р.).</i></p>
<p>Святий Іване, пророче і предтéче, і хрестителю Господа нáшого Ісýса Христá, моли Бога за нас, грíшних<i> (2 р.).</i></p>
<p>Святí слáвні Апостоли, Пророки й Мученики та всі Святí, молíте Бога за нас, грíшних<i> (2 р.).</i></p>
<p>Преподóбні й богонóсні отцí нáші Антóнію і Теодóсію та íнші чудотвóрці Печéрські, молíть Бóга за нас, грíшних<i> (2 р.).</i></p>
<p><i>Тут додається стих і святому храму (2).</i></p>
<p>Непереможна й незламна, і божественна сило чесного й животворчого Хреста, не покинь нас, грíшних<i> (2).</i></p>
<p>Бóже, милостивий будь нам, грíшним <i>(2 р.).</i></p>
<p>Бóже, очисти гріхи нáші і помилуй нас<i> (2 р.).</i></p>
<p>Святий Боже, святий кріпкий, святий безсмертний, помилуй нас <i>(3 р.)</i>.</p>
<p>Слава Отцю, і Сину, і Святому Духові, і нині, і повсякчас, і на віки віків. Амінь.</p>
<p>Пресвята Тройце, помилуй нас; Господи, очисти гріхи наші; Владико, прости беззаконня наші; Святий, завітай і зціли немочі наші імени твого ради.</p>
<p>Господи, помилуй <i>(3 р.)</i></p>
<p>Слава Отцю, і Сину, і Святому Духові, і нині, і повсякчас, і на віки віків. Амінь.</p>
<p>Отче наш, що єси на небесах, нехай святиться ім’я Твоє, нехай прийде царство Твоє, нехай буде воля твоя, як на небі, так і на землі. Хліб наш насущний дай нам сьогодні; і прости нам провини наші, як і ми прощаємо винуватцям нашим; і не введи нас у спокусу, але визволи нас від лукавого.</p>
<p><i>Священик:</i> Бо Твоє є царство, і сила, і слава, Отця, і Сина, і Святого Духа, нині і повсякчас, і на віки віків.</p>
<p><i>Хор:</i> Амінь.</p>
<p><i>Тоді співаються оці тропарі:</i></p>
<p><i>(глас 8):</i><b><i> </i></b>Невсипущість невидимих ворогів моїх ти знаєш, Господи;* i окаянного тіла мого неміч пізнав ти, Творче мій.* Тому в руки твої віддаю дух мій.* Покрий мене покровом твоєї благодаті, щоб не заснути мені смертю.* I просвіти духовні очі мої для насолоди божественними словами твоїми.* I, як єдиний благий i людинолюбний,* збуди мене в час пригожий, щоб славословити тебе.</p>
<p><i>Стих:</i><b><i> </i></b>Зглянься i вислухай мене,* Господи, мій Боже.</p>
<p>Який страшний суд твій, Господи, у присутностi ангелів,* коли людей введуть, книги розгорнуть, вчинки випробують, думки розслідять!* Який суд буде зачатим у гріхах?* Хто полум’я мені загасить?* Хто мені темряву освітить, коли ти, Господи, не помилуєш мене, як людинолюбець?</p>
<p><b><i>Слава: </i></b>Сльози дай мені, Боже, як колись жінці грішниці,* i сподоби мене обмити твої ноги,* які визволили мене від обманного шляху,* i приносити тобі, як запашне миро,* життя чисте, проведене у покаянні,* щоб i мені почути жаданий твій голос:* Віра твоя спасла тебе, іди в мирі.</p>
<p><b><i>І нині: </i></b>На тебе, Богородице, бездоганну надію маючи, спасуся.* Твоє, Пречиста, заступництво мавши, не настрахаюся,* Пожену ворогів моїх i переможу їх,* зодягнувшись, наче в зброю, в єдиний покров твій.* I, благаючи твоєї всемогутньої помочі, взиватиму до тебе:* Владичице, спаси мене молитвами твоїми i силою Сина Божого,* що від тебе тіло прийняв,* виведи мене від темного сну, щоб славословити тебе.</p>
<p><i>І одразу:</i></p>
<p>Господи, помилуй <i>(40 р.).</i></p>
<p>Слава Отцю, і Сину, і Святому Духові, нині і повсякчас, і на віки віків. Амінь.</p>
<p>Чеснíшу від херувимів і незрівнянно славнíшу від серафимів, що без зотлíння Бога Слово породила, сущу Богородицю, тебе величаємо.</p>
<p>Іменем Господнім благослови, отче!</p>
<p><i>Священик: </i>Молитвами святих отців нáших, Господи Ісýсе Христе, Боже наш, помилуй нас.</p>
<p><i>Хор: </i>Амíнь.</p>
<p><b><i>Молитва св. Василія Великого</i></b></p>
<p><i>Священик: </i>Гóсподи, Гóсподи, Ти охоронив нас від усякої напасти, що прихóдить удень, охорони нас і від усякої злої напасти вночі. Прийми жертву вечíрню, підношення рук наших. І сподоби нас і нічну пору без гріха прожити, без спокуси від злого, і визволь нас від усякої тривоги і страху, що від диявола до нас приходить. Даруй душам нашим покаяння і думкам нашим острах перед іспитом на страшному і праведному суді Твоєму. Прикуй до страху перед Тобою плоть нашу і приборкай тілесні члени наші, щоб ми і під час сну в спокої просвіщалися, роздумуючи про заповіді Твої. Віддали від нас усякі помисли неподобні й пристрасть згубну. Підведи нас на час молитви, щоб ми зміцнились вíрою і поступали у заповідях Твоїх, благоволінням і милосердям Єдинорóдного Сина Твого, що з ним Ти благословенний з пресвятим, і благим, і животворчим твоїм Духом, нині й повсякчас, і на віки віків.</p>
<p><i>Хор:</i> Амінь.</p>
<p><b>(Частина ІІ)</b></p>
<p>Прийдіте, поклонімся цареві нашому, Богу.</p>
<p>Прийдіте, поклонімся Христові, цареві нашому Богу.</p>
<p>Прийдіте, поклонімся і припадім до самого Господа Ісуса Христа, царя і Бога нашого.</p>
<p><i>Псалом 50</i></p>
<p>Помилуй мене, Боже, по великій милості Твоїй,* і багатством щедрот Твоїх очисти беззаконня моє.</p>
<p>Обмий мене повнотою з беззаконня мого* і від гріха мого очисти мене.</p>
<p>Бо беззаконня моє я знаю* і гріх мій є завжди передо мною.</p>
<p>Проти Тебе єдиного я згрішив* і перед Тобою зло вчинив.</p>
<p>То і правий Ти в словах твоїх* і переможеш, коли будеш судити.</p>
<p>Це бо в беззаконнях я зачатий* і в гріхах родила мене мати моя.</p>
<p>Це бо істину полюбив єси,* невідоме й таємне мудрости своєї явив Ти мені.</p>
<p>Окропи мене іссопом, і очищуся,* обмий мене, і стану біліший від снігу.</p>
<p>Дай мені почути радість і веселість,* зрадіють кості сокрушені.</p>
<p>Відверни лице Твоє від гріхів моїх* і всі беззаконня мої очисти.</p>
<p>Серце чисте утвори в мені, Боже,* і духа правого обнови в нутрі моєму.</p>
<p>Не відкинь мене від лиця Твого* і Духа Твого Святого не відійми від мене.</p>
<p>Верни мені радість спасення Твого* і духом владичним утверди мене.</p>
<p>Вкажу беззаконним дороги Твої,* і нечестиві до Тебе навернуться.</p>
<p>Визволь мене від вини крови, Боже, Боже спасення мого,* і язик мій радісно прославить справедливість Твою.</p>
<p>Господи, губи мої відкрий,* і уста мої сповістять хвалу Твою.</p>
<p>Бо, якби Ти жертви захотів, дав би я,* та всепалення не миле Тобі.</p>
<p>Жертва Богові – дух сокрушений,* серцем сокрушеним і смиренним Бог не погордить.</p>
<p>Ущаслив, Господи, благоволінням Твоїм Сіон* і нехай здвигнуться стіни єрусалимські.</p>
<p>Тоді уподобаєш собі жертву правди, приношення і всепалення,* тоді положать на вівтар твій тельців.</p>
<p><i>Псалом 101</i></p>
<p>Господи, почуй мою молитву;* моє благання нехай до тебе дíйде.</p>
<p>Не ховай обличчя твого від мене в день моєї скрути.* Прихили до мене твоє вухо, коли до тебе взиваю, вислухай мене скоро.</p>
<p>Бо дні мої, як дим, щезають,* і мої кості, як жар, тлíють.</p>
<p>Прибите, мов трава, в’яне моє серце,* я забуваю íсти хліб мій.</p>
<p>Від сильного мого стогнання* прилипли мої кості до моєї шкíри.</p>
<p>Я став, мов пелікан у пустині,* зробивсь, мов пугач той у руїнах.</p>
<p>Не сплю я і стогну,* немов самітна пташка на покрíвлі.</p>
<p>Вороги мої ввесь час мене ображають;* ті, що лютують проти мене, кленýться мною.</p>
<p>Бо я, неначе хліб, їм попіл,* і напиток мій із сльозами я змíшую:</p>
<p>Через твій гнів і твоє обурення,* бо ти мене підняв і кинув.</p>
<p>Дні мої, неначе тінь, що простягнулась,* і сам я, неначе трава, в’яну.</p>
<p>Ти ж, Господи, сидиш повíки на престолі,* й ім’я твоє по всі роди.</p>
<p>Ти встанеш, змилуєшся над Сіóном,* бо час над ним уже змилосердитись, бо прийшла година.</p>
<p>Слуги твої люблять його камíння,* їм милий його порох.</p>
<p>Народи будуть íмени Господнього боятися* і всі царí землі – твоєї слави.</p>
<p>Коли Господь Сіóн відбудує,* з’явиться у своїй славі.</p>
<p>Зглянеться він над молитвою нужденних,* молитвою їхньою не погордує.</p>
<p>Нехай це запишеться для майбутнього роду,* і народ, що буде створений, хвалитиме Господа.</p>
<p>Бо він з висоти своєї святині подивився,* Господь із небес на землю поглянув.</p>
<p>Щоб почути стогін бранця,* щоб визволити призначених на смерть;</p>
<p>Щоб звіщали ім’я Господа в Сіóні,* і хвалили його в Єрусалимі,</p>
<p>Коли разом зберуться народи і царства,* щоб служити Господеві.</p>
<p>Він виснажив у дорозі мою силу,* укоротив дні мої.</p>
<p>Я кажу: Боже мій, не забирай мене в половині віку мого;* літа твої по всі роди!</p>
<p>Спервовіку свíту ти заснував землю,* і небеса – діло рук твоїх.</p>
<p>Вони загинуть, ти ж будеш стояти; все постáріється, немов одежа.* Наче вбрання, ти їх міняєш і вони пройдуть.</p>
<p>Ти ж усе той самий,* і літам твоїм кінця немає.</p>
<p>Сини слуг твоїх будуть жити* і їхнє потóмство утривáлиться перед тобою.</p>
<p><b><i>Молитва Манасії, царя Юдейського</i></b></p>
<p><i>Священик: </i>Господи Вседержителю, Боже отцíв наших, Авраáма й Ісаáка та Якова й праведного роду їх. Ти сотворив небо й землю з усією красою їх, ти зв’язáв море словом наказу твого. Ти замкнув безóдню і запечатав її страшним і славним Іменем твоїм, тебе все боїться і тремтить перед силою твоєю, бо ніхто не встоїть перед величністю слави твоєї; нестерпний гнів погрози твоєї на грíшників, але безмежна й недослідима милість обíтниці твоєї. Бо ти Господь Всевишній, милосердний, довготерпеливий і многомилостивий, і вболіваєш над гріхами людськими. Ти, Господи, з безмежної доброти твоєї, дав змогу покаяння і відпущення тим, що нагрішили перед тобою і, з безмежного милосердя твого, призначив покаяння для грíшних на спасіння. Ти ж, Господи, Боже сил,, не встановив покаяння для Авраáма, Ісаáка та Якова, що не згрішили перед тобою, але встановив покаяння для нас грíшних, бо гріхів наших бíльше, ніж піску морського. Намножилися беззаконня наші, Господи, намножилися беззаконня наші, тож ми недостойні глянути й побачити висоту небесну задля безлічі провин наших. Зв’язано нас великими оковами залізними так, що не можемо піднести голови й нема полéгші для нас, бо ми прогнівили тебе, і лукаве перед тобою вчинили, не сповнивши волі твоєї і не додержавши наказів твоїх. Тому нині ми згинаємо коліна й від серця благаємо в тебе милосердя. Нагрішили ми, Господи, нагрішили, і беззаконня наші ми знаємо! Але прохаємо, благаючи: Прости нам, Господи, прости нам і не погуби нас з беззаконнями нашими, не пам’ятáй провин наших і в гнíві твоєму не засуди нас повíк до безодні. Бо ти, Боже, є Бог тих, що каються, і на нас виявив всю ласкавість свою: з великої милости твоєї спаси нас, недостóйних, і будемо тебе завжди прославляти за днів життя нашого. Бо тебе хвалять усí сили небесні й слава твоя на вíки вíчні.</p>
<p><i>Хор:</i> Амíнь.</p>
<p>Святий Боже, святий кріпкий, святий безсмертний, помилуй нас <i>(3 р.)</i>.</p>
<p>Слава Отцю, і Сину, і Святому Духові, і нині, і повсякчас, і на віки віків. Амінь.</p>
<p>Пресвята Тройце, помилуй нас; Господи, очисти гріхи наші; Владико, прости беззаконня наші; Святий, завітай і зціли немочі наші імени твого ради.</p>
<p>Господи, помилуй <i>(3 р.)</i></p>
<p>Слава Отцю, і Сину, і Святому Духові, і нині, і повсякчас, і на віки віків. Амінь.</p>
<p>Отче наш, що єси на небесах, нехай святиться ім’я Твоє, нехай прийде царство Твоє, нехай буде воля твоя, як на небі, так і на землі. Хліб наш насущний дай нам сьогодні; і прости нам провини наші, як і ми прощаємо винуватцям нашим; і не введи нас у спокусу, але визволи нас від лукавого.</p>
<p><i>Священик:</i> Бо Твоє є царство, і сила, і слава, Отця, і Сина, і Святого Духа, нині і повсякчас, і на віки віків.</p>
<p><i>Хор:</i> Амінь.</p>
<p><i>тоді тропарі:</i></p>
<p><i>(глас 6):</i><b><i> </i></b>Помилуй нас, Господи, помилуй нас,* бо, ніякого одвіту не знаючи,* оцю Тобі молитву як Владиці ми, грішні, приносимо:* Помилуй нас.</p>
<p><b><i>Слава:</i></b><i> </i>Господи, помилуй нас,* бо на Тебе ми уповали.* Не прогнівайся дуже на нас,* ні не пом’яни беззаконь наших,* але зглянься й нині як милосердний* і ізбав нас від ворогів наших,* бо Ти єси Бог наш,* а ми – люди Твої, всі – діла рук Твоїх,* і ім’я Твоє призиваємо.</p>
<p><b><i>І нині:</i></b><i> </i>Милосердя двері відкрий нам,* благословенна Богородице,* щоб, надіючися на тебе, ми не погибнули,* але щоб ізбавились тобою від бід.* Ти бо єси спасення роду християнського.</p>
<p><i>І одразу:</i></p>
<p>Господи, помилуй <i>(40 р.).</i></p>
<p>Слава Отцю, і Сину, і Святому Духові, нині і повсякчас, і на віки віків. Амінь.</p>
<p>Чеснíшу від херувимів і незрівнянно славнíшу від серафимів, що без зотлíння Бога Слово породила, сущу Богородицю, тебе величаємо.</p>
<p>Іменем Господнім благослови, отче.</p>
<p><i>Священик: </i>Молитвами святих отців наших, Господи Ісýсе Христе, Боже наш, помилуй нас.</p>
<p><i>Хор: </i><b>Амíнь.</b></p>
<p><b><i>Молитва св. Василія Великого</i></b></p>
<p><i>Священик:</i> Владико, Боже, Отче вседержителю, Господи, Сину єдинорóдний, Ісýсе Христе і Святий Душе, єдине Божество і єдина сило: Помилуй мене грішного і, якими задумами знаєш, спаси мене, недостóйного слугу Твого, бо Ти благословенний на вíки вíчні.</p>
<p><i>Хор:</i> <b>Амíнь.</b></p>
<p><b><i>(Частина ІІІ)</i></b></p>
<p>Прийдіте, поклонімся цареві нашому, Богу.</p>
<p>Прийдіте, поклонімся Христові, цареві нашому Богу.</p>
<p>Прийдіте, поклонімся і припадім до самого Господа Ісуса Христа, царя і Бога нашого.</p>
<p><i>Псалом 69</i></p>
<p>Боже, рятуй мене,* Господи, мені на допомогу поспішися!</p>
<p>Нехай засоромляться і почервоніють ті,* що на моє життя чигають.</p>
<p>Нехай назад відступлять і застидаються ті,* що тішаться моїм нещастям.</p>
<p>Нехай повернуться назад, стидом прибиті ті,* що до мене кажуть: «Добре йому, добре!».</p>
<p>Нехай радуються й веселяться в тобі всі,* що тебе шукають</p>
<p>Ті, що завжди кажуть: «Нехай возвеличиться Господь!»* і ті, що люблять твою допомогу.</p>
<p>Я ж бідний та нужденний, Боже,* поспішись до мене!</p>
<p>Ти моя допомога і мій визволитель,* Господи, не забарися.</p>
<p><i>Псалом 142</i></p>
<p>О Господи, почуй мою молитву,* у твоїй вірності нахили вухо своє до мольби моєї; вислухай мене в твоїй правді!</p>
<p>І не входь у суд із твоїм слугою,* бо ніхто з живих не виправдається перед тобою.</p>
<p>Бо мою душу гонить ворог, життя моє топче в землю,* він оселює мене в пітьмі, як давно померлих.</p>
<p>Дух мій тривожиться в мені,* і серце моє жахається в мені всередині.</p>
<p>Я згадую дні давні,* роздумую над усіма вчинками твоїми і над ділами рук твоїх міркую.</p>
<p>До тебе простягаю мої руки;* моя душа, мов спрагла земля, тебе жадає.</p>
<p>Вислухай мене скоро, Господи, бо знемагає дух мій.* Не крий твого обличчя від мене, щоб я не став, як ті, що сходять у яму.</p>
<p>Дай мені вранці відчути твою милість, бо я на тебе покладаюсь.* Вкажи мені дорогу, якою слід мені ходити, бо до тебе я підношу мою душу.</p>
<p>Спаси мене, Господи, від ворогів моїх,* - бо до тебе прибігаю.</p>
<p>Навчи мене творити твою волю, бо ти Бог мій.* Нехай твій добрий дух веде мене по рівній землі.</p>
<p>Живи мене, о Господи, імени твого ради,* у справедливості твоїй виведи з скорботи мою душу.</p>
<p>І в гніві твоєму знищ моїх супротивників.* І вигуби всіх гнобителів душі моєї, бо я твій слуга.</p>
<p><b><i>Мале славослов’я</i></b></p>
<p>Слава во вишніх Богу, і на землі мир,* в людях благовоління.</p>
<p>Хвалимо Тебе, благословимо Тебе, кланяємось Тобі,* славимо Тебе, дякуємо Тобі заради великої Твоєї слави.</p>
<p>Господи, Царю небесний, Боже, Отче вседержителю,* Господи, Сину єдинородний, Ісусе Христе, і Святий Душе.</p>
<p>Господи, Боже, Агнче Божий, Сину Отця,* що береш гріх світу, помилуй нас.</p>
<p>Ти, що береш гріхи світу,* прийми нашу молитву.</p>
<p>Ти, що сидиш по правиці Отця,* помилуй нас.</p>
<p>Ти бо один лише святий, Ти єдиний Господь, Ісус Христос,* на славу Бога Отця. Амінь.</p>
<p>Щоночі буду Тебе благословити* і хвалити ім’я Твоє на віки віків.</p>
<p>Господи, Ти був нам пристановищем* по всі роди.</p>
<p>Молюсь: Господи, змилуйся надо мною,* вилікуй мою душу, бо гріх мій – перед Тобою.</p>
<p>Господи, до Тебе я прибігаю,* навчи мене творити Твою волю, бо Ти Бог мій.</p>
<p>Бо в Тебе є джерело життя,* у Твоїм світлі побачимо світло.</p>
<p>Добавляй ласку тим,* що визнають Тебе.</p>
<p>Сподоби, Господи, у цю ніч* без гріха зберегтися нам.</p>
<p>Благословенний Ти, Господи, Боже отців наших,* і хвальне, і прославлене ім’я Твоє навіки. Амінь.</p>
<p>Нехай буде, Господи, милість Твоя на нас,* бо ми надіємось на Тебе.</p>
<p>Благословенний Ти, Господи,* навчи мене установ Твоїх.</p>
<p>Благословенний Ти, Владико,* врозуми мене установами Твоїми.</p>
<p>Благословенний Ти, Святий,* просвіти мене установами Твоїми.</p>
<p>Господи, милість твоя повіки,* не покидай діло рук твоїх.</p>
<p>Тобі належить хвала,* Тобі належить пісня.</p>
<p>Тобі належить слава:* Отцю, і Сину, і Святому Духові.</p>
<p>Нині і повсякчас,* і на віки віків. Амінь.</p>
<p><i>Канон Пресвятій Богородиці, глас 6 (у вівторок ввечері)</i></p>
<p><i>Пісня 1</i></p>
<p><i>Ірмос: </i>Як по суші, перейшов Ізраїль по безодні стопами, бачачи, як гонитель фараон потопляється; пісню перемоги Богові співаймо, взиваючи.</p>
<p><i>Приспів на цілім каноні:</i> <b>Пресвята Богородице, спаси нас!</b></p>
<p>Ридаю за осквернене моє життя і безліч моїх безмеж­них гріхів: що ж сповідую я перед Тобою, Чиста? Не розумію і жахаюся, але допоможи мені, Владичице.</p>
<p>Звідки почну говорити про лукаві і люті мої падін­ня, пристрасний я? Горе мені, що буде далі; але ра­ніше кінця, Владичице, ущедри мене.</p>
<p><i>Слава:</i> Про смертний час і про судилище страш­не я завжди помишляю, Пречиста, звичаями ж гріхов­ними спокушаюся люто, але допоможи мені.</p>
<p><i>І нині:</i> Розтлитель добра, бачачи, що я позбавле­ний божественних щедрот і далеко відійшов і відсту­пив від Бога, намагається мене поглинути; Влади­чице, попередь.</p>
<p><i>Пісня 3</i></p>
<p><i>Ірмос:</i> Нема святого, як Ти, Господи, Боже мій, що підніс рід вірних Твоїх, Блаже, і утвердив нас на камені сповідан­ня Твого.</p>
<p>Душу осквернив я, пристрасний, безмежними мої­ми гріхами, Богородице Владичице; і куди піду далі, охоплений весь відчаєм?</p>
<p>І те, що за образом, я осквернив блудом і марно­славною волею; горе мені, Чиста; за подобою ж сотво­рив безумне і ділом, і словом, і помислом.</p>
<p><i>Слава:</i> Нема іншого серед людей, хто народився на світ, як я, що вчинив неподобство, будучи затьма­реним розумом, Блага, бо осквернив я хрещення.</p>
<p><i>І нині:</i> Досягнув я вершини гріха, Пресвята Діво, Ти допоможи мені незабаром: небо і земля взивають гірко від безумних діянь неподобства.</p>
<p><i>Пісня 4</i></p>
<p><i>Ірмос: </i>Христос моя сила, Бог і Господь, чесна Церква побожно співає, взиваючи, від помислу чистого Господа прославляючи.</p>
<p>Ангельські чини і воїнства небесних сил жахають­ся держави Сина Твого, Чиста; нині ж я у відчаї, охоп­лений безстрашністю.</p>
<p>Здивувалася вся земля і вжахнулася, побачивши мої люті, злі і безумні діяння, і дивується великому милосердю Твого Сина.</p>
<p><i>Слава:</i> Церкву тілесну осквернив я гріхом і церк­ву Господню, в яку люди входять з тремтінням, я ж, блудний, входжу без сорому, горе мені!</p>
<p><i>І нині:</i> Не показуй, не показуй мене, Владичице, таким, що відійшов із дому Сина Твого як недостойний; але омий мене від скверни гріхів моїх.</p>
<p><i>Пісня 5</i></p>
<p><i>Ірмос:</i> Божественним Твоїм світлом, Блаже, просвіти, молюся, душі тих, що зранку линуть до Тебе, пізнаючи Тебе, Слово Боже, істинного Бога, що з темряви гріхів взиває.</p>
<p>Божественним Твоїм сяянням, Блага, зціли ду­шевні мої пристрасті, які посіяв у мені спокусник, і визволи мене із цього гіркого полону; бо він насмі­хається наді мною, бачачи, що я беззахисний.</p>
<p>Адам порушив єдину заповідь Сина Твого, Діво, і був вигнаний; як же ридаю я, законопорушник, за безодню моїх гріхів, і є відступником Його.</p>
<p><i>Слава:</i> Вбивцею став у давнині і братовбивцею Каїн і був проклятий Богом; що ж зроблю я, лука­вий, нині убив душу і не соромлюся.</p>
<p><i>І нині:</i> Ісаву поревнував лютому черевоугодництвом і ситністю; душу осквернив пияцтвом і ласо­любством — життя моє, і хто мене оплакує, горе мені!</p>
<p><i>Пісня 6</i></p>
<p><i>Ірмос:</i> Житейське море, схвильоване бурею пристрастей, бачачи і до тихого пристановища Твого прийшовши, бла­гаю: визволи з тління життя моє, Многомилостивий.</p>
<p>Життя моє блудне, душа моя осквернена, і все жит­тя моє окаянне, тіло ж моє все гріхами забруднене; тому поспіши, Діво, допомогти мені.</p>
<p>Кінець наближається, і не витримую, Блага; со­вість викриває мене: бо вчинив я лукаві діяння, і житіє моє блудне; і жахаюся судилища Сина Твого, Чиста.</p>
<p><i>Слава:</i> Плоті моєї розпалення, воістину чекає мене ріка вогняна, страшна і невгасима, і черва невмиру­ща; але погаси це молитвами Твоїми, Пречиста.</p>
<p><i>І нині:</i> Нині охоплений я тремтінням, Блага, і жахаюся лукавого ловіння; раніше бо кінця хоче спо­кусник убити мене, тримаючи мене як полоненого і нагим без чеснот.</p>
<p>Господи, помилуй <i>(3 р.).</i> <i>Слава, і нині:</i></p>
<p><b><i>Сідальний, глас 6</i></b></p>
<p>Уповання і стіна, пристановище людей Твоїх, Діво, із Тебе бо народився безстрасно Спас усіх і спасає тих, що уповають на Тебе; як Ти оплакувала Сина Твого на хресті, Його і нині благай визволити із тління всіх, хто оспівує Тебе.</p>
<p><i>Пісня 7</i></p>
<p><i>Ірмос:</i> Росоносну піч учинив ангел преподобним юнакам, халдеїв же опаляючи, веління Боже мучителя спонукало взивати: благословен єси, Боже отців наших.</p>
<p>Сімдесят по сім розпалив лукавий полум’я при­страстей моїх і любодіянням серце моє завжди умер­твляє; тому струмками сліз моїх погаси його, Мати Божа, і спаси мене.</p>
<p>Оскверненого болотом гріхів моїх, не відкинь мене, Владичице Блага; бо, дивлячись на мене у відчаї, насміхається наді мною лукавий ворог; але Ти Сама Твоєю державною рукою підніми мене.</p>
<p><i>Слава:</i> Страшне судилище, пристрасна і нечуттєва душе моя, муки ж безкінечні і суворі; але припади нині до Матері Судді Твого і Бога і не впадай сама у відчай.</p>
<p><i>І нині:</i> Затьмарився я, пристрасний, безліччю без­межних гріхів і осквернив душу, і тіло, і розум; тому, Пречиста, світлом Твого сяяння швидко введи мене до насолоди безстрастя.</p>
<p><i>Пісня 8</i></p>
<p><i>Ірмос:</i> Із полум’я преподобним росу виточив і жертву праведника водою спалив; бо все твориш, Христе, з волі Своєї, Тебе прославляємо по всі віки.</p>
<p>Ти, що народила одного із Тройці єдиного Бога і на руках носила, Діво Мати, погаси пристрастей вогне­пальну піч і струмками сліз омий душу мою.</p>
<p>Приходу смерті жахаюся я, Пречиста, і боюся нині того суду; чинячи ж гріхи, ніскільки не соромлюсь; ущедри мене раніше кінця молитвами Твоїми, Діво.</p>
<p><i>Слава:</i> Стогнання невмовкне даруй мені і сліз хмари подай, щоб я обмив мої многі гріхи і невиліковані рани, щоб я успадкував життя вічне.</p>
<p><i>І нині:</i> Гріхів моїх безліч Тобі сповідав, Владичи­це, бо ніхто в світі не прогнівав Бога, Сина і Господа Твого так, як я; гнів Свій незабаром, Діво, переміни на милість/“-</p>
<p><i>Пісня 9</i></p>
<p><i>Ірмос:</i> Бога людям неможливо бачити, бо на Нього не сміють чини ангельські дивитися; через Тебе, Пречиста, Слово стало тілом і явилося людям; величаючи Його, з не­бесними силами Тебе ублажаємо.</p>
<p>Ось приходжу до Тебе, Пречиста, з великим стра­хом і любов’ю, бо знає раб Твій кріпкість молитви Твоєї, бо воістину багато може молитва матерня до Сина, Владичице, бо милосердям прихиляється.</p>
<p>Прийми чин архангелів і безліч вишніх воїнств Сотворителя мого; апостолів же і пророків собори, і мучеників, і преподобних, і священномучеників; і сотвори за нас молитву Богу, Чиста.</p>
<p><i>Слава:</i> І нині, і тоді, коли вийде мій дух, нехай знайду я поміч Твою, Чиста; визволи мене незаба­ром від бісівських мук, Всенепорочна, і не залиш мене, Блага, відданим бути їм.</p>
<p><i>І нині:</i> Суддю щедрого чекаю, людинолюбивого Твого Сина, Чиста; не зневаж мене, але вчини Його благісним, постанови мене тоді праворуч, Всенепо­рочна, судилища Його, бо на Тебе уповаю.</p>
<p>Достойно є воістину* величати блаженною тебе, Богородицю,* всеблаженну, і пренепорочну, і Матір Бога нашого.* Чеснішу від херувимів* і незрівнянно славнішу від серафимів,* що без зотління Бога Слово породила,* сущу Богородицю, тебе величаємо.</p>
<p>Святий Боже, святий кріпкий, святий безсмертний, помилуй нас <i>(3 р.)</i>.</p>
<p>Слава Отцю, і Сину, і Святому Духові, і нині, і повсякчас, і на віки віків. Амінь.</p>
<p>Пресвята Тройце, помилуй нас; Господи, очисти гріхи наші; Владико, прости беззаконня наші; Святий, завітай і зціли немочі наші імени твого ради.</p>
<p>Господи, помилуй <i>(3 р.)</i></p>
<p>Слава Отцю, і Сину, і Святому Духові, і нині, і повсякчас, і на віки віків. Амінь.</p>
<p>Отче наш, що єси на небесах, нехай святиться ім’я Твоє, нехай прийде царство Твоє, нехай буде воля твоя, як на небі, так і на землі. Хліб наш насущний дай нам сьогодні; і прости нам провини наші, як і ми прощаємо винуватцям нашим; і не введи нас у спокусу, але визволи нас від лукавого.</p>
<p><i>Священик:</i> Бо Твоє є царство, і сила, і слава, Отця, і Сина, і Святого Духа, нині і повсякчас, і на віки віків.</p>
<p><i>Хор:</i> Амінь.</p>
<p><b><i>Господи сил</i></b></p>
<p><i>Тропар, глас 6 (з малими поклонами)</i></p>
<p><b>Господи сил, будь з нами,* іншого бо крім тебе допомiжника в скорботах не маємо.* Господи сил, помилуй нас.</b></p>
<p><i>Стих:</i><b> </b>Хваліте Бога у святині його,* хвалiте його у твердині сили його.</p>
<p><i>Після кожного стиха співається тропар</i><b> Господи сил...</b></p>
<p><i>Стих:</i> Хвалiте його за його подвиги великі,* хвалiте його в його величі безмежній.</p>
<p><i>Стих:</i> Хвалiте його звуком рогу,* хваліте його на арфі й на гуслах.</p>
<p><i>Стих:</i> Хвалiте його на бубні й танком,* хвалiте його на струнах i сопiлцi.</p>
<p><i>Стих:</i> Хвалiте його на дзвінких цимбалах,* хвалiте його на гучних цимбалах. Усе, що живе, нехай хвалить Господа.</p>
<p><b><i>Слава:</i> </b>Господи, коли б ми не мали святих твоїх, що моляться за нас,* та благодаті твоєї, що милує нас,* то як би ми сміли, Спасе, славити тебе,* що його безперестанно ангели славословлять?* Серцевідче, помилуй душі наші.</p>
<p><b><i>І нині:</i> </b>Безліч гріхів моїх, Богородице!* Тому до тебе прибігаю, Чиста, спасіння благаючи.* Зглянься на немічну душу мою,* i моли Сина твого й Бога нашого,* щоб простив мені злі вчинки,* єдина Благословенна.</p>
<p>Всесвята Богородице!* За життя мого не покидай мене,* i людському захистові не доручай мене,* але сама заступи i помилуй мене.</p>
<p>Усю надію мою покладаю* на тебе, Мати Божа;* збережи мене під покровом твоїм.</p>
<p><i>І одразу: </i></p>
<p>Господи, помилуй <i>(40 р.).</i></p>
<p><i>Священик:</i><b> </b>Ти, що повсякчас і кожної години на небі й на землі приймаєш поклін і славу, Боже добрий, довготерпеливий і многомилостивий, що праведних любиш, і грішних милуєш, і всіх кличеш до спасіння, заради обіцянки майбутніх благ! Прийми, Господи, в цю хвилину й наші молитви і спрямуй життя наше до твоїх заповідей. Душі наші освяти, тіла очисти, думки наші направ, розум очисти й протверези, і визволь нас від усякої скорботи, лиха й слабування. Захисти нас святими ангелами твоїми, щоб ми, їх охороною збережені й напоумлені, осягнули єдність віри та зрозуміння неприступної твоєї слави, бо ти благословенний на віки віків.</p>
<p><i>Хор:</i><b><i> </i></b>Амінь.</p>
<p>Господи, помилуй <i>(3 р.).</i></p>
<p>Слава Отцю, і Сину, і Святому Духові, нині і повсякчас, і на віки віків. Амінь.</p>
<p>Чеснíшу від херувимів і незрівнянно славнíшу від серафимів, що без зотлíння Бога Слово породила, сущу Богородицю, тебе величаємо.</p>
<p>Іменем Господнім благослови, отче.</p>
<p><i>Священик: </i>Боже, змилуйся над нами i благослови нас, світлом лиця твого осяй нас i помилуй нас.</p>
<p><i>Хор:</i><b> </b>Амінь.</p>
<p><b><i>Молитва св. Єфрема Сирійського</i></b></p>
<p>Господи i Владико життя мого! Духа лінивства, недбайливості, властолюб'я i пустомовства віджени від мене. <i>(великий поклін)</i></p>
<p>Духа чистоти, покори, терпеливості й любові даруй мені, слузі твоєму. <i>(великий поклін)</i></p>
<p>Так, Господи, Царю! Дай мені бачити гріхи мої i не осуджувати брата мого, бо ти благословенний на віки віків. Амінь. <i>(великий поклін)</i></p>
<p><i>Також дванадцять малих поклонів з молитвами:</i></p>
<p>Боже, милостивий будь мені, грішному!</p>
<p>Боже, очисти гріхи мої i помилуй мене!</p>
<p>Без числа нагрішив я, Господи, прости мені!</p>
<p><i>І знову молитва св. Єфрема: </i></p>
<p>Господи i Владико життя мого! Духа лінивства, недбайливости, властолюб'я i пустомовства віджени від мене. Духа чистоти, покори, терпеливости й любови даруй мені, слузі твоєму. Так, Господи, Царю! Дай мені бачити гріхи мої i не осуджувати брата мого, бо ти благословенний на віки віків. Амінь. <i>(великий поклін)</i></p>
<p>Святий Боже, святий кріпкий, святий безсмертний, помилуй нас <i>(3 р.)</i>.</p>
<p>Слава Отцю, і Сину, і Святому Духові, і нині, і повсякчас, і на віки віків. Амінь.</p>
<p>Пресвята Тройце, помилуй нас; Господи, очисти гріхи наші; Владико, прости беззаконня наші; Святий, завітай і зціли немочі наші імени твого ради.</p>
<p>Господи, помилуй <i>(3 р.)</i></p>
<p>Слава Отцю, і Сину, і Святому Духові, і нині, і повсякчас, і на віки віків. Амінь.</p>
<p>Отче наш, що єси на небесах, нехай святиться ім’я Твоє, нехай прийде царство Твоє, нехай буде воля твоя, як на небі, так і на землі. Хліб наш насущний дай нам сьогодні; і прости нам провини наші, як і ми прощаємо винуватцям нашим; і не введи нас у спокусу, але визволи нас від лукавого.</p>
<p><i>Священик:</i> Бо Твоє є царство, і сила, і слава, Отця, і Сина, і Святого Духа, нині і повсякчас, і на віки віків.</p>
<p><i>Хор:</i> Амінь.</p>
<p>Господи, помилуй <i>(12 р.).</i></p>
<p><b><i>Молитва до Пресвятої Богородиці</i></b></p>
<p><i>Священик:</i> Нескверна, непорочна, нетлінна, пречиста Діво, богоневісто Владичице! Ти преславним своїм народженням Бога Слово з людьми з’єднала й впалу нашу природу з небесною злучила. Безнадійних – єдина надіє й допомого переможених; готове заступництво тим, що до тебе прибігають i всіх християн захисте. Не гидуй нами, грішними і скверними, що злими думками, словами й ділами вчинили себе цілком негідними й стали рабами похотей, недбальства й лінивства. Але, як Мати людинолюбного Бога, змилуйся людинолюбно над нами, грішними й блудними, i прийми наше моління, що його приносимо тобі скверними устами. Обнявши твого Сина й нашого Владику i Господа з матерньою сміливістю, умоли його, щоб відкрив нам людинолюбне милосердя своєї доброти i, незважаючи на наші незліченні провини, навернув нас на покаяння й учинив нас вмілими виконавцями своїх заповідей. Будь при нас, як милостива, й милосердна, i людинолюбна, завжди i в теперішньому житті, теплою заступницею й помічницею, відганяючи полки супротивників, наставляючи нас на спасіння; а в час відходу зберігай нашу окаянну душу; відганяй далеко від неї темні примари лукавих духів. У страшний день праведного суду визволь нас від вічної муки, вчиняючи спадкоємцями несказанної слави твого Сина й Бога нашого; щоб ми осягнули її, Владичице наша, пресвята Богородице, за твоїм заступництвом i поміччю, благодаттю і людинолюб’ям єдинородного твого Сина, Господа Бога й Спаса нашого Ісуса Христа, якому належить усяка слава, честь i поклоніння з безначальним його Отцем та з пресвятим, i благим, і животворним його Духом, нині i повсякчас, i на віки віків.</p>
<p><i>Хор:</i> Амінь.</p>
<p><b><i>Молитва до Ісуса Христа</i></b></p>
<p><i>Священик: </i>І дай, Владико, нам, що на сон ідемо, спокій душі й тіла, та охорони нас від тяжкого сну гріховного i від усякої темної i нічної розкоші. Утихомир запал пристрастей i погаси розпалені стріли лукавого, на нас підступно спрямовані, i порушення нашого тіла припини, i приспи всяку земну й тілесну гадку нашу. І дай нам, Боже, бадьорий ум i чисту думку, тверезе серце, сон легкий i неприступний для всяких диявольських примар. Підведи нас на час молитви непохитними у твоїх заповідях та з постійною пам'яттю на твої суди. І дай нам всенічне славослов'я, щоб співати, i благословити, i славити твоє пречесне й величне ім'я, Отця, i Сина, i Святого Духа, нині i повсякчас, i на віки віків.</p>
<p>Хор: Амінь.</p>
<p><i>І одразу:</i></p>
<p>Преславна Вседіво, Богородице!* Прийми молитви наші i донеси їх Синові твоєму i Богові нашому,* щоб заради тебе спас душі наші.</p>
<p>Уповання наше – Отець,* прибіжище наше – Син,* і покровитель наш – Дух Святий;* Тройце Свята, Боже наш – слава тобі!</p>
<p><b><i>Відпуст</i></b></p>
<p><i>Хор: </i>Слава Отцю, і Сину, і Святому Духові, i нині, і повсякчас, і на віки віків. Амінь. </p>
<p>Господи, помилуй <i>(3 р.)</i>. Благослови.</p>
<p><i>Священик читає замість відпусту цю молитву звернений до людей, які прихилили голови до землі:</i></p>
<p>Владико многомилостивий, Господи Ісусе Христе, Боже наш! Молитвами пречистої Владичиці нашої Богородиці і Приснодіви Марії, силою чесного і животворчого Хреста, заступництвом чесних небесних сил безплотних,; чесного і славного пророка, предтечі і хрестителя Йоана, святих славних і всехвальних апостолів, святих отців наших і вселенських великих учителів і святителів Василія Великого, Григорія Богослова, Йоана Золотоустого, Атанасія і Кирила, святого отця нашого Миколая, архиєпископа Мирлікійського, чудотворця, святих рівноапостольних Кирила і Методія, учителів слов’янських, святого благовірного і рівноапостольного великого князя Володимира, святого священномученика Йосафата, святих, славних і переможних мучеників, преподобних і богоносних отців наших Антонія і Теодосія Печерських та інших преподобних і богоносних отців наших, святих і праведних богоотців Йоакима і Анни, і святого<i> (ім'я, якого є храм і день),</i> і всіх святих, - приємну вчини молитву нашу, даруй нам прощення гріхів наших, покрий нас ласкою своєю, віджени від нас усякого ворога й супротивника. Втихомир наше життя, Господи, помилуй нас і світ твій і спаси душі наші, як благий і людинолюбний.</p>
<p><i>Хор:</i> Амінь.</p>
<p><i>Потім священик, звернувшись до братії, вклоняється і просить прощення:</i></p>
<p>Благословіть, отці й брати, і простіть мені грішному, чим згрішив я в цей день (цю ніч) і по всі дні життя мого словом, ділом, думкою і всіма почуттями моїми.</p>
<p><i>Вірні:</i> Нехай Бог простить і помилує тебе, чесний отче. Благослови і прости, чесний отче, і нам грішним провини наші добровільні і недобровільні <i>(і теж вклоняються).</i></p>
<p><i>Священик:</i> Нехай простить Господь Бог ласкою своєю гріхи ваші і помилує вас.</p>
<p><i>І відразу священик:</i> Помолімся за святішого, вселенського Архиєрея нашого Лева Папу Римського.</p>
<p><i>Вірні:</i> Бог нехай спасе і помилує.</p>
<p>За правлячу владу нашу.</p>
<p><i>Вірні:</i> Бог нехай спасе і помилує.</p>
<p>За блаженнішого Патріярха нашого Кир Святослава, високопреосвященнішого Архиєпископа нашого Кир <i>(ім'я)</i> (і боголюбивого Єпископа нашого Кир <i>(ім'я)</i>).</p>
<p><i>Вірні:</i> Бог нехай спасе і помилує.</p>
<p>За всіх католицьких єпископів.</p>
<p><i>Вірні:</i> Бог нехай спасе і помилує.</p>
<p>За благородних доброчинців святого храму цього (святої обителі цієї).</p>
<p><i>Вірні:</i> Бог нехай спасе і помилує.</p>
<p>За всечесніших отців наших, Протоархимандрита <i>(ім'я)</i>, Архимандрита <i>(ім'я)</i>, Протоігумена <i>(ім'я)</i> й Ігумена <i>(ім'я).</i></p>
<p><i>Вірні:</i> Бог нехай спасе і помилує.</p>
<p>За отців наших духовних і всіх у Христі братів наших.</p>
<p><i>Вірні:</i> Бог нехай спасе і помилує.</p>
<p>За відсутніх і подорожніх.</p>
<p><i>Вірні:</i> Бог нехай захоронить і помилує.</p>
<p>За тих, що чинять нам милостиню.</p>
<p><i>Вірні:</i> Бог нехай віддасть і помилує.</p>
<p>За тих, що служать і послужили у святім храмі цім (обителі цій).</p>
<p><i>Вірні:</i> Бог нехай спасе і помилує.</p>
<p>За тих, що ненавидять нас, і за тих, що нас люблять.</p>
<p><i>Вірні:</i> Бог нехай простить і помилує.</p>
<p>За визволення поневолених.</p>
<p><i>Вірні:</i> Бог нехай визволить і помилує.</p>
<p>За недужих і терплячих.</p>
<p><i>Вірні:</i> Бог нехай оздоровить і помилує.</p>
<p>За тих, що в журбі перебувають і на тяжких роботах поневіряються.</p>
<p><i>Вірні:</i> Бог нехай відвідає і помилує.</p>
<p>За всіх православних християн.</p>
<p><i>Вірні:</i> Бог нехай спасе і помилує.</p>
<p>За розмноження плодів землі.</p>
<p><i>Вірні:</i> Бог нехай розмножить плоди землі.</p>
<p>Пом'янім доброчинців святого храму цього (обителі цієї).</p>
<p><i>Вірні:</i> Бог нехай пом'яне і упокоїть їх.</p>
<p>Померлих батьків і родичів наших.</p>
<p><i>Вірні:</i> Бог нехай пом'яне і упокоїть їх.</p>
<p>Раніш померлих отців і братів наших.</p>
<p><i>Вірні:</i> Бог нехай пом'яне і упокоїть їх.</p>
<p>Убитих за віру християнську.</p>

<p><i>Prayer of Manasseh, King of Judah</i></p>
<p><i>Priest:</i> O Lord Almighty, God of our fathers Abraham, Isaac, and Jacob, and of their righteous posterity: you who made heaven and earth with all their adornment; who bound the sea by your word of command, who shut up the abyss and sealed it with your terrible and glorious name; of whom all things are afraid, and tremble before your power, for the magnificence of your glory is unbearable, and the wrath of your threatening against sinners is unendurable; but the mercy of your promise is immeasurable and unsearchable. For you are the Lord Most High, compassionate, long-suffering, very merciful, and you repent for the evils of men. You, Lord, according to the abundance of your goodness, promised repentance and forgiveness to those who have sinned against you, and in the multitude of your mercies, you appointed repentance for sinners as the way of salvation. You, therefore, O Lord, God of the righteous, did not appoint repentance for the righteous: Abraham, Isaac, and Jacob, who did not sin against you; but you appointed repentance for me, a sinner. For my sins are more in number than the sand of the sea; my transgressions are multiplied, O Lord, multiplied, and I am not worthy to behold and see the height of heaven for the multitude of my iniquities. I am weighed down with many a fetter of iron, so that I cannot lift up my head; and I have no relief, for I have provoked your anger and done evil before you: I did not do your will; I did not observe your commandments; I set up abominations and multiplied offences. And now I bow the knees of my heart, beseeching your goodness: I have sinned, O Lord, I have sinned, and I know my transgressions. I beseech you, forgive me, O Lord, forgive me, and destroy me not with my iniquities. Be not angry with me forever, storing up evil for me; neither condemn me into the lower parts of the earth. For you are the God of those who repent, and in me you will show all your goodness; for you will save me who am unworthy, according to your great mercy, and I will praise you always through all the days of my life. For all the hosts of heaven sing your praise, and yours is the glory, forever and ever. Amen.</p>
<p><i>Choir:</i> Amen.</p>
<p>Holy God, Holy Mighty, Holy Immortal, have mercy on us. <i>(3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>O Most Holy Trinity, have mercy on us. O Lord, cleanse us of our sins. O Master, pardon our iniquities. O Holy One, visit and heal our infirmities for your name's sake.</p>
<p><i>Lord, have mercy. (3 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>Our Father, who art in heaven, hallowed be Thy name; Thy kingdom come; Thy will be done on earth as it is in heaven. Give us this day our daily bread, and forgive us our trespasses as we forgive those who trespass against us; and lead us not into temptation, but deliver us from evil.</p>
<p><i>Priest:</i> For Thine is the kingdom, and the power and the glory, of the Father, and of the Son, and of the Holy Spirit, now and ever, and unto ages of ages.</p>
<p><i>Choir:</i> Amen.</p>
<p><i>Troparia, Tone 6:</i></p>
<p>Have mercy on us, O Lord, have mercy on us, for we sinners, having no defense, offer to you as Master this prayer: have mercy on us.</p>
<p><i>Glory:</i> O Lord, have mercy on us, for in you we have put our trust; be not very angry with us, nor remember our iniquities, but look upon us now as you are merciful, and deliver us from our enemies; for you are our God and we are your people; all we are the work of your hands, and we call upon your name.</p>
<p><i>Now and ever:</i> Open to us the doors of mercy, O blessed Theotokos; for we who hope in you shall not perish, but through you shall be delivered from all adversities, for you are the salvation of the Christian race.</p>
<p><i>Lord, have mercy. (40 times)</i></p>
<p>Glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.</p>
<p>More honorable than the cherubim, and more glorious beyond compare than the seraphim, who without corruption gave birth to God the Word, the true Theotokos — we magnify you.</p>

<p><i>Priest:</i> By the prayers of our holy fathers, O Lord Jesus Christ our God, have mercy on us.</p>

<p><i>Priest:</i> O Master, God, Father Almighty, Lord, only-begotten Son, Jesus Christ, and Holy Spirit: one Godhead, one Power. Have mercy on me, a sinner, and by the judgments which you know, save me, your unworthy servant. For you are blessed unto ages of ages. Amen.</p>
