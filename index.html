async function buildVespersView(main) {
  const d = S.date;
  const key = dateKey(d);
  const m = getMeta(d);
  const fs = S.fontSize;
  const leng = S.lang;

  const dateLabel = fmtDate(d, leng);
  const toneLabel = m.tone ? (leng==='uk'?`Глас ${m.tone}`:`Tone ${m.tone}`) : '';
  const periodLabel = getLitPeriod(m.fast, leng);
  const saintLabel = getSaint(d, leng);
  const subLine = [periodLabel, toneLabel].filter(Boolean).join(' — ');

  const headerHtml = `
  <div class="svc-view-header">
    <button class="back-btn" onclick="S.view='home';render()">← ${leng==='uk'?'Назад':'Back'}</button>
    <button class="print-btn" onclick="window.print()">⊞ ${leng==='uk'?'Друк':'Print'}</button>
    <a class="print-btn" href="docs/Vespers_${key}_EN.docx" download style="text-decoration:none;color:inherit">📄 ${leng==='uk'?'Завантажити':'Download'}</a>
  </div>`;

  const dayHeaderHtml = `
  <div class="svc-day-header">
    <div class="svc-day-date" style="font-size:${fs*0.78}px">${dateLabel}</div>
    ${subLine ? `<div class="svc-day-tone" style="font-size:${fs*0.82}px;cursor:pointer" onclick="showToneModal(${m.tone})">${subLine} <span style="font-size:0.8em;opacity:0.7">ⓘ</span></div>` : ''}
    ${saintLabel ? `<div class="svc-day-saint" style="font-size:${fs*0.85}px">${saintLabel}</div>` : ''}
  </div>`;

  // English mode — load EN moveable data first
  if (leng === 'en') {
    if (!S.moveableEN && !S.moveableLoading) {
      main.innerHTML = headerHtml +
        `<div class="svc-content"><div>${dayHeaderHtml}<div class="loading-spinner"></div><p style="text-align:center;color:var(--mt);font-size:${fs*0.85}px">Loading prayer text...</p></div></div>`;
      const ok = await loadMoveableEN();
      if (ok || !S.moveableLoading) buildVespersView(main);
      return;
    }
    if (S.moveableLoading) {
      main.innerHTML = headerHtml +
        `<div class="svc-content"><div>${dayHeaderHtml}<div class="loading-spinner"></div></div></div>`;
      return;
    }
    const blocks = buildEnVespers(d);
    const content = blocks.map(renderBlock).join('');
    main.innerHTML = headerHtml + `<div class="svc-content"><div>${dayHeaderHtml}${content}</div></div>`;
    return;
  }

  // Ukrainian mode — need moveable data
  if (!S.moveableUK && !S.moveableLoading) {
    main.innerHTML = headerHtml +
      `<div class="svc-content"><div>${dayHeaderHtml}<div class="loading-spinner"></div><p style="text-align:center;color:var(--mt);font-size:${fs*0.85}px">Завантаження тексту…<br>Loading Ukrainian text…</p></div></div>`;
    const ok = await loadMoveableUK();
    if (ok) buildVespersView(main);
    else {
      main.innerHTML = headerHtml +
        `<div class="svc-content"><div>${dayHeaderHtml}
        <div class="blk-moveable-placeholder">
          <strong>Ukrainian text unavailable</strong><br>
          Place <code>data/vespers-moveable-uk.json</code> alongside <code>index.html</code>.
        </div></div></div>`;
    }
    return;
  }

  if (S.moveableLoading) {
    main.innerHTML = headerHtml +
      `<div class="svc-content"><div>${dayHeaderHtml}<div class="loading-spinner"></div></div></div>`;
    return;
  }

  // We have moveable data
  const moveableHtml = S.moveableUK ? (S.moveableUK[key]||'') : '';
  if (!moveableHtml) {
    main.innerHTML = headerHtml +
      `<div class="svc-content"><div>${dayHeaderHtml}
      <div class="blk-moveable-placeholder">
        Ukrainian Vespers text for ${dateLabel} is not yet available.<br>
        ${S.lang==='uk'?'Текст відсутній для цієї дати.':'Data available for January 1 – April 26, 2026.'}
      </div></div></div>`;
    return;
  }

  // Combine fixed opening + moveable
  const ukContent = `<div class="uk-vespers" style="font-size:${fs}px">`
    + UK_FIXED_OPENING_HTML
    + moveableHtml
    + `</div>`;

  main.innerHTML = headerHtml + `<div class="svc-content">${dayHeaderHtml}${ukContent}</div>`;
}

// Shared melody patterns for each tone (staff position: 0=high, 4=low)
const TONE_MELODIES = {
  1: [3,2,1,2,3,4,3,2],   // ascending, regal
  2: [3,4,3,2,3,4,3,2],   // gentle wave
  3: [2,1,2,3,2,1,2,3],   // smooth flow
  4: [1,2,3,2,1,2,3,4],   // bright climb
  5: [4,3,2,3,4,3,2,1],   // grave descent
  6: [4,3,4,3,2,1,2,1],   // mournful
  7: [1,1,2,3,4,3,2,1],   // bold march
  8: [1,2,3,4,3,2,1,0],   // grand sweep
};

// Map staff positions to frequencies (C major scale, middle register)
// 0=G4, 1=F4, 2=E4, 3=D4, 4=C4 (descending on staff)
const TONE_FREQS = [392.00, 349.23, 329.63, 293.66, 261.63];

// Web Audio — play a tone's melody
let _toneAudioCtx = null;
let _tonePlayingId = null;

function playToneMelody(toneNum, btnEl) {
  // If already playing this tone, stop it
  if (_tonePlayingId === toneNum) {
    stopToneMelody();
    return;
  }
  // Stop any current playback
  stopToneMelody();

  const melody = TONE_MELODIES[toneNum];
  if (!melody) return;

  // Create or resume audio context (must be from user gesture)
  if (!_toneAudioCtx) _toneAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const ctx = _toneAudioCtx;
  if (ctx.state === 'suspended') ctx.resume();

  _tonePlayingId = toneNum;
  const noteDuration = 0.45; // seconds per note
  const gapDuration = 0.05;
  const startTime = ctx.currentTime + 0.05;

  // Update button state
  if (btnEl) {
    btnEl.textContent = '■';
    btnEl.classList.add('playing');
  }

  melody.forEach((pos, i) => {
    const freq = TONE_FREQS[pos] || TONE_FREQS[2];
    const t = startTime + i * (noteDuration + gapDuration);

    // Fundamental — soft organ-like tone
    const osc1 = ctx.createOscillator();
    const gain1 = ctx.createGain();
    osc1.type = 'sine';
    osc1.frequency.value = freq;
    gain1.gain.setValueAtTime(0, t);
    gain1.gain.linearRampToValueAtTime(0.25, t + 0.04);
    gain1.gain.setValueAtTime(0.25, t + noteDuration - 0.08);
    gain1.gain.linearRampToValueAtTime(0, t + noteDuration);
    osc1.connect(gain1);
    gain1.connect(ctx.destination);
    osc1.start(t);
    osc1.stop(t + noteDuration);

    // Soft overtone (octave above, quiet) for warmth
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = freq * 2;
    gain2.gain.setValueAtTime(0, t);
    gain2.gain.linearRampToValueAtTime(0.06, t + 0.04);
    gain2.gain.setValueAtTime(0.06, t + noteDuration - 0.08);
    gain2.gain.linearRampToValueAtTime(0, t + noteDuration);
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.start(t);
    osc2.stop(t + noteDuration);

    // Third partial (fifth above, very soft) for richness
    const osc3 = ctx.createOscillator();
    const gain3 = ctx.createGain();
    osc3.type = 'sine';
    osc3.frequency.value = freq * 3;
    gain3.gain.setValueAtTime(0, t);
    gain3.gain.linearRampToValueAtTime(0.02, t + 0.04);
    gain3.gain.setValueAtTime(0.02, t + noteDuration - 0.08);
    gain3.gain.linearRampToValueAtTime(0, t + noteDuration);
    osc3.connect(gain3);
    gain3.connect(ctx.destination);
    osc3.start(t);
    osc3.stop(t + noteDuration);
  });

  // Reset button after playback finishes
  const totalDuration = melody.length * (noteDuration + gapDuration) * 1000 + 100;
  setTimeout(() => {
    if (_tonePlayingId === toneNum) {
      _tonePlayingId = null;
      if (btnEl) {
        btnEl.textContent = '▶';
        btnEl.classList.remove('playing');
      }
    }
  }, totalDuration);
}

function stopToneMelody() {
  _tonePlayingId = null;
  // Reset all play buttons
  document.querySelectorAll('.tone-play-btn.playing').forEach(b => {
    b.textContent = '▶';
    b.classList.remove('playing');
  });
}

// Generate placeholder staff notation SVG for a tone
function toneStaffSVG(toneNum, isDark) {
  const w = 320, h = 100;
  const staffY = 25, gap = 10;
  const lineColor = isDark ? '#555' : '#999';
  const noteColor = isDark ? '#e0d4c0' : '#333';
  const clefColor = isDark ? '#c8a44e' : '#1a3c6e';

  // 5 staff lines
  let lines = '';
  for (let i = 0; i < 5; i++) {
    lines += `<line x1="10" y1="${staffY + i*gap}" x2="${w-10}" y2="${staffY + i*gap}" stroke="${lineColor}" stroke-width="0.8"/>`;
  }

  // Simple treble clef approximation
  const clef = `<text x="16" y="${staffY + 35}" font-size="48" font-family="serif" fill="${clefColor}" opacity="0.7">𝄞</text>`;

  const notes = TONE_MELODIES[toneNum] || TONE_MELODIES[1];
  let notesSvg = '';
  notes.forEach((n, i) => {
    const x = 60 + i * 32;
    const y = staffY + n * gap;
    notesSvg += `<ellipse cx="${x}" cy="${y}" rx="5.5" ry="4" fill="${noteColor}" transform="rotate(-15 ${x} ${y})"/>`;
    notesSvg += `<line x1="${x+5}" y1="${y}" x2="${x+5}" y2="${y-25}" stroke="${noteColor}" stroke-width="1.2"/>`;
  });

  // "Placeholder" label
  const label = `<text x="${w/2}" y="${h-6}" font-size="9" font-family="sans-serif" fill="${lineColor}" text-anchor="middle" font-style="italic">Placeholder melody — final notation pending</text>`;

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${w}px">${lines}${clef}${notesSvg}${label}</svg>`;
}

function toggleToneCard(el) {

    setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
  }
}

  S.dark = !S.dark;

  render();

function toggleLang() {
  S.lang = S.lang==='en' ? 'uk' : 'en';
  render();
}

function adjFont(delta) {
  S.fontSize = Math.max(14, Math.min(26, S.fontSize + delta*2));
  render();
}

function shiftDay(delta) {
  const nd = new Date(S.date);
  nd.setDate(nd.getDate() + delta);
  if (nd.getFullYear() === 2026) {
    S.date = nd;
    S.calMonth = nd.getMonth();
    render();
    // Scroll the day into view in the strip
    setTimeout(() => {
      const strip = document.getElementById('calStrip');
      if (strip) {
        const sel = strip.querySelector('.selected');
        if (sel) sel.scrollIntoView({inline:'center', behavior:'smooth'});
      }
    }, 50);
  }
}

function selectDay(mon, day) {
  S.date = new Date(2026, mon, day);
  S.calMonth = mon;
  S.view = 'home';
  render();
  setTimeout(() => {
    const strip = document.getElementById('calStrip');
    if (strip) {
      const sel = strip.querySelector('.selected');
      if (sel) sel.scrollIntoView({inline:'center', behavior:'smooth'});
    }
  }, 50);
}

function scrollStrip(dir) {
  const strip = document.getElementById('calStrip');
  if (strip) strip.scrollBy({ left: dir * 200, behavior: 'smooth' });
}

function stripMonth(mon) {
  S.date = new Date(2026, mon, 1);
  S.calMonth = mon;
  render();
}

function toggleCalView() {
  S.calMonth = S.date.getMonth();
  S.view = S.view==='cal' ? 'home' : 'cal';
  render();
}

function openService(id) {
  if (id === 'vespers') {
    S.view = 'vespers';

    window.scrollTo(0, 0);
  } else if (id === 'compline') {
    S.view = 'compline';

  } else if (id === 'matins') {
    S.view = 'matins';
    render();
    window.scrollTo(0, 0);

    S.view = 'tones';
    render();
    window.scrollTo(0, 0);
  }
}

  if (strip) {
    const sel = strip.querySelector('.selected');
    if (sel) sel.scrollIntoView({inline:'center', behavior:'instant'});
  }
}, 100);

</script>

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(
      reg => console.log('SW registered:', reg.scope),
      err => console.warn('SW failed:', err)
    );
  });
}
</script>
